      function request(path, options = {}) {
        const api = window.Synapse;
        const url = path.startsWith("/api/") ? path : `${PLUGIN_BASE}${path}`;
        if (api && typeof api.request === "function") {
          return api.request(url, options);
        }
        const init = {
          method: options.method || "GET",
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        };
        if (options.body) init.body = JSON.stringify(options.body);
        return fetch(url, init).then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const contentType = response.headers.get("content-type") || "";
          return contentType.includes("application/json") ? response.json() : response.text();
        });
      }

      function uploadFile(file, projectId = "", extra = {}) {
        const form = new FormData();
        form.append("file", file);
        if (projectId) form.append("project_id", projectId);
        Object.entries(extra || {}).forEach(([key, value]) => {
          if (value != null && value !== "") form.append(key, value);
        });
        return fetch(`${PLUGIN_BASE}/upload`, { method: "POST", body: form }).then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        });
      }

      function useDraft(key, initial) {
        const [value, setValue] = useState(() => {
          try { return JSON.parse(localStorage.getItem(key)) || initial; } catch (_) { return initial; }
        });
        useEffect(() => localStorage.setItem(key, JSON.stringify(value)), [key, value]);
        return [value, setValue];

      function statusClass(status) {
        if (status === "ready" || status === "succeeded" || status === "profiled" || status === "diagnosed") return "done";
        if (status === "failed") return "failed";
        if (status === "cancelled") return "cancelled";
        if (String(status || "").includes("ready") || String(status || "").includes("confirmed")) return "approval";
        return "pending";
      }

      function formatElapsed(sec) {
        const s = Math.max(0, Math.round(sec || 0));
        const mm = String(Math.floor(s / 60)).padStart(2, "0");
        const ss = String(s % 60).padStart(2, "0");
        return `${mm}:${ss}`;

      function mergeDependency(snapshot, dependency) {
        if (!dependency) return snapshot;
        const groups = snapshot?.groups || [];
        const nextGroups = groups.some((item) => item.id === dependency.id)
          ? groups.map((item) => item.id === dependency.id ? { ...item, ...dependency } : item)
          : [...groups, dependency];
        return { ...(snapshot || { ok: true }), groups: nextGroups };
      }

      const TABLE_EXTS = ["csv", "tsv", "xlsx"];
      const SOURCE_EXTS = ["md", "markdown", "txt", "pdf", "docx", "pptx"];
      function fileExt(name) {
        const idx = String(name || "").lastIndexOf(".");
        return idx >= 0 ? name.slice(idx + 1).toLowerCase() : "";
      }
      function isTableFile(name) { return TABLE_EXTS.includes(fileExt(name)); }
      function materialBucket(item) {
        if (item.assetType === "dataset") {
          return item.status === "profiled" ? "processed" : "pending";
        }
        return item.status === "parsed" ? "processed" : "pending";
      }
      function bucketLabel(bucket) {
        return bucket === "processed" ? "宸插鐞? : "寰呭鐞?;
      }
      function typeLabel(item) {
        return item.assetType === "dataset" ? "琛ㄦ牸鏁版嵁" : "鍙傝€冭祫鏂?;
      }
      function buildMaterials(sources, datasets) {
        const items = [];
        for (const dataset of datasets) {
          items.push({
            assetType: "dataset",
            id: dataset.id,
            name: dataset.name,
            kind: dataset.metadata?.kind || "table",
            status: dataset.status,
            collection: dataset.metadata?.collection || dataset.name || "鏈垎缁?,
            path: dataset.original_path,
            updatedAt: dataset.updated_at || dataset.created_at,
            raw: dataset,
          });
        }
        for (const source of sources) {
          items.push({
            assetType: "source",
            id: source.id,
            name: source.filename,
            kind: source.kind,
            status: source.status,
            collection: source.metadata?.collection || "鏈垎缁?,
            path: source.path,
            updatedAt: source.updated_at || source.created_at,
            raw: source,
          });
        }
        return items;
      }

      function MaterialsTab({ setError, refreshData, sources, datasets }) {
        const [collectionName, setCollectionName] = useState("");
        const [pendingFiles, setPendingFiles] = useState([]);
        const [uploading, setUploading] = useState(false);
        const [processAfterUpload, setProcessAfterUpload] = useState(false);
        const [uploadPhase, setUploadPhase] = useState("");
        const [selected, setSelected] = useState({});
        const [statusFilter, setStatusFilter] = useState("all");
        const [typeFilter, setTypeFilter] = useState("all");
        const [expandedCollections, setExpandedCollections] = useState({});
        const [analysisModal, setAnalysisModal] = useState(null);
        const [parseModal, setParseModal] = useState(null);
        const [deleteTarget, setDeleteTarget] = useState(null);
        const materials = buildMaterials(sources, datasets);
        async function registerUploadedAsDataset(uploadedSource) {
          const uploadedPath = uploadedSource?.path || "";
          if (!uploadedPath) return null;
          const name = collectionName.trim();
          return await request("/datasets", {
            method: "POST",
            body: { path: uploadedPath, name: uploadedSource.filename || name, collection_name: name },
          });
        }
        async function processMaterial(item, options = {}) {
          const showResult = options.showResult !== false;
          setError(null);
          if (item.assetType === "dataset") {
            const data = await request(`/datasets/${item.id}/profile`, { method: "POST" });
            if (showResult) setAnalysisModal(data);
          } else {
            const data = await request(`/sources/${item.id}/parse`, { method: "POST" });
            if (showResult) setParseModal({ source: item.raw, parsed: data?.parsed });
          }
          refreshData();
        }
        async function confirmUpload() {
          setError(null);
          if (!collectionName.trim()) throw new Error("璇峰厛濉啓绱犳潗闆嗗悕绉帮紝鍐嶄笂浼犳枃浠躲€?);
          if (!pendingFiles.length) throw new Error("璇峰厛閫夋嫨瑕佷笂浼犵殑绱犳潗鏂囦欢銆?);
          setUploading(true);
          setUploadPhase("涓婁紶绱犳潗涓?..");
          try {
            const uploadedMaterials = [];
            for (const file of pendingFiles) {
              const uploaded = await uploadFile(file, "", { collection_name: collectionName.trim() });
              if (isTableFile(uploaded?.source?.filename || file.name)) {
                const created = await registerUploadedAsDataset(uploaded.source);
                if (created?.dataset) {
                  uploadedMaterials.push({ assetType: "dataset", id: created.dataset.id, raw: created.dataset });
                }
              } else if (uploaded?.source) {
                uploadedMaterials.push({ assetType: "source", id: uploaded.source.id, raw: uploaded.source });
              }
            }
            if (processAfterUpload && uploadedMaterials.length > 0) {
              setUploadPhase("鍚屾澶勭悊涓紝璇风◢鍊?..");
              for (const item of uploadedMaterials) {
                await processMaterial(item, { showResult: false });
              }
            }
            setPendingFiles([]);
            refreshData();
          } finally {
            setUploadPhase("");
            setUploading(false);

                    <select className="input select" value={settings.analysis_subdir_mode || "date"} onChange={(e) => saveSettings({ analysis_subdir_mode: e.target.value }).catch(setError)}>
                      <option value="date">鎸夊垎鏋愭棩鏈熷拰璁板綍缂栧彿褰掓。</option>
                      <option value="flat">鎸夎褰曠紪鍙峰綊妗?/option>
                    </select>
                  </div>
                </div>
                <div className="grid-2">
                  <div className="form-row">
                    <div className="text-xs text-muted">涓婁紶鏂囦欢鍛藉悕瑙勫垯</div>
                    <select className="input select" value={settings.upload_naming_rule || "{date}_{original}"} onChange={(e) => saveSettings({ upload_naming_rule: e.target.value }).catch(setError)}>
                      <option value="{date}_{original}">鏃ユ湡_鍘熸枃浠跺悕</option>
                      <option value="{original}">淇濈暀鍘熸枃浠跺悕</option>
                      <option value="{kind}_{date}_{original}">绫诲瀷_鏃ユ湡_鍘熸枃浠跺悕</option>
                    </select>
                  </div>
                  <div className="form-row">
                    <div className="text-xs text-muted">瀵煎嚭鏂囦欢鍛藉悕瑙勫垯</div>
                    <select className="input select" value={settings.export_naming_rule || "{date}_{project_id}"} onChange={(e) => saveSettings({ export_naming_rule: e.target.value }).catch(setError)}>
                      <option value="{date}_{project_id}">鏃ユ湡_椤圭洰ID</option>
                      <option value="{project_id}">椤圭洰ID</option>
                    </select>
                  </div>
                </div>
                <div className="folder-row" style={{marginTop: 8}}>
                  <input className="input" readOnly value={storage?.data_dir || health?.data_dir || "鐐瑰嚮鍒锋柊鏌ョ湅榛樿鐩綍"} />
                  <button className="btn btn-sm" onClick={() => openFolder("root")}>鎵撳紑鏍圭洰褰?/button>
                  <button className="btn btn-sm" onClick={loadStorage}>鍒锋柊绌洪棿</button>
                </div>
                {storage?.stats && (
                  <div className="storage-grid">
                    {Object.entries(storage.stats).map(([key, item]) => (
                      <div key={key} className="storage-card">
                        <div className="text-xs text-dim">{storageLabel(key)}</div>
                        <strong>{item.size_mb} MB</strong>
                        <span>{item.file_count} 涓枃浠?/span>
                        <button className="btn btn-sm" onClick={() => openFolder(key)}>鎵撳紑</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <FolderPickerModal
                open={!!folderPicker}
                title={folderPicker?.title}
                initialPath={folderPicker?.initialPath}
                onCancel={() => setFolderPicker(null)}
                onSelect={(path) => handleFolderSelected(path).catch(setError)}
              />
            </div>
          </div>
        );
      }

      function App() {
        const [active, setActive] = useState("Create");
        const [projects, setProjects] = useState([]);
        const [sources, setSources] = useState([]);
        const [datasets, setDatasets] = useState([]);
        const [templates, setTemplates] = useState([]);
        const [health, setHealth] = useState(null);
        const [error, setError] = useState(null);
        const [event, setEvent] = useState(null);
        async function refreshProjects(options = {}) {
          try {
            const data = await request("/projects");
            setProjects(data.projects || []);
          } catch (err) {
            if (options.local) throw err;
            setError(err);
          }
        }
        async function refreshData() {
          try {
            const [sourceData, datasetData, templateData] = await Promise.all([request("/sources"), request("/datasets"), request("/templates")]);
            setSources(sourceData.sources || []);
            setDatasets(datasetData.datasets || []);
            setTemplates(templateData.templates || []);
          } catch (err) { setError(err); }
        }
        useEffect(() => {
          refreshProjects();
          refreshData();
          const onTask = (e) => setEvent(e.detail || e);
          window.addEventListener("task_update", onTask);
          return () => window.removeEventListener("task_update", onTask);
        }, []);
        const props = { projects, refreshProjects, sources, datasets, templates, refreshData, health, setHealth, setError };
        props.onNavigate = setActive;
        const body = useMemo(() => ({
          Create: <CreateTab {...props} />,
          Projects: <ProjectsTab {...props} />,
          Materials: <MaterialsTab {...props} />,
          Templates: <TemplatesTab {...props} />,
          Exports: <ExportsTab {...props} />,
          Settings: <SettingsTab {...props} />,
        }[active]), [active, projects, sources, datasets, templates, health]);
        return (
          <main className="app">
            <header className="header">
              <h1>
                <span className="ak-logo"><Icon name="ppt" /></span>
                <span className="brand-copy"><span className="brand-title">PPT 鍒朵綔鍔╂墜</span><span className="ak-sub">闇€姹傛⒊鐞?路 琛ㄦ牸娲炲療 路 妯℃澘閫傞厤 路 PPTX 瀵煎嚭</span></span>
              </h1>
              <div className="header-right"><span>Synapse Plugin</span></div>
            </header>
            <nav className="tabs">{tabs.map(([id, label]) => <button key={id} className={"tab " + (active === id ? "active" : "")} onClick={() => setActive(id)}>{label}</button>)}</nav>
            <section className="content">
              <div className="tab-body" data-tab={active}>
                {active !== "Projects" && <ErrorPanel error={error} />}
                <ProgressPanel event={event} />
                {body}
              </div>
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
