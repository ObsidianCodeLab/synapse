<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-muted,#64748b);font-size:13px" id="__mp_loading">姝ｅ湪鍔犺浇鎻掍欢...</div></div>
<script>
/* =================================================================
 * In-page diagnostics 鈥?mirror of subtitle-craft fix 523d5d0f and
 * clip-sense fix 1cadcacd.
 *
 * Why every line matters:
 *  - <script type="text/babel"> + Babel-standalone from unpkg.com is
 *    cross-origin; ANY syntax/runtime error inside it is reported by
 *    window.onerror as the opaque "Script error. at :0:0" with no
 *    stack. Combined with React mount happening only at the end of
 *    that block, a single typo blanks the whole UI silently (no
 *    DevTools-free way to recover).
 *  - We therefore (a) capture window.onerror into a visible panel,
 *    (b) start a 10 s watchdog that flips the loading text to a
 *    diagnostic when React never mounts, and (c) below we abandon

// i18n bootstrap
if (window.SynapseI18n && window.SynapseI18n.register) {
  window.SynapseI18n.register(I18N_DICT);
}
function _detectLocale() {
  if (window.SynapseI18n && window.SynapseI18n.locale) return window.SynapseI18n.locale();
  return (navigator.language || "zh").startsWith("zh") ? "zh" : "en";
}
function useI18n() {
  const [locale, setLocale] = useState(_detectLocale());
  useEffect(() => {
    if (window.SynapseI18n && window.SynapseI18n.onChange) {
      return window.SynapseI18n.onChange(setLocale);
    }
    return undefined;
  }, []);
  const t = useCallback((key, vars) => {
    if (window.SynapseI18n && window.SynapseI18n.t) {
      const v = window.SynapseI18n.t(key, vars);
      if (v && v !== key) return v;
    }
    const dict = I18N_DICT[locale] || I18N_DICT.zh;
    let raw = dict[key] || I18N_DICT.zh[key] || key;
    if (vars) raw = raw.replace(/\{(\w+)\}/g, (_, n) => vars[n] != null ? String(vars[n]) : "{" + n + "}");
    return raw;
  }, [locale]);
  return { t, locale };
}

// 鈹€鈹€鈹€ Helpers 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
const STATUS_TAG = {
  pending: "tag-gray", running: "tag-warm",
  completed: "tag-green", failed: "tag-red",
  cancelled: "tag-gray", approval_required: "tag-orange",
};
function fmtDate(s) { try { return new Date(s).toLocaleString(); } catch (e) { return s || ""; } }
function fmtBytes(n) { if (!n) return "0 B"; const u = ["B","KB","MB","GB"]; let i = 0; while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; } return n.toFixed(1) + " " + u[i]; }
function clamp(n, lo, hi) { return Math.min(hi, Math.max(lo, Number(n) || 0)); }
function parseChapters(text) {
  if (!text) return [];
  const lines = String(text).split(/\r?\n/);
  const out = [];
  let idx = 0;
  for (const ln of lines) {
    const m = ln.trim().match(/^(\d{1,2}:\d{1,2}(?::\d{1,2})?)\s+(.+)$/);
    if (m) { idx++; out.push({ chapter_index: idx, timestamp: m[1], title: m[2], subtitle: "" }); }
    else if (ln.trim()) { idx++; out.push({ chapter_index: idx, timestamp: "", title: ln.trim(), subtitle: "" }); }
  }
  return out;
}

function CreateTab({ t, settings, onTaskCreated, gotoSettings }) {
  const [mode, setMode] = useState(() => localStorage.getItem("mediapost.mode") || "cover_pick");
  const [forms, setForms] = useState(() => {
    const saved = {};
    for (const m of Object.keys(DEFAULT_FORMS)) {
      try {
        const s = localStorage.getItem(`mediapost.draft.${m}`);
        saved[m] = s ? { ...DEFAULT_FORMS[m], ...JSON.parse(s) } : DEFAULT_FORMS[m];
      } catch (e) { saved[m] = DEFAULT_FORMS[m]; }
    }
    return saved;
  });
  const [video, setVideo] = useState(null); // {path, url, filename, duration_sec}
  const [uploading, setUploading] = useState(false);
  const [preview, setPreview] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [costApproved, setCostApproved] = useState(false);
  const [startedTask, setStartedTask] = useState(null);
  const fileRef = useRef(null);

  function patchForm(patch) {
    setForms(prev => {
      const next = { ...prev, [mode]: { ...prev[mode], ...patch } };
      try { localStorage.setItem(`mediapost.draft.${mode}`, JSON.stringify(next[mode])); } catch (e) {}
      return next;
    });
  }
  useEffect(() => {
    try { localStorage.setItem("mediapost.mode", mode); } catch (e) {}
    setCostApproved(false);
  }, [mode]);

  // Recompute preview whenever the relevant form / video changes.
  useEffect(() => {
    let cancelled = false;
    async function run() {
      const f = forms[mode];
      const body = { mode };
      if (mode === "cover_pick") body.quantity = f.quantity;
      if (mode === "multi_aspect") {
        body.target_aspects = f.target_aspects;
        body.recompose_fps = f.recompose_fps;
        body.duration_sec = video ? (video.duration_sec || 0) : 0;
      }
      if (mode === "seo_pack") body.platforms = f.platforms;
      if (mode === "chapter_cards") body.chapter_count = parseChapters(f.chapters_text).length;
      try {
        const r = await pluginApi("POST", "/estimate", body);
        if (!cancelled && r.ok) setPreview(r.body);
      } catch (e) { /* ignore */ }
    }
    run();
    return () => { cancelled = true; };
  }, [mode, forms, video]);

  async function onUpload(file) {
    if (!file) return;
    setUploading(true);
    try {
      const r = await uploadFile(file);
      setVideo({ path: r.path, filename: r.filename, url: r.url, size: r.size, duration_sec: 0 });
    } catch (e) {
      showToast("Upload failed: " + e.message, "error");
    } finally { setUploading(false); }
  }

  function videoRequired() { return mode === "cover_pick" || mode === "multi_aspect"; }
  const apiMissing = !settings || !settings.dashscope_api_key;
  const apiMissingForMode = apiMissing && mode !== "chapter_cards";

  async function startTask() {
    if (videoRequired() && !video) {
      showToast(t("mediaPost.forms.video.label") + " ?", "error");
      return;
    }
    setSubmitting(true);
    try {
      const f = forms[mode];
      const params = { ...f };
      if (mode === "chapter_cards") params.chapters = parseChapters(f.chapters_text);
      const body = {
        mode,
        video_path: video ? video.path : "",
        params,
        cost_approved: costApproved,
      };
      const r = await pluginApi("POST", "/tasks", body);
      if (!r.ok) {
        showToast("Create failed: " + JSON.stringify(r.body || {}), "error");
        return;
      }
      setStartedTask(r.body);
      onTaskCreated && onTaskCreated(r.body);
    } finally { setSubmitting(false); }
  }

  const f = forms[mode];
  const startKey = `mediaPost.forms.start.${mode}`;
  const needsConfirm = preview && preview.cost_kind !== "ok" && !costApproved;
  const startLabel = needsConfirm
    ? t("mediaPost.forms.start.confirm", { cost: preview.total_cny.toFixed(2) })
    : t(startKey);

  const modes = [
    { id: "cover_pick" },
    { id: "multi_aspect" },
    { id: "seo_pack" },
    { id: "chapter_cards" },
  ];

  return (
    <div>
      <div className="split-layout">
        <div className="split-left">
         <div className="card">
          <div className="form-row">
            <div className="oa-section-label">{t("mediaPost.tabs.create")}</div>
            <div className="grid-2" style={{gap: 8}}>
              {modes.map(m => (
                <button key={m.id} type="button"
                        className={`mode-btn ${mode === m.id ? "active" : ""}`}
                        onClick={() => setMode(m.id)}>
                  <span className="mode-btn__title">{t(`mediaPost.modes.${m.id}.title`)}</span>
                  <span className="mode-btn__desc">{t(`mediaPost.modes.${m.id}.desc`)}</span>
                </button>
              ))}
            </div>
          </div>
          {videoRequired() && (
            <div className="form-row">
              <div className="label">{t("mediaPost.forms.video.label")}</div>
              <div className={`upload-zone ${video ? "has-image" : ""}`}
                   onClick={() => fileRef.current && fileRef.current.click()}>
                {uploading
                  ? <span className="spinner-sm" />
                  : video
                    ? (<>
                        <video className="upload-preview" src={video.url} controls />
                        <div className="text-xs text-muted" style={{marginTop:6}}>{video.filename} 路 {fmtBytes(video.size)}</div>
                      </>)
                    : <>{t("mediaPost.forms.video.placeholder")}</>}
              </div>
              <div className="text-xs text-dim" style={{marginTop: 4}}>{t("mediaPost.forms.video.helper")}</div>
              <input ref={fileRef} type="file" accept="video/*" hidden
                     onChange={e => onUpload(e.target.files[0])} />
            </div>
          )}
          {mode === "cover_pick" && <CoverPickForm value={f} onChange={patchForm} t={t} />}
          {mode === "multi_aspect" && <MultiAspectForm value={f} onChange={patchForm} t={t} />}
          {mode === "seo_pack" && <SeoPackForm value={f} onChange={patchForm} t={t} />}
          {mode === "chapter_cards" && <ChapterCardsForm value={f} onChange={patchForm} t={t} />}
          <CostBanner preview={preview} t={t} />
          {preview && preview.cost_kind === "warn" && (
            <div className="oa-config-banner">
              <span className="oa-config-banner__icon"
                    dangerouslySetInnerHTML={{__html: window.SynapseIcons?.warning?.() || ""}} />
              <div className="oa-config-banner__text">{t("mediaPost.cost.warn_10")}</div>
            </div>
          )}
          {preview && preview.cost_kind === "danger" && (
            <div className="oa-config-banner danger">
              <span className="oa-config-banner__icon"
                    dangerouslySetInnerHTML={{__html: window.SynapseIcons?.warning?.() || ""}} />
              <div className="oa-config-banner__text">{t("mediaPost.cost.warn_30")}</div>
            </div>
          )}
          <button className="btn btn-primary" disabled={submitting || apiMissingForMode}
                  style={{width: "100%", justifyContent: "center"}}
                  onClick={() => { if (needsConfirm) setCostApproved(true); else startTask(); }}>
            {submitting && <span className="spinner-sm" />}
            {needsConfirm ? startLabel : t(startKey)}
          </button>
          {needsConfirm && costApproved && (
            <button className="btn btn-primary" style={{width:"100%", marginTop:8, justifyContent:"center"}}
                    onClick={startTask}>
              {t("mediaPost.common.start")}
            </button>
          )}
         </div>
        </div>
        <div className={"split-right oa-preview-area" + (!startedTask ? " oa-preview-area--centered" : "")}>
          {!startedTask && (
            <div className="oa-preview-empty">
              <span className="oa-preview-empty__icon"
                    dangerouslySetInnerHTML={{__html: window.SynapseIcons && window.SynapseIcons.film ? window.SynapseIcons.film() : ""}} />
              <div className="oa-preview-empty__title">{t("mediaPost.preview.empty.title")}</div>
              <div className="oa-preview-empty__hint">{t("mediaPost.preview.empty.hint")}</div>
            </div>
          )}
          {startedTask && (
            <div className="modal-mask" onClick={() => setStartedTask(null)}>
              <div className="modal-card" onClick={e => e.stopPropagation()}>
                <div className="modal-icon"
                     dangerouslySetInnerHTML={{__html: window.SynapseIcons?.check?.() || ""}} />
                <div className="modal-title">{t("mediaPost.common.taskStarted")}</div>
                <div className="modal-desc">
                  ID: <code>{startedTask.id}</code><br/>
                  {t("mediaPost.cost.estimate")}: 楼{(startedTask.cost_estimated || 0).toFixed(4)}
                </div>
                <div className="modal-actions">
                  <button className="btn" onClick={() => setStartedTask(null)}>{t("mediaPost.common.continue")}</button>
                  <button className="btn btn-primary" onClick={() => { setStartedTask(null); onTaskCreated && onTaskCreated(startedTask, true); }}>
                    {t("mediaPost.common.goTasks")}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function TaskCard({ task, selected, onClick, t }) {
  // Per-mode SVG glyph (kit fallback chain): cover_pick鈫抜mage, multi_aspect鈫抳ideo,
  // seo_pack鈫抣istTask, chapter_cards鈫抌ook. Keeps thumbnails on the no-emoji rule.
  const iconName = ({

    <div className={`task-card ${selected ? "selected" : ""}`} onClick={onClick}>
      <div className="task-thumb"
           dangerouslySetInnerHTML={{__html: iconHtml}} />

        <h4>{task.id} 路 {t(`mediaPost.modes.${task.mode}.title`)}</h4>
        <div className="task-meta">
          <span className={`tag ${STATUS_TAG[task.status] || "tag-gray"}`}>{t(`mediaPost.common.status.${task.status}`) || task.status}</span>
          <span>{fmtDate(task.created_at)}</span>
          {task.cost_estimated > 0 && <span>楼{task.cost_estimated.toFixed(4)}</span>}

          <div className="progress"><div style={{width: `${(task.progress || 0) * 100}%`}} /></div>

}

function SeoTabbedPanel({ taskId, t }) {
  const [items, setItems] = useState([]);
  const [active, setActive] = useState(null);
  useEffect(() => {
    pluginApi("GET", `/tasks/${taskId}/results/seo`).then(r => {
      if (r.ok) { setItems(r.body || []); setActive((r.body || [])[0] && r.body[0].platform); }
    });
  }, [taskId]);
  if (!items.length) return <div className="empty-state">{t("mediaPost.tasks.detail.empty")}</div>;
  const cur = items.find(i => i.platform === active) || items[0];
  const payload = (cur && cur.payload) || {};
  return (
    <div>
      <div className="oa-section-label">{t("mediaPost.tasks.detail.seo", { n: items.length })}</div>
      <div className="tabs" style={{padding:0, marginBottom:12, background:"transparent"}}>
        {items.map(it => (
          <div key={it.platform} className={`tab ${cur.platform === it.platform ? "active" : ""}`}
               onClick={() => setActive(it.platform)}>
            {t(`mediaPost.forms.platforms.${it.platform}`) || it.platform}
            {payload._error ? <span style={{marginLeft:4, color:"var(--danger)"}}
              dangerouslySetInnerHTML={{__html: window.SynapseIcons?.warning?.() || ""}} /> : null}
          </div>
        ))}
      </div>
      {payload._error
        ? <div className="oa-error-coach"><div className="oa-error-coach__title">{payload._error}</div></div>
        : (<div className="card">
            {Object.entries(payload).map(([k, v]) => (
              <div key={k} className="form-row">
                <div className="label flex justify-between" style={{display:"flex"}}>
                  <span>{k}</span>
                  <button className="btn btn-sm" onClick={() => copyToClipboard(typeof v === "string" ? v : JSON.stringify(v))}>{t("mediaPost.tasks.detail.copy")}</button>
                </div>
                <div className="oa-md-content" style={{whiteSpace:"pre-wrap"}}>{typeof v === "string" ? v : JSON.stringify(v, null, 2)}</div>
              </div>
            ))}
            <button className="btn btn-sm" onClick={() => copyToClipboard(JSON.stringify(payload, null, 2))}>
              {t("mediaPost.tasks.detail.copyAll")}
            </button>
          </div>)}
    </div>
  );
}

function ErrorCoach({ task, t, onRetry }) {
  if (!task || task.status !== "failed") return null;
  const kind = task.error_kind || "unknown";
  return (
    <div className="oa-error-coach">
      <div className="oa-error-coach__title">{t(`mediaPost.errors.${kind}.label`)} 路 {task.error_message || ""}</div>
      <ul className="oa-error-coach__list">
        {[1,2,3].map(i => {
          const k = `mediaPost.errors.${kind}.h${i}`;
          const v = t(k);
          return v && v !== k ? <li key={i}>{v}</li> : null;
        })}
      </ul>
      <div className="oa-error-coach__actions">
        <button className="btn btn-sm" onClick={onRetry}>{t("mediaPost.common.retry")}</button>
        <button className="btn btn-sm" onClick={() => copyToClipboard(JSON.stringify(task, null, 2))}>{t("mediaPost.common.copyLog")}</button>
      </div>
    </div>
  );
}

function TasksTab({ t, refreshTrigger }) {
  const [tasks, setTasks] = useState([]);
  const [filterMode, setFilterMode] = useState("");
  const [filterStatus, setFilterStatus] = useState("");
  const [search, setSearch] = useState("");
  const [selectedId, setSelectedId] = useState(null);
  const [selectedTask, setSelectedTask] = useState(null);

  const refresh = useCallback(async () => {
    const q = [];
    if (filterMode) q.push(`mode=${filterMode}`);
    if (filterStatus) q.push(`status=${filterStatus}`);
    const r = await pluginApi("GET", `/tasks${q.length ? "?" + q.join("&") : ""}`);
    if (r.ok && r.body && r.body.tasks) setTasks(r.body.tasks);
  }, [filterMode, filterStatus]);

  useEffect(() => { refresh(); }, [refresh, refreshTrigger]);
  useEffect(() => {
    const id = setInterval(refresh, 3000);
    return () => clearInterval(id);
  }, [refresh]);
  useEffect(() => {
    return onEvent("task_update", () => refresh());
  }, [refresh]);
  useEffect(() => {
    if (!selectedId) return;
    pluginApi("GET", `/tasks/${selectedId}`).then(r => r.ok && setSelectedTask(r.body));
  }, [selectedId, tasks]);

  const filtered = tasks.filter(tk => !search || tk.id.includes(search) || (tk.video_path || "").includes(search));

  async function cancel() { if (selectedId) { await pluginApi("POST", `/tasks/${selectedId}/cancel`); refresh(); } }
  async function retry() { if (selectedId) { const r = await pluginApi("POST", `/tasks/${selectedId}/retry`); if (r.ok) refresh(); } }
  async function approve() { if (selectedId) { await pluginApi("POST", `/tasks/${selectedId}/approve`); refresh(); } }
  async function del() { if (selectedId) { await pluginApi("DELETE", `/tasks/${selectedId}`); setSelectedId(null); refresh(); } }

  const detail = (() => {
    if (!selectedTask) return <div className="empty-state">{t("mediaPost.tasks.detail.empty")}</div>;
    const tk = selectedTask;
    return (
      <div>
        <div className="flex items-center justify-between" style={{marginBottom:12}}>
          <div>
            <div style={{fontSize:15, fontWeight:600, color:"var(--text)", marginBottom:2}}>
              {t(`mediaPost.modes.${tk.mode}.title`)}
            </div>
            <div className="text-xs text-dim">ID: <code>{tk.id}</code> 路 {fmtDate(tk.created_at)}</div>
          </div>
          <div className="flex gap-2">
            <span className={`oa-pill ${tk.status === "completed" ? "green" : tk.status === "failed" ? "red" : tk.status === "approval_required" ? "orange" : "gray"}`}>
              {t(`mediaPost.common.status.${tk.status}`) || tk.status}
            </span>
            {tk.status === "running" && <button className="btn btn-sm" onClick={cancel}>{t("mediaPost.tasks.actions.cancel")}</button>}
            {tk.status === "approval_required" && <button className="btn btn-sm btn-primary" onClick={approve}>{t("mediaPost.tasks.actions.approve")}</button>}
            {(tk.status === "failed" || tk.status === "cancelled") && <button className="btn btn-sm" onClick={retry}>{t("mediaPost.tasks.actions.retry")}</button>}
            <button className="btn btn-sm btn-danger" onClick={del}>{t("mediaPost.tasks.actions.delete")}</button>
          </div>
        </div>
        {tk.status === "running" && (
          <div className="progress"><div style={{width: `${(tk.progress || 0) * 100}%`}} /></div>
        )}
        <ErrorCoach task={tk} t={t} onRetry={retry} />
        {tk.mode === "cover_pick" && <CoverGallery taskId={tk.id} t={t} />}
        {tk.mode === "multi_aspect" && <RecomposeViewer taskId={tk.id} t={t} />}
        {tk.mode === "seo_pack" && <SeoTabbedPanel taskId={tk.id} t={t} />}
        {tk.mode === "chapter_cards" && <ChaptersGallery taskId={tk.id} t={t} />}
      </div>
    );
  })();

  return (
    <div>
      <div className="split-layout">
        <div className="split-left oa-list-panel" style={{width:"50%"}}>
          <div className="oa-list-panel__filters">
            <div>
              <div className="oa-section-label">{t("mediaPost.tasks.all")} <span className="oa-pill">{tasks.length}</span></div>
              <div className="flex gap-2 flex-wrap">
                <select className="input select" value={filterMode}
                        onChange={e => setFilterMode(e.target.value)}
                        style={{flex:1, minWidth:120}}>
                  <option value="">{t("mediaPost.tasks.filter.all")} 路 {t("mediaPost.tasks.filter.mode")}</option>
                  {["cover_pick","multi_aspect","seo_pack","chapter_cards"].map(m => (
                    <option key={m} value={m}>{t(`mediaPost.modes.${m}.title`)}</option>
                  ))}
                </select>
                <select className="input select" value={filterStatus}
                        onChange={e => setFilterStatus(e.target.value)}
                        style={{flex:1, minWidth:120}}>
                  <option value="">{t("mediaPost.tasks.filter.all")} 路 {t("mediaPost.tasks.filter.status")}</option>
                  {["pending","running","completed","failed","cancelled","approval_required"].map(s => (
                    <option key={s} value={s}>{t(`mediaPost.common.status.${s}`)}</option>
                  ))}
                </select>
              </div>
            </div>
            <div className="flex gap-2">
              <input className="input flex-1" placeholder={t("mediaPost.tasks.filter.search")}
                     value={search} onChange={e => setSearch(e.target.value)} />
              <button className="btn btn-sm" onClick={refresh}>{t("mediaPost.common.refresh")}</button>
            </div>
          </div>
          <hr className="oa-list-panel__divider" />
          <div className="oa-list-panel__items">
            {filtered.length === 0 ? (
              <div className="oa-preview-empty" style={{minHeight:160, padding:"24px 16px"}}>
                <span className="oa-preview-empty__icon"
                      dangerouslySetInnerHTML={{__html: window.SynapseIcons && window.SynapseIcons.listTask ? window.SynapseIcons.listTask() : ""}} />
                <div className="oa-preview-empty__title">{t("mediaPost.tasks.empty.title")}</div>
                <div className="oa-preview-empty__hint">{t("mediaPost.tasks.empty.hint")}</div>
              </div>
            ) : filtered.map(tk => (
              <TaskCard key={tk.id} task={tk} selected={tk.id === selectedId}
                        onClick={() => setSelectedId(tk.id)} t={t} />
            ))}
          </div>
          <div className="oa-list-panel__footer">
            <span className="text-xs text-dim">{t("mediaPost.tasks.total", { n: filtered.length })}</span>

// Inline help bubble. We deliberately use a click-to-toggle design 鈥?

// the user is asking for ("VLM 杩欎釜鏄共鍢涚殑銆佷粈涔堟剰鎬?).
function MpInfo({ children }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    if (!open) return;
    const off = () => setOpen(false);
    document.addEventListener("click", off);
    return () => document.removeEventListener("click", off);
  }, [open]);
  return (
    <span className="mp-info-tip">
      <button type="button" className="mp-info-tip__btn"
              aria-label="info"
              onClick={(e) => { e.stopPropagation(); setOpen(o => !o); }}>?</button>

        <span className="mp-info-tip__bubble" onClick={(e) => e.stopPropagation()}>
          {children}
        </span>
      )}
    </span>
  );
}

// FfmpegInstaller 鈥?verbatim port of seedance-video's component. Talks to
// the in-plugin /system/components + /system/{dep_id}/{install,uninstall,status}
// routes wired in plugin.py. Same fire-and-poll cadence (3s tick) so a
// running install survives the user re-opening the Settings tab.
function FfmpegInstaller({ t, onInstalled }) {
  const [snap, setSnap] = useState(null);
  const [loading, setLoading] = useState(true);
  const [busyOp, setBusyOp] = useState("");
  const [status, setStatus] = useState(null);
  const [copied, setCopied] = useState(false);
  const [confirmingUninstall, setConfirmingUninstall] = useState(false);
  const [rechecking, setRechecking] = useState(false);
  const pollRef = useRef(null);
  const logRef = useRef(null);
  const opNotifiedRef = useRef(false);

  const refresh = useCallback(async () => {
    try {
      const r = await pluginApi("GET", "/system/components");
      const item = (r.body?.items || []).find(x => x.id === "ffmpeg");
      if (item) {
        setSnap(item);
        if (item.busy) setBusyOp(item.last_install?.op_kind || "install");
      }
    } catch (e) {
      setSnap({ id: "ffmpeg", found: false, methods: [], uninstall_methods: [], is_root: false });
    }
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [status?.log_tail?.length]);

  const stopPolling = useCallback(() => {
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
  }, []);

  useEffect(() => {
    if (!busyOp) { stopPolling(); return; }
    opNotifiedRef.current = false;
    const tick = async () => {
      try {
        const r = await pluginApi("GET", "/system/ffmpeg/status");
        const st = r.body || {};
        setStatus(st);
        if (!st.busy) {
          stopPolling();
          const finishedOp = busyOp;
          setBusyOp("");
          await refresh();
          if (opNotifiedRef.current) return;
          opNotifiedRef.current = true;
          if (finishedOp === "uninstall") {
            if (!st.found) { showToast(t("mediaPost.settings.system.uninstalled")); }
            else { showToast(t("mediaPost.settings.system.uninstallFailed", { msg: st.error || "?" }), "error"); }
          } else {
            if (st.found) {
              showToast(t("mediaPost.settings.system.installed"));
              if (onInstalled) onInstalled(true);
            } else {
              showToast(t("mediaPost.settings.system.installFailed", { msg: st.error || "?" }), "error");
            }
          }
        }
      } catch (e) { /* network blip 鈥?try again next tick */ }
    };
    tick();
    pollRef.current = setInterval(tick, 3000);
    return stopPolling;
  }, [busyOp, refresh, stopPolling, onInstalled, t]);

  useEffect(() => () => stopPolling(), [stopPolling]);

  const formatElapsed = (sec) => {
    const s = Math.max(0, Math.round(sec || 0));
    return String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
  };

  const startInstall = async (methodIndex) => {
    setStatus({ busy: true, log_tail: [], elapsed_sec: 0, op_kind: "install" });
    setBusyOp("install");
    try {
      const r = await pluginApi("POST", "/system/ffmpeg/install", { method_index: methodIndex });
      const body = r.body || {};
      if (body.ok === false) {
        setBusyOp("");
        showToast(t("mediaPost.settings.system.installFailed", { msg: body.error || "unknown" }), "error");
      }
    } catch (e) {
      setBusyOp("");
      showToast(t("mediaPost.settings.system.installFailed", { msg: e.message || "network error" }), "error");
    }
  };

  const startUninstall = async (methodIndex) => {
    setConfirmingUninstall(false);
    setStatus({ busy: true, log_tail: [], elapsed_sec: 0, op_kind: "uninstall" });
    setBusyOp("uninstall");
    try {
      const r = await pluginApi("POST", "/system/ffmpeg/uninstall", { method_index: methodIndex });
      const body = r.body || {};
      if (body.ok === false) {
        setBusyOp("");
        showToast(t("mediaPost.settings.system.uninstallFailed", { msg: body.error || "unknown" }), "error");
      }
    } catch (e) {
      setBusyOp("");
      showToast(t("mediaPost.settings.system.uninstallFailed", { msg: e.message || "network error" }), "error");
    }
  };

  const handleRecheck = async () => {
    if (rechecking || busyOp) return;
    setRechecking(true);
    const t0 = Date.now();
    try { await refresh(); }
    finally {
      const elapsed = Date.now() - t0;
      if (elapsed < 400) await new Promise(r => setTimeout(r, 400 - elapsed));
      setRechecking(false);
    }
  };

  const copyCmd = (cmd) => {
    if (!cmd) return;
    if (window.Synapse?.clipboard) window.Synapse.clipboard(cmd);
    else if (navigator.clipboard) navigator.clipboard.writeText(cmd);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  if (loading) {
    return (
      <div className="sysdep-card">
        <div className="sysdep-card__head">
          <span className="sysdep-spinner"/>
          <span className="sysdep-card__title">{t("mediaPost.settings.system.detecting")}</span>
        </div>
      </div>
    );
  }

  const found = !!snap?.found;
  const methods = snap?.methods || [];
  const uninstallMethods = snap?.uninstall_methods || [];
  const isRoot = !!snap?.is_root;
  const installing = busyOp === "install";
  const uninstalling = busyOp === "uninstall";
  const busy = !!busyOp;
  const liveStatus = busy ? status : (snap?.last_install || null);
  const logLines = liveStatus?.log_tail || [];
  const lastOpKind = liveStatus?.op_kind || "install";

  const primaryIdx = (() => {
    for (let i = 0; i < methods.length; i++) {
      const m = methods[i];
      if (m.strategy === "manual") continue;
      if (m.requires_sudo && !isRoot) continue;
      return i;
    }
    return methods.findIndex(m => m.strategy !== "manual");
  })();
  const primary = primaryIdx >= 0 ? methods[primaryIdx] : null;
  const manualMethod = methods.find(m => m.strategy === "manual");
  const blockingSudoMethod = (!found && primary == null)
    ? methods.find(m => m.requires_sudo && !isRoot) : null;

  const uninstallPrimaryIdx = (() => {
    for (let i = 0; i < uninstallMethods.length; i++) {
      const m = uninstallMethods[i];
      if (m.strategy === "manual") continue;
      if (m.requires_sudo && !isRoot) continue;
      return i;
    }
    return -1;
  })();
  const uninstallPrimary = uninstallPrimaryIdx >= 0 ? uninstallMethods[uninstallPrimaryIdx] : null;

  return (
    <div className="sysdep-card">
      <div className="sysdep-card__head">
        <div className="sysdep-card__title">
          <MpIco name="settings"/> FFmpeg
          {uninstalling
            ? <span className="sysdep-card__badge sysdep-card__badge--busy">
                <span className="sysdep-spinner"/>
                {t("mediaPost.settings.system.uninstalling", { elapsed: formatElapsed(liveStatus?.elapsed_sec) })}
              </span>
            : installing
              ? <span className="sysdep-card__badge sysdep-card__badge--busy">
                  <span className="sysdep-spinner"/>
                  {t("mediaPost.settings.system.installing", { elapsed: formatElapsed(liveStatus?.elapsed_sec) })}
                </span>
              : found
                ? <span className="sysdep-card__badge sysdep-card__badge--ok">
                    <MpIco name="check"/>
                    {snap.version
                      ? t("mediaPost.settings.system.found", { ver: snap.version })
                      : t("mediaPost.settings.system.foundNoVer")}
                  </span>
                : <span className="sysdep-card__badge sysdep-card__badge--missing">
                    <MpIco name="warning"/> {t("mediaPost.settings.system.missing")}
                  </span>}
        </div>
      </div>
      {found && snap.location && (
        <div className="sysdep-card__path">{t("mediaPost.settings.system.location", { path: snap.location })}</div>
      )}

      <div className="sysdep-card__actions">
        {!busy && !found && primary && (
          <button className="btn btn-sm btn-primary"
                  onClick={() => startInstall(primaryIdx)}
                  title={primary.command_hint || primary.strategy}>
            <MpIco name="download"/> {t("mediaPost.settings.system.btn.install")}
          </button>
        )}
        {!busy && found && uninstallPrimary && !confirmingUninstall && (
          <button className="btn btn-sm"
                  onClick={() => setConfirmingUninstall(true)}
                  title={uninstallPrimary.command_hint || uninstallPrimary.strategy}
                  style={{borderColor:"var(--danger)", color:"var(--danger)"}}>
            {t("mediaPost.settings.system.btn.uninstall")}
          </button>
        )}
        {!busy && (
          <button className="btn btn-sm" onClick={handleRecheck} disabled={rechecking}>
            {rechecking
              ? <><span className="sysdep-spinner"/>{" "}{t("mediaPost.settings.system.detecting")}</>
              : <><MpIco name="refresh"/> {t("mediaPost.settings.system.btn.recheck")}</>}
          </button>
        )}
        {snap?.homepage && (
          <a className="btn btn-sm" href={snap.homepage} target="_blank" rel="noopener noreferrer">
            {t("mediaPost.settings.system.btn.openHome")}
          </a>
        )}
      </div>

      {!busy && found && confirmingUninstall && uninstallPrimary && (
        <div className="sysdep-card__sudo-hint"
             style={{borderColor:"var(--danger)", background:"rgba(239,68,68,.08)"}}>
          <div style={{whiteSpace:"pre-wrap", color:"var(--text)", fontSize:12, lineHeight:1.6}}>
            {t("mediaPost.settings.system.uninstallConfirm")}
          </div>
          <div className="sysdep-card__sudo-cmd" style={{marginTop:10}}>
            <code>{uninstallPrimary.command_hint || uninstallPrimary.strategy}</code>
          </div>
          <div style={{display:"flex", gap:6, marginTop:10, justifyContent:"flex-end"}}>
            <button className="btn btn-sm" onClick={() => setConfirmingUninstall(false)}>
              {t("mediaPost.common.cancel")}
            </button>
            <button className="btn btn-sm"
                    style={{background:"var(--danger)", color:"#fff", borderColor:"var(--danger)"}}
                    onClick={() => startUninstall(uninstallPrimaryIdx)}>
              {t("mediaPost.settings.system.btn.uninstallConfirm")}
            </button>
          </div>
        </div>
      )}

      {!found && !busy && !primary && manualMethod && !blockingSudoMethod && (
        <div className="sysdep-card__sudo-hint" style={{borderLeft:"3px solid var(--primary)"}}>
          {t("mediaPost.settings.system.noMethod")}
        </div>
      )}

      {!found && !busy && blockingSudoMethod && blockingSudoMethod.command_hint && (
        <div className="sysdep-card__sudo-hint">
          <div>{t("mediaPost.settings.system.requiresSudo")}</div>
          <div className="sysdep-card__sudo-cmd">
            <code>sudo {blockingSudoMethod.command_hint}</code>
            <button className="btn btn-sm" onClick={() => copyCmd("sudo " + blockingSudoMethod.command_hint)}>
              {copied ? t("mediaPost.settings.system.btn.copied") : t("mediaPost.settings.system.btn.copyCmd")}
            </button>
          </div>
        </div>
      )}

      {(busy || logLines.length > 0) && (
        <div className="sysdep-log">
          <div className="sysdep-log__head">
            <span>{lastOpKind === "uninstall"
              ? t("mediaPost.settings.system.logTitleUninstall")
              : t("mediaPost.settings.system.logTitle")}</span>
            {busy && liveStatus?.elapsed_sec != null && (
              <span>{formatElapsed(liveStatus.elapsed_sec)}</span>
            )}
          </div>
          {logLines.length === 0
            ? <pre className="sysdep-log__body sysdep-log__body--empty">{t("mediaPost.settings.system.logEmpty")}</pre>
            : <pre className="sysdep-log__body" ref={logRef}>{logLines.join("\n")}</pre>}
        </div>
      )}
    </div>
  );
}

function SettingsTab({ t, settings, onSaved }) {
  const [draft, setDraft] = useState(settings || {});
  const [savedFlash, setSavedFlash] = useState(false);
  const [savingApi, setSavingApi] = useState(false);
  const [keyDraft, setKeyDraft] = useState("");
  const [showKey, setShowKey] = useState(false);

  // Real-time Playwright probe (single source of truth for the pill;
  // we ignore the cached `playwright_enabled` config flag in the UI so
  // status reflects the live runtime, mirroring seedance-video's approach).
  const [pw, setPw] = useState({ status: "idle", available: false, error: "" });
  // Storage stats for the host-allocated data dir. Read-only display +
  // open-folder shortcut; this plugin doesn't expose user-selectable paths
  // because uploads/tasks are managed centrally by the host SDK.
  const [storage, setStorage] = useState(null);

  useEffect(() => { setDraft(settings || {}); }, [settings]);
  function set(k, v) { setDraft(d => ({ ...d, [k]: v })); }

  async function probePlaywright() {
    setPw(s => ({ ...s, status: "checking" }));
    try {
      const r = await pluginApi("GET", "/playwright/probe");
      if (r.ok && r.body) {
        setPw({
          status: "done",
          available: !!r.body.available,
          error: r.body.error || "",
        });
      } else {
        setPw({ status: "done", available: false, error: "probe failed" });
      }
    } catch (e) {
      setPw({ status: "done", available: false, error: String(e && e.message || e) });
    }
  }
  async function loadStorage() {
    try {
      const r = await pluginApi("GET", "/storage/stats");
      if (r.ok) setStorage(r.body);
    } catch (_) {}
  }
  useEffect(() => { probePlaywright(); loadStorage(); }, []);

  async function saveApiKey() {
    setSavingApi(true);
    try {
      const r = await pluginApi("PUT", "/settings", { updates: { dashscope_api_key: keyDraft } });
      if (r.ok) {
        set("dashscope_api_key", keyDraft);
        setKeyDraft("");
        showToast(t(keyDraft ? "mediaPost.settings.api.toast.saved" : "mediaPost.settings.api.toast.cleared"));
        onSaved && onSaved();
      } else {
        showToast(t("mediaPost.settings.saveFailed"), "error");
      }
    } catch (e) {
      showToast(t("mediaPost.settings.saveFailed") + ": " + (e && e.message || e), "error");
    }
    setSavingApi(false);
  }

  async function save() {
    // Bulk save excludes the API key (handled by its own Save button so the
    // visible password value never travels with unrelated edits).
    const updates = { ...draft };
    delete updates.dashscope_api_key;
    const r = await pluginApi("PUT", "/settings", { updates });
    if (r.ok) {
      setSavedFlash(true);
      setTimeout(() => setSavedFlash(false), 1500);
      onSaved && onSaved();
    } else {
      showToast(t("mediaPost.settings.saveFailed"), "error");
    }
  }

  const apiOk = !!draft.dashscope_api_key;
  const tplId = draft.chapter_template_default || "modern";
  const tplDescKey = "mediaPost.forms.template." + tplId + ".desc";

  function copyText(s) {
    if (!s) return;
    if (window.Synapse && typeof window.Synapse.clipboard === "function") {
      window.Synapse.clipboard(s);
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(s);
    }
    showToast("Copied");
  }
  function openFolder(p) {
    if (!p) return;
    if (window.Synapse && typeof window.Synapse.showInFolder === "function") {
      window.Synapse.showInFolder(p);
    } else if (window.parent && window.parent !== window) {
      try { window.parent.postMessage({ type: "bridge:show-in-folder", payload: { path: p } }, "*"); } catch (_) {}
    }
  }

  return (
    <div style={{maxWidth: 640}}>
      {/* 鈹€鈹€ API Key (Seedance-style field-level callout) 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */}
      <div className="setting-section oa-settings-section">
        <h3 className="oa-settings-section__title"><MpIco name="key"/>{t("mediaPost.settings.api.title")}</h3>
        <div className={"form-row" + (apiOk ? "" : " oa-config-field-callout")}
             data-callout={apiOk ? undefined : t("mediaPost.settings.api.required")}>
          <label className="label">{t("mediaPost.settings.api.label")}</label>
          <div className="flex gap-2">
            <input className="input flex-1" type={showKey ? "text" : "password"}
                   value={keyDraft !== "" ? keyDraft : (draft.dashscope_api_key || "")}
                   onChange={e => setKeyDraft(e.target.value)}
                   placeholder={t("mediaPost.settings.api.placeholder")} />
            <button className="btn btn-sm" onClick={() => setShowKey(!showKey)}>
              {showKey ? t("mediaPost.settings.api.hide") : t("mediaPost.settings.api.show")}
            </button>
            <button className="btn btn-sm btn-primary" disabled={!keyDraft || savingApi}
                    onClick={saveApiKey}>
              {t("mediaPost.settings.api.saveBtn")}
            </button>
          </div>
          <p className="text-xs text-dim" style={{marginTop:4}}>{t("mediaPost.settings.api.helper")}</p>
          <div className="flex items-center gap-2" style={{marginTop:6}}>
            <span className={"oa-pill " + (apiOk ? "green" : "red")}>
              {apiOk ? t("mediaPost.settings.api.ok") : t("mediaPost.settings.api.missing")}
            </span>
          </div>

        <div className="grid-2">
          <div className="form-row">
            <label className="label">鍏变韩涓浆绔欏悕绉帮紙鍙€夛級</label>
            <input className="input" type="text"
                   value={draft.dashscope_relay_endpoint || ""}
                   onChange={e => set("dashscope_relay_endpoint", e.target.value)}
                   placeholder="渚嬪: yunwu-vision" />
            <p className="text-xs text-dim" style={{marginTop:4}}>鏉ヨ嚜 LLM 閰嶇疆椤?relay_endpoints锛涗繚瀛樺悗 VLM 璇锋眰浼樺厛璧拌涓浆绔欍€?/p>

// 鈹€鈹€鈹€ App shell 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
function App() {
  const { t, locale } = useI18n();
  const [tab, setTab] = useState("create");
  const [settings, setSettings] = useState(null);
  const [refreshTrigger, setRefreshTrigger] = useState(0);

  const reloadSettings = useCallback(async () => {
    const r = await pluginApi("GET", "/settings");
    if (r.ok) setSettings(r.body);
  }, []);
  useEffect(() => { reloadSettings(); }, [reloadSettings]);

  function onTaskCreated(_task, gotoTasks) {
    setRefreshTrigger(x => x + 1);
    if (gotoTasks) setTab("tasks");
  }

  // Theme + locale are owned by the host shell (Synapse main window).
  // The bridge listens for `bridge:theme-change` (see <script> at top of file)
  // and SynapseI18n re-emits onChange when host locale flips. We deliberately
  // do NOT render plugin-local toggles for either 鈥?that would create a second
  // source of truth that drifts from every other plugin. Mirrors tongyi-image
  // (see plugins/tongyi-image/ui/dist/index.html L848-L863, where the
  // `.header-right` slot is documented as intentionally empty).

  const apiMissing = !settings || !settings.dashscope_api_key;

  return (
    <div className="app">
      <div className="header">
        <h1 className="oa-hero-title">
          <span className="oa-hero-title__icon"
                dangerouslySetInnerHTML={{__html: window.SynapseIcons && window.SynapseIcons.film ? window.SynapseIcons.film() : ""}} />
          <span className="oa-hero-title__text">
            {t("app.title")}
            <span className="oa-hero-title__sub">{t("app.subtitle")}</span>
          </span>
        </h1>
        {/* header-right intentionally empty 鈥?see comment above. */}
        <div className="header-right" />
      </div>
      <div className="tabs">
        {["create","tasks","library","settings"].map(k => (
          <div key={k} className={`tab ${tab === k ? "active" : ""}`} data-tab={k} onClick={() => setTab(k)}>
            {t(`mediaPost.tabs.${k}`)}
          </div>
        ))}
      </div>
      {apiMissing && tab !== "settings" && (
        <div className="oa-config-banner" role="alert"
             style={{margin:"12px 20px 0", flexShrink:0}}>
          <span className="oa-icon oa-config-banner__icon"
                dangerouslySetInnerHTML={{__html: window.SynapseIcons && window.SynapseIcons.warning ? window.SynapseIcons.warning() : ""}} />
          <div className="oa-config-banner__text">
            <strong>{t("mediaPost.banner.noKey.title")}</strong>
            <div style={{fontSize:12, color:"var(--text-muted)", marginTop:2}}>
              {t("mediaPost.banner.noKey.desc")}
            </div>
          </div>
          <button className="oa-config-banner__action" type="button"
                  onClick={() => setTab("settings")}>
            {t("mediaPost.banner.noKey.cta")}
            <span className="oa-icon"
                  dangerouslySetInnerHTML={{__html: window.SynapseIcons && window.SynapseIcons.arrowRight ? window.SynapseIcons.arrowRight() : ""}} />
          </button>
        </div>
      )}
      <div className="content">
        {tab === "create" && <CreateTab t={t} settings={settings} onTaskCreated={onTaskCreated} gotoSettings={() => setTab("settings")} />}
        {tab === "tasks" && <TasksTab t={t} refreshTrigger={refreshTrigger} />}
        {tab === "library" && <LibraryTab t={t} />}
        {tab === "settings" && <SettingsTab t={t} settings={settings} onSaved={reloadSettings} />}
      </div>
    </div>
  );
}

class PluginErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("[media-post] render error:", error, info); }
  render() {
    if (!this.state.error) return this.props.children;
    return (
      <div style={{padding: 24}}>
        <div className="oa-config-banner danger">
          <span className="oa-config-banner__icon"
                dangerouslySetInnerHTML={{__html: window.SynapseIcons?.warning?.() || ""}} />
          <div className="oa-config-banner__text">
            <strong>UI render error</strong>
            <div className="text-xs">{String(this.state.error.message || this.state.error)}</div>
          </div>
          <button className="oa-config-banner__action" onClick={() => this.setState({ error: null })}>Reset</button>
        </div>
      </div>
    );
  }
}

console.log("[media-post] Mounting React app...");
try {
  window.__mpRendered = true;
  ReactDOM.createRoot(document.getElementById("root")).render(
    <PluginErrorBoundary><App /></PluginErrorBoundary>

} catch (mountErr) {
  document.getElementById("root").innerHTML =
    '<div style="padding:24px;color:#ef4444"><b>[media-post mount error]</b><pre style="margin-top:8px;white-space:pre-wrap;font-size:11px">' +
    (mountErr && mountErr.stack ? mountErr.stack : String(mountErr)) + '</pre></div>';
}
if (window.Synapse && typeof window.Synapse.ready === "function") {

<script>
/* =================================================================
 * Manual compile-and-execute (mirror of subtitle-craft fix 523d5d0f
 * and clip-sense fix 1cadcacd).
 *
 * Reads the JSX source from <script type="text/plain" id="mp-jsx-source">,
 * runs Babel.transform({ presets: ["react"] }) inside try/catch, then
 * eval()s the compiled code inside another try/catch. Both failures
 * surface as in-page panels with full stacks instead of the opaque
 * cross-origin "Script error." that <script type="text/babel"> swallows.
 * ================================================================= */
(function() {
  console.log("[media-post] Manual compile+execute starting...");
  var srcEl = document.getElementById("mp-jsx-source");
  if (!srcEl) { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>Source element not found</b></div>'; return; }
  if (typeof Babel === "undefined") { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>Babel not loaded (CDN issue?)</b></div>'; return; }
  if (typeof React === "undefined") { document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444"><b>React not loaded (CDN issue?)</b></div>'; return; }
  var code;
  try {
    var result = Babel.transform(srcEl.textContent, { presets: ["react"], filename: "media-post.jsx" });
    code = result.code;
    console.log("[media-post] Compilation OK (" + code.length + " chars)");
  } catch (compileErr) {
    console.error("[media-post] COMPILE ERROR:", compileErr);
    document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444;font-size:13px"><b>Babel Compilation Error</b><pre style="margin-top:12px;white-space:pre-wrap;font-size:12px;background:#fef2f2;padding:16px;border:1px solid #fecaca;border-radius:8px;overflow:auto;max-height:500px">' + (compileErr.stack || String(compileErr)) + '</pre></div>';
    return;
  }
  try {
    (0, eval)(code);
    console.log("[media-post] Execution OK");
  } catch (runErr) {
    console.error("[media-post] RUNTIME ERROR:", runErr);
    document.getElementById("root").innerHTML = '<div style="padding:24px;color:#ef4444;font-size:13px"><b>Runtime Error</b><pre style="margin-top:12px;white-space:pre-wrap;font-size:12px;background:#fef2f2;padding:16px;border:1px solid #fecaca;border-radius:8px;overflow:auto;max-height:500px">' + (runErr.stack || String(runErr)) + '</pre></div>';
  }
})();
</script>
