<style>

}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

.image-card img, .image-card video { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }

.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; }

.setting-section { margin-bottom: 24px; }

.guide-code { background: var(--bg-main); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 12.5px; line-height: 1.7; font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", monospace; white-space: pre-wrap; word-break: break-word; margin: 6px 0 12px; color: var(--text); overflow-x: auto; }
.guide-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 6px 0 12px; }
.guide-table th { background: var(--bg-main); font-weight: 600; text-align: left; padding: 8px 12px; border: 1px solid var(--border); }
.guide-table td { padding: 8px 12px; border: 1px solid var(--border); line-height: 1.6; }
.guide-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 12px; }
.guide-tag { display: inline-block; background: var(--bg-main); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--text); white-space: nowrap; }
.guide-atmo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
@media (max-width: 700px) { .guide-atmo-grid { grid-template-columns: 1fr; } }
.guide-template-list { display: flex; flex-direction: column; gap: 10px; }
.guide-template-item { padding: 2px 0; }
.guide-template-item strong { font-size: 13px; }
.guide-template-item .text-sm { font-size: 12px; margin-left: 8px; }
</style>

  toast.style.cssText = "position:fixed;top:16px;right:16px;padding:10px 16px;border-radius:8px;font-size:13px;z-index:9999;color:#fff;background:" + (type === "error" ? "#ef4444" : "#22c55e") + ";box-shadow:0 4px 12px rgba(0,0,0,.15);transition:opacity .3s;";
  toast.textContent = body;
  document.body.appendChild(toast);
  setTimeout(function() { toast.style.opacity = "0"; setTimeout(function() { toast.remove(); }, 300); }, 2500);
}
</script>

function isRequiredParamEmpty(p, vals) {
  if (!p.required) return false;

  if (v === undefined || v === null) return true;
  if (p.type === "toggle" || p.type === "boolean") return false;
  if (typeof v === "boolean") return false;
  if (typeof v === "number" && !Number.isFinite(v)) return true;

// 鈹€鈹€ ImageUpload 鈹€鈹€
function ImageUpload({ value, onChange, label }) {
  const ref = useRef(null);
  const [preview, setPreview] = useState(null);
  const [uploading, setUploading] = useState(false);

  const handleFile = async (file) => {
    if (!file) return;
    setUploading(true);
    try {
      const reader = new FileReader();
      reader.onload = (e) => setPreview(e.target.result);
      reader.readAsDataURL(file);
      const resp = await uploadFile(file);
      if (resp.ok && resp.asset) {
        onChange(resp.asset.id);
        showToast("鍥剧墖宸蹭笂浼?);
      } else {
        showToast("涓婁紶澶辫触", "error");
      }
    } catch (e) {
      showToast("涓婁紶澶辫触: " + e.message, "error");
    }
    setUploading(false);
  };

  return (
    <div
      className={"upload-zone" + (preview ? " has-image" : "")}
      onClick={() => ref.current && ref.current.click()}
      onDragOver={(e) => e.preventDefault()}
      onDrop={(e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}
    >
      <input type="file" ref={ref} accept="image/*" style={{ display: "none" }}
        onChange={(e) => handleFile(e.target.files[0])} />
      {uploading ? (
        <div className="flex items-center justify-between gap-2" style={{justifyContent:"center"}}>
          <div className="spinner-sm"></div> <span className="text-sm">涓婁紶涓?..</span>
        </div>
      ) : preview ? (
        <img src={preview} className="upload-preview" alt="" />
      ) : (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
          <span className="oa-icon" style={{fontSize:24,opacity:.6}}
            dangerouslySetInnerHTML={{__html: window.SynapseIcons ? window.SynapseIcons.upload() : ""}} />
          <div>{label || "鐐瑰嚮鎴栨嫋鎷戒笂浼犲浘鐗?}</div>
        </div>
      )}
    </div>
  );
}

// 鈹€鈹€ MultiImageUpload 鈹€鈹€
function MultiImageUpload({ value, onChange, label, max }) {
  const ref = useRef(null);
  const [items, setItems] = useState([]);
  const [uploading, setUploading] = useState(false);
  const maxCount = max || 20;

  useEffect(() => {
    if (!value || !Array.isArray(value) || value.length === 0) {
      if (items.length > 0) setItems([]);
    }
  }, [value]);

  const handleFiles = async (files) => {
    if (!files || files.length === 0) return;
    setUploading(true);
    const newItems = [...items];
    for (let i = 0; i < files.length && newItems.length < maxCount; i++) {
      const file = files[i];
      try {
        const previewUrl = URL.createObjectURL(file);
        const resp = await uploadFile(file);
        if (resp.ok && resp.asset) {
          newItems.push({ assetId: resp.asset.id, preview: previewUrl, name: file.name });
        } else {
          showToast("涓婁紶澶辫触: " + (file.name), "error");
        }
      } catch (e) {
        showToast("涓婁紶澶辫触: " + e.message, "error");
      }
    }
    setItems(newItems);
    onChange(newItems.map(it => it.assetId));
    setUploading(false);
    if (newItems.length >= maxCount) showToast("鏈€澶氫笂浼?" + maxCount + " 寮犲浘鐗?);
  };

  const removeItem = (idx) => {
    const next = items.filter((_, i) => i !== idx);
    setItems(next);
    onChange(next.map(it => it.assetId));
  };

  return (
    <div>
      <div
        className="upload-zone"
        onClick={() => ref.current && ref.current.click()}
        onDragOver={(e) => e.preventDefault()}
        onDrop={(e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); }}
      >
        <input type="file" ref={ref} accept="image/*" multiple style={{ display: "none" }}
          onChange={(e) => { handleFiles(Array.from(e.target.files || [])); e.target.value = ""; }} />
        {uploading ? (
          <div className="flex items-center justify-between gap-2" style={{justifyContent:"center"}}>
            <div className="spinner-sm"></div> <span className="text-sm">涓婁紶涓?..</span>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
            <span className="oa-icon" style={{fontSize:24,opacity:.6}}
              dangerouslySetInnerHTML={{__html: window.SynapseIcons ? window.SynapseIcons.upload() : ""}} />
            <div>{label || "鐐瑰嚮鎴栨嫋鎷戒笂浼犲寮犲浘鐗?}</div>
          </div>
        )}
      </div>
      {items.length > 0 && (
        <div>
          <div className="multi-upload-count">宸蹭笂浼?{items.length} 寮爗maxCount < 100 ? " / 鏈€澶?" + maxCount + " 寮? : ""}</div>
          <div className="multi-upload-grid">
            {items.map((it, i) => (
              <div key={it.assetId} className="multi-upload-item">
                <img src={it.preview} alt={it.name} />
                <button className="remove-btn" onClick={(e) => { e.stopPropagation(); removeItem(i); }} title="绉婚櫎">脳</button>
              </div>
            ))}
            {items.length < maxCount && (
              <div className="multi-upload-add" onClick={() => ref.current && ref.current.click()} title="缁х画娣诲姞">+</div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// 鈹€鈹€ DynamicForm 鈹€鈹€
function DynamicForm({ feature, params, setParams, pluginApi }) {
  if (!feature) return null;
  const [optimizing, setOptimizing] = React.useState({});

  const OPTIMIZABLE_FIELDS = new Set(["prompt", "selling_points", "storyboard_script", "target_character", "negative_prompt"]);

  const handleOptimize = async (fieldId) => {
    if (!pluginApi) return;
    setOptimizing((prev) => ({...prev, [fieldId]: true}));
    try {
      const kind = feature.api_provider === "ark" ? "video" : "image";
      const catMap = {
        "image_edit": "image_edit", "image_erase": "image_edit",
        "image_batch_edit": "image_edit",
        "image_replace": "image_replace", "image_batch_replace": "image_replace",
        "image_translate": "image_translate",
        "poster_promo": "poster", "poster_festival": "poster", "poster_sale": "poster",
      };
      const category = catMap[feature.id] || (feature.module === "detail" ? "detail" : "image");
      const body = {
        prompt: params[fieldId] || "",
        feature_id: feature.id,
        field_id: fieldId,
        params: {...params},
        kind,
        level: "professional",
        category,
        style: params.style || "",
      };
      if (kind === "video") {
        body.duration = params.duration || 5;
        body.ratio = params.ratio || "16:9";
        body.mode = params.ref_image ? "i2v" : "t2v";
      }
      const resp = await pluginApi("POST", "/prompt-optimize", body);
      if (resp.ok && resp.body && resp.body.optimized) {
        setParams((prev) => ({...prev, [fieldId]: resp.body.optimized}));
        showToast("浼樺寲鎴愬姛");
      } else {
        showToast((resp.body && resp.body.detail) || "浼樺寲澶辫触", "error");
      }
    } catch (e) {
      showToast("浼樺寲澶辫触: " + (e.message || e), "error");
    } finally {
      setOptimizing((prev) => ({...prev, [fieldId]: false}));
    }
  };

  const plist = feature.params || [];
  if (plist.length === 0) {
    return (
      <div className="form-empty-hint">
        鏈敹鍒拌鍔熻兘鐨勫弬鏁板瓧娈碉紙params 涓虹┖锛夈€傝嫢鍒氱儹閲嶈浇杩囨彃浠讹紝璇?strong>閲嶅惎鍚庣</strong>鎴栭噸鏂板姞杞芥彃浠讹紱骞剁‘璁ゅ凡鏇存柊鍒颁慨澶嶃€岄厤缃 pop 娓呯┖銆嶇殑鐗堟湰銆?
      </div>
    );
  }

  const checkVisible = (param) => {
    if (!param.visible_when || param.visible_when.length === 0) return true;
    return param.visible_when.every((cond) => {
      const val = params[cond.field];
      if (cond.eq !== undefined) return val === cond.eq;
      if (cond.in !== undefined) return Array.isArray(cond.in) && cond.in.includes(val);
      if (cond.not_empty) return val !== undefined && val !== "" && val !== null;
      return true;
    });
  };

  const grouped = { basic: [], advanced: [], style: [] };
  plist
    .sort((a, b) => (a.order || 0) - (b.order || 0))
    .forEach((p) => {
      if (checkVisible(p)) {
        const g = p.group || "basic";
        if (!grouped[g]) grouped[g] = [];
        grouped[g].push(p);
      }
    });

  const renderParam = (p) => {
    const val = params[p.id] !== undefined ? params[p.id] : (p.default || "");

    if (p.type === "text") {
      return (
        <div className="form-row" key={p.id}>
          <label className="label">{p.label}{p.required ? " *" : ""}</label>
          <input className="input" type="text" placeholder={p.placeholder || ""}
            value={val} onChange={(e) => setParams({...params, [p.id]: e.target.value})} />
        </div>
      );
    }
    if (p.type === "textarea") {
      const canOpt = OPTIMIZABLE_FIELDS.has(p.id);
      const autoResize = (el) => {
        if (el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 400) + "px"; }
      };
      return (
        <div className="form-row" key={p.id}>
          {canOpt ? (
            <div className="oa-section-label oa-section-label--inline">
              <span>{p.label}{p.required ? " *" : ""}</span>
              <button className="oa-ai-btn" type="button" disabled={optimizing[p.id] || !val}
                onClick={() => handleOptimize(p.id)}
                title="浣跨敤 AI 鑷姩浼樺寲鎻愮ず璇?>
                {optimizing[p.id]
                  ? <span className="spinner-sm" style={{width:11,height:11,borderWidth:1.5}} />
                  : <span className="oa-ai-btn__icon"
                      dangerouslySetInnerHTML={{__html: window.SynapseIcons ? window.SynapseIcons.sparkles() : ""}} />}
                AI 浼樺寲
              </button>
            </div>
          ) : (
            <label className="label">{p.label}{p.required ? " *" : ""}</label>
          )}
          <textarea className="input textarea" placeholder={p.placeholder || ""}
            value={val}
            ref={autoResize}
            onChange={(e) => { setParams({...params, [p.id]: e.target.value}); autoResize(e.target); }}
            style={{overflow: "auto"}} />
        </div>
      );
    }
    if (p.type === "select") {
      const opts = p.options || [];
      const strVal = String(val !== undefined && val !== null ? val : (p.default !== undefined && p.default !== null ? p.default : ""));
      return (
        <div className="form-row" key={p.id}>
          <label className="label">{p.label}{p.required ? " *" : ""}</label>
          <select className="input select" value={strVal}
            onChange={(e) => {
              const raw = e.target.value;
              const hit = opts.find((o) => String(o.value) === raw);
              const coerced = hit && typeof hit.value === "number" ? hit.value : raw;
              setParams({...params, [p.id]: coerced});
            }}>
            {opts.map((o) => (
              <option key={String(o.value)} value={String(o.value)}>{o.label}</option>
            ))}
          </select>
        </div>
      );
    }
    if (p.type === "number") {
      return (
        <div className="form-row" key={p.id}>
          <label className="label">{p.label}</label>
          <input className="input" type="number" min="1" max="10"
            value={val} onChange={(e) => setParams({...params, [p.id]: parseInt(e.target.value) || 1})} />
        </div>
      );
    }
    if (p.type === "image_upload") {
      return (
        <div className="form-row" key={p.id}>
          <label className="label">{p.label}{p.required ? " *" : ""}</label>
          <ImageUpload value={val} label={p.placeholder || p.label}
            onChange={(assetId) => setParams({...params, [p.id]: assetId})} />
        </div>
      );
    }
    if (p.type === "multi_image") {
      return (
        <div className="form-row" key={p.id}>
          <label className="label">{p.label}{p.required ? " *" : ""}</label>
          <MultiImageUpload value={val} label={p.placeholder || "鐐瑰嚮鎴栨嫋鎷戒笂浼犲寮犲浘鐗?}
            max={p.max || 20}
            onChange={(assetIds) => setParams({...params, [p.id]: assetIds})} />
        </div>
      );
    }
    if (p.type === "toggle" || p.type === "boolean") {
      return (
        <div className="form-row" key={p.id}>
          <label className="flex items-center gap-2" style={{cursor:"pointer"}}>
            <input type="checkbox" checked={!!val}
              onChange={(e) => setParams({...params, [p.id]: e.target.checked})} />
            <span className="text-sm">{p.label}</span>
          </label>
        </div>
      );
    }
    return (
      <div className="form-row" key={p.id}>
        <label className="label">{p.label}</label>
        <input className="input" value={val}
          onChange={(e) => setParams({...params, [p.id]: e.target.value})} />
      </div>
    );
  };

  const totalVisible = (grouped.basic || []).length + (grouped.advanced || []).length + (grouped.style || []).length;
  if (totalVisible === 0) {
    return (
      <div className="form-empty-hint">
        褰撳墠绛涢€夋潯浠朵笅娌℃湁鍙鍙傛暟銆傝妫€鏌ヤ緷璧栧瓧娈垫垨鑱旂郴寮€鍙戣€呴厤缃?<code>visible_when</code>銆?
      </div>
    );
  }

  return (
    <div>
      {grouped.basic.length > 0 && grouped.basic.map(renderParam)}
      {grouped.advanced.length > 0 && (
        <Collapsible title="楂樼骇璁剧疆" defaultOpen={false}>
          {grouped.advanced.map(renderParam)}
        </Collapsible>
      )}
      {grouped.style.length > 0 && (
        <Collapsible title="椋庢牸璁剧疆" defaultOpen={false}>
          {grouped.style.map(renderParam)}
        </Collapsible>
      )}
    </div>
  );
}

        </div>
      ) : tasks.map((t) => {
        const st = STATUS_MAP[t.status] || STATUS_MAP.pending;
        const imgs = t.image_urls ? (typeof t.image_urls === "string" ? JSON.parse(t.image_urls || "[]") : t.image_urls) : [];
        const hasProgress = t.progress_total > 1
          && (t.execution_mode === "agent" || t.execution_mode === "batch");
        return (
          <div key={t.id} className={"task-card" + (t.id === selectedId ? " selected" : "")}
            onClick={() => onSelect(t)}>
            <div className="task-thumb">
              {t.task_type === "video" ? <Ic name="video" size="lg" /> :
                imgs.length > 0 ? <img src={imgs[0]} alt="" /> :
                hasProgress ? <span className="text-xs" style={{fontWeight:600,color:"var(--primary)"}}>{t.progress_total}寮?/span> :
                <Ic name="image" size="lg" />}
            </div>
            <div className="task-info">
              <h4>{(t.prompt || "").slice(0, 50) || t.feature_id}</h4>
              <div className="task-meta">
                <span className={"tag " + st.cls}>{st.label}</span>
                {(t.api_task_id && String(t.api_task_id).indexOf("mock-") === 0) && (
                  <span className="tag tag-orange">婕旂ず</span>
                )}
                <span>{new Date(t.created_at * 1000).toLocaleString()}</span>
              </div>
              {hasProgress && t.status === "running" && (
                <div className="progress-bar">
                  <div className="progress-fill" style={{width: (t.progress_current / t.progress_total * 100) + "%"}}></div>
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// 鈹€鈹€ ChildTaskCard 鈹€鈹€
function ChildTaskCard({ child, index, total, onLightbox, onRetried }) {
  const cst = STATUS_MAP[child.status] || STATUS_MAP.pending;
  const cimgs = child.image_urls ? (typeof child.image_urls === "string" ? JSON.parse(child.image_urls || "[]") : child.image_urls) : [];
  const [expanded, setExpanded] = useState(false);
  const [editing, setEditing] = useState(false);
  const [editPrompt, setEditPrompt] = useState(child.prompt || "");
  const [saving, setSaving] = useState(false);
  const [retrying, setRetrying] = useState(false);

  useEffect(() => { setEditPrompt(child.prompt || ""); setEditing(false); }, [child.prompt]);

  const handleSavePrompt = async () => {
    setSaving(true);
    try {
      await pluginApi("PUT", "/tasks/" + child.id, { prompt: editPrompt });
      showToast("宸蹭繚瀛?);
      setEditing(false);
    } catch(e) { showToast("淇濆瓨澶辫触", "error"); }
    setSaving(false);
  };

  const handleRetryChild = async () => {
    setRetrying(true);
    try {
      const resp = await pluginApi("POST", "/tasks/" + child.id + "/retry-child");
      if (resp.body && resp.body.ok) {
        showToast("宸查噸鏂版彁浜?);
        if (onRetried) onRetried();
      } else {
        showToast(resp.body?.detail || "閲嶈窇澶辫触", "error");
      }
    } catch(e) { showToast("閲嶈窇澶辫触: " + e.message, "error"); }
    setRetrying(false);
  };

  return (
    <div className="card" style={{marginTop:8}}>
      <div className="flex items-center justify-between" style={{marginBottom:8}}>
        <div className="flex items-center gap-2">
          <span className={"tag " + cst.cls} style={{fontSize:11}}>{cst.label}</span>
          <span className="text-xs" style={{fontWeight:600}}>瀛愪换鍔?{index+1}/{total}</span>
        </div>
        <div className="flex gap-2">
          {(child.status === "failed" || child.status === "succeeded" || child.status === "cancelled") && (
            <button className="btn btn-sm" onClick={handleRetryChild} disabled={retrying}>
              {retrying ? <span className="spinner-sm"></span> : "閲嶈窇"}
            </button>
          )}
        </div>
      </div>

      {child.prompt && !editing && (
        <div style={{marginBottom:8}}>
          <div className="text-xs text-dim" style={{lineHeight:1.5, maxHeight: expanded ? "none" : 44, overflow: expanded ? "visible" : "hidden", whiteSpace: "pre-wrap", wordBreak: "break-all"}}>
            {child.prompt}
          </div>
          <div className="flex gap-2" style={{marginTop:4}}>
            {child.prompt.length > 80 && (
              <button className="btn-link text-xs" onClick={() => setExpanded(!expanded)}>
                {expanded ? "鏀惰捣" : "灞曞紑鍏ㄩ儴"}
              </button>
            )}
            <button className="btn-link text-xs" onClick={() => { setExpanded(true); setEditing(true); }}>缂栬緫</button>
          </div>
        </div>
      )}

      {editing && (
        <div style={{marginBottom:8}}>
          <textarea className="input textarea" style={{width:"100%",minHeight:80,fontSize:12,resize:"vertical"}}
            value={editPrompt} onChange={(e) => setEditPrompt(e.target.value)} />
          <div className="flex gap-2" style={{marginTop:4}}>
            <button className="btn btn-sm btn-primary" onClick={handleSavePrompt} disabled={saving}>
              {saving ? "淇濆瓨涓?.." : "淇濆瓨"}
            </button>
            <button className="btn btn-sm" onClick={() => { setEditing(false); setEditPrompt(child.prompt || ""); }}>鍙栨秷</button>
          </div>
        </div>
      )}

      {child.error_message && <div className="text-xs text-danger" style={{marginBottom:6}}>{child.error_message}</div>}
      {cimgs.length > 0 && (
        <div className="image-gallery">
          {cimgs.map((url, i) => (
            <div key={i} className="image-card" onClick={() => onLightbox(url)}>
              <img src={url} alt="" loading="lazy" />
              <div className="image-card-actions">
                <button onClick={(e) => { e.stopPropagation(); downloadAsset(child.id, i); }}>涓嬭浇</button>
              </div>
            </div>
          ))}
        </div>
      )}
      {child.status === "running" && (
        <div style={{textAlign:"center",padding:"12px 0"}}>
          <div className="spinner-sm" style={{margin:"0 auto 4px"}}></div>
          <div className="text-xs text-muted">鐢熸垚涓?..</div>
        </div>
      )}
    </div>
  );
}

// 鈹€鈹€ TaskDetail 鈹€鈹€
function TaskDetail({ task }) {
  if (!task) return (
    <div className="empty-state">
      <div className="empty-state-icon"><Ic name="sparkles" size="xl" /></div>
      <div className="text-sm text-dim">閫夋嫨涓€涓姛鑳藉紑濮嬪垱浣滐紝鎴栨煡鐪嬪巻鍙茶褰?/div>
    </div>
  );

  const imgs = task.image_urls ? (typeof task.image_urls === "string" ? JSON.parse(task.image_urls || "[]") : task.image_urls) : [];
  const st = STATUS_MAP[task.status] || STATUS_MAP.pending;
  const [lightbox, setLightbox] = useState(null);
  const isParent = task.progress_total > 1
    && (task.execution_mode === "agent" || task.execution_mode === "batch");
  const [children, setChildren] = useState([]);
  const [loadingChildren, setLoadingChildren] = useState(false);

  useEffect(() => {
    if (!isParent) { setChildren([]); return; }
    let cancelled = false;
    const load = async () => {
      try {
        const resp = await pluginApi("GET", "/tasks/" + task.id + "/children");
        if (!cancelled && resp.body && resp.body.ok) setChildren(resp.body.children || []);
      } catch(e) {}
      if (!cancelled) setLoadingChildren(false);
    };
    setLoadingChildren(true);
    load();
    const isRunning = task.status === "running";
    const iv = setInterval(load, isRunning ? 3000 : 10000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [task.id, task.status, task.progress_current]);

  return (
    <div>
      <div className="card">
        <div className="flex items-center justify-between" style={{marginBottom:12}}>
          <div className="flex items-center gap-2">
            <span className={"tag " + st.cls}>{st.label}</span>
            <span className="text-xs text-dim">{task.id}</span>
            {isParent && <span className="text-xs text-dim">锛坽task.progress_total}寮犲鍥撅級</span>}
          </div>
          <div className="flex gap-2">
            {task.status === "running" && (
              <button className="btn btn-sm btn-danger" onClick={async () => {
                await pluginApi("POST", "/tasks/" + task.id + "/cancel");
                showToast("浠诲姟宸插彇娑?);
              }}>鍙栨秷</button>
            )}
            {(task.status === "failed" || task.status === "cancelled" || task.status === "partial_success") && (
              <button className="btn btn-sm" onClick={async () => {
                await pluginApi("POST", "/tasks/" + task.id + "/retry");
                showToast("宸查噸鏂版彁浜?);
              }}>閲嶈瘯</button>
            )}
          </div>
        </div>
        {(task.api_task_id && String(task.api_task_id).indexOf("mock-") === 0) && (
          <div className="text-sm text-warning" style={{marginBottom:8}}>姝や负鏈湴婕旂ず鏁版嵁锛堟棤鐪熷疄 API 璋冪敤锛夛紝鍙湪璁剧疆涓竴閿竻闄ゃ€?/div>
        )}
        {task.prompt && <div className="text-sm" style={{marginBottom:8}}><strong>鎻愮ず璇? </strong>{task.prompt}</div>}
        {(() => {
          const p = task.params || {};
          const tags = [];
          if (task.model) tags.push(["妯″瀷", task.model]);
          if (p.ratio && p.ratio !== "auto") tags.push(["姣斾緥", p.ratio]);
          if (p.size) tags.push(["娓呮櫚搴?, p.size]);
          if (p.quantity) tags.push(["鏁伴噺", p.quantity]);
          if (p.style) tags.push(["椋庢牸", p.style]);
          if (p.resolution) tags.push(["鍒嗚鲸鐜?, p.resolution]);
          if (p.duration) tags.push(["鏃堕暱", p.duration + "s"]);
          if (tags.length === 0) return null;
          return (
            <div className="text-xs text-dim" style={{marginBottom:8,display:"flex",flexWrap:"wrap",gap:"6px 12px"}}>
              {tags.map(([k,v],i) => <span key={i}><strong>{k}:</strong> {v}</span>)}
            </div>
          );
        })()}
        {task.error_message && <div className="text-sm text-danger" style={{marginBottom:8}}>{task.error_message}</div>}
        {isParent && (
          <div style={{marginBottom:8}}>
            <div className="text-xs text-dim">杩涘害: {task.progress_current}/{task.progress_total}</div>
            <div className="progress-bar">
              <div className="progress-fill" style={{width: (task.progress_current / task.progress_total * 100) + "%"}}></div>
            </div>
          </div>
        )}
      </div>

      {/* Parent task with children */}
      {isParent && children.length > 0 && children.map((child, ci) => (
        <ChildTaskCard key={child.id} child={child} index={ci} total={task.progress_total}
          onLightbox={setLightbox} onRetried={() => {
            pluginApi("GET", "/tasks/" + task.id + "/children").then((r) => {
              if (r.body && r.body.ok) setChildren(r.body.children || []);
            });
          }} />
      ))}

      {isParent && loadingChildren && children.length === 0 && (
        <div className="card" style={{textAlign:"center",marginTop:8}}>
          <div className="spinner-sm" style={{margin:"8px auto"}}></div>
          <div className="text-xs text-muted">鍔犺浇瀛愪换鍔?..</div>
        </div>
      )}

      {/* Non-parent: show video */}
      {!isParent && task.task_type === "video" && task.video_url && (
        <div className="card">
          <video className="video-player" src={task.video_url} controls autoPlay loop />
          <div style={{marginTop:8}}>
            <button className="btn btn-sm" onClick={() => downloadAsset(task.id, 0, true)}>涓嬭浇瑙嗛</button>
          </div>
        </div>
      )}

      {/* Non-parent: show images */}
      {!isParent && imgs.length > 0 && (() => {
        const resolvedUrls = imgs.map((url, i) => {
          const isLocal = url && (url.indexOf(":\\") >= 0 || url.startsWith("/"));
          const apiBase = _ctx ? "/api/plugins/" + _ctx.pluginId : "/api/plugins/ecommerce-image";
          return isLocal ? apiBase + "/images/" + task.id + "?idx=" + i : url;
        });
        const isSingle = resolvedUrls.length === 1;
        const galleryClass = isSingle ? "image-gallery image-gallery--single" : "image-gallery";
        const galleryStyle = isSingle ? undefined : {justifyItems: "center"};
        const cardStyle = isSingle ? undefined : {maxWidth: 320, width: "100%"};
        return (
          <div className="card">
            <div className={galleryClass} style={galleryStyle}>
              {resolvedUrls.map((displayUrl, i) => (
                <div key={i} className="image-card" onClick={() => setLightbox(displayUrl)} style={cardStyle}>
                  <img src={displayUrl} alt="" loading="lazy" />
                  <div className="image-card-actions">
                    <button onClick={(e) => { e.stopPropagation(); downloadAsset(task.id, i); }}>涓嬭浇</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {lightbox && (
        <div className="lightbox" onClick={() => setLightbox(null)}>
          <img src={lightbox} alt="" />
        </div>
      )}

      {!isParent && task.status === "running" && (
        <div className="card" style={{textAlign:"center"}}>
          <div className="spinner" style={{margin:"12px auto"}}></div>
          <div className="text-sm text-muted">鐢熸垚涓紝璇风◢鍊?..</div>
        </div>
      )}
    </div>
  );
}

// 鈹€鈹€ FolderPickerModal (ported from seedance-video) 鈹€鈹€
function FolderPickerModal({ open, title, initialPath, onCancel, onSelect }) {
  const [path, setPath] = useState("");
  const [items, setItems] = useState([]);
  const [parent, setParent] = useState(null);
  const [isAnchor, setIsAnchor] = useState(true);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [newFolderMode, setNewFolderMode] = useState(false);
  const [newFolderName, setNewFolderName] = useState("");
  const newFolderInputRef = useRef(null);

  const load = useCallback(async (p) => {
    setLoading(true);
    setError(null);
    try {
      const qs = p ? `?path=${encodeURIComponent(p)}` : "";
      const r = await pluginApi("GET", `/storage/list-dir${qs}`);
      if (r.ok && r.body?.ok) {
        setPath(r.body.path || "");
        setParent(r.body.parent || null);
        setItems(r.body.items || []);
        setIsAnchor(!!r.body.is_anchor);
      } else {
        setError(r.body?.detail || `HTTP ${r.status || "?"}`);
        if (p) {
          const r2 = await pluginApi("GET", `/storage/list-dir`);
          if (r2.ok && r2.body?.ok) {
            setPath("");
            setParent(null);
            setItems(r2.body.items || []);
            setIsAnchor(true);
          }
        }
      }
    } catch (e) {
      setError(String(e && e.message || e));
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    if (!open) return;
    setNewFolderMode(false);
    setNewFolderName("");
    load(initialPath || "");
  }, [open, initialPath, load]);

  useEffect(() => {
    if (newFolderMode && newFolderInputRef.current) newFolderInputRef.current.focus();
  }, [newFolderMode]);

  const handleNavigate = (p) => { setNewFolderMode(false); load(p); };

  const handleCreate = async () => {
    const name = (newFolderName || "").trim();
    if (!name || !path) return;
    try {
      const r = await pluginApi("POST", "/storage/mkdir", { parent: path, name });
      if (r.ok && r.body?.ok) {
        showToast("鏂囦欢澶瑰凡鍒涘缓: " + name);
        setNewFolderMode(false);
        setNewFolderName("");
        await load(path);
      } else {
        showToast("鍒涘缓澶辫触: " + (r.body?.detail || ""), "error");
      }
    } catch (e) {
      showToast("鍒涘缓澶辫触: " + String(e && e.message || e), "error");
    }
  };

  const crumbs = (() => {
    if (!path) return [];
    const norm = path.replace(/\\/g, "/");
    const parts = norm.split("/").filter(Boolean);
    const out = [];
    if (norm.startsWith("/")) {
      out.push({ name: "/", path: "/" });
      let acc = "";
      for (const seg of parts) { acc += "/" + seg; out.push({ name: seg, path: acc }); }
    } else if (parts[0] && /^[A-Za-z]:$/.test(parts[0])) {
      out.push({ name: parts[0], path: parts[0] + "/" });
      let acc = parts[0];
      for (let i = 1; i < parts.length; i++) { acc += "/" + parts[i]; out.push({ name: parts[i], path: acc }); }
    } else {
      out.push({ name: path, path });
    }
    return out;
  })();

  if (!open) return null;

  const anchors = items.filter(it => it.kind === "shortcut" || it.kind === "home");
  const folders = isAnchor ? items.filter(it => it.kind === "drive") : items;

  return (
    <div className="modal-mask" onClick={onCancel}>
      <div className="modal-card folder-picker" onClick={e => e.stopPropagation()}>
        <div className="folder-picker__head">
          <div className="folder-picker__title">{title || "閫夋嫨鏂囦欢澶?}</div>
          <div className="folder-picker__crumbs">
            <span className="folder-picker__crumb" onClick={() => handleNavigate("")}>
              <Ic name="folder" />
            </span>
            {crumbs.map((c, i) => (
              <React.Fragment key={i}>
                <span className="folder-picker__crumb-sep">/</span>
                <span className="folder-picker__crumb" onClick={() => handleNavigate(c.path)} title={c.path}>{c.name}</span>
              </React.Fragment>
            ))}
          </div>
        </div>

        {error && <div className="folder-picker__error">鍔犺浇鍑洪敊: {error}</div>}

        <div className="folder-picker__body">
          {isAnchor && anchors.length > 0 && (
            <div className="folder-picker__sidebar">
              {anchors.map((a, i) => (
                <div key={i} className={"folder-picker__shortcut" + (path === a.path ? " active" : "")} onClick={() => handleNavigate(a.path)}>
                  <Ic name="folder" style={{width:14,height:14}} /> {a.name}
                </div>
              ))}
            </div>
          )}
          <div className="folder-picker__list">
            {loading ? (
              <div className="folder-picker__empty"><div className="spinner" style={{margin:"0 auto 8px"}}></div>鍔犺浇涓?..</div>
            ) : folders.length === 0 ? (
              <div className="folder-picker__empty">锛堢┖鐩綍锛?/div>
            ) : folders.map((it, i) => (
              <div key={i} className="folder-picker__item" onClick={() => handleNavigate(it.path)}>
                <Ic name="folder" style={{width:16,height:16,color:"var(--primary)"}} /> {it.name}
              </div>
            ))}
          </div>
        </div>

        <div className="folder-picker__foot">
          {newFolderMode ? (
            <>
              <input ref={newFolderInputRef} className="folder-picker__newinput" value={newFolderName}
                onChange={e => setNewFolderName(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") handleCreate(); if (e.key === "Escape") { setNewFolderMode(false); setNewFolderName(""); } }}
                placeholder="鏂板缓鏂囦欢澶瑰悕" />
              <button className="btn btn-sm" onClick={() => { setNewFolderMode(false); setNewFolderName(""); }}>鍙栨秷</button>
              <button className="btn btn-sm btn-primary" disabled={!newFolderName.trim()} onClick={handleCreate}>鍒涘缓</button>
            </>
          ) : (
            <>
              <span className="folder-picker__current" title={path}>{path || ""}</span>
              <button className="btn btn-sm" disabled={!path || isAnchor} onClick={() => setNewFolderMode(true)}>鏂板缓鏂囦欢澶?/button>
              <button className="btn btn-sm" onClick={onCancel}>鍙栨秷</button>
              <button className="btn btn-sm btn-primary" disabled={!path || isAnchor} onClick={() => onSelect(path)}>閫夋嫨姝ょ洰褰?/button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// 鈹€鈹€ SettingsPage (aligned with seedance-video) 鈹€鈹€
function SettingsPage({ onPurge }) {
  const [config, setConfig] = useState({});
  const [meta, setMeta] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [dk, setDk] = useState("");
  const [ak, setAk] = useState("");
  const [showDk, setShowDk] = useState(false);
  const [showAk, setShowAk] = useState(false);
  const [imgDir, setImgDir] = useState("");
  const [vidDir, setVidDir] = useState("");
  const [stats, setStats] = useState(null);
  const [folderPicker, setFolderPicker] = useState(null);

  const reload = () => {
    pluginApi("GET", "/config").then((resp) => {
      if (resp.body && resp.body.ok) {
        setConfig(resp.body.config || {});
        setMeta(resp.body.meta || null);
      }
    });
  };

  useEffect(() => {
    pluginApi("GET", "/config").then((resp) => {
      if (resp.body && resp.body.ok) {
        setConfig(resp.body.config || {});
        setMeta(resp.body.meta || null);
      }
      setLoading(false);
    });
    pluginApi("GET", "/storage/stats").then(r => r.body?.stats && setStats(r.body.stats)).catch(() => {});
  }, []);

  useEffect(() => {
    setImgDir(config.image_output_dir || "");
    setVidDir(config.video_output_dir || "");
  }, [config.image_output_dir, config.video_output_dir]);

  const save = async (updates) => {
    setSaving(true);
    try {
      await pluginApi("PUT", "/config", { updates });
      showToast("閰嶇疆宸蹭繚瀛?);
      reload();
    } catch (e) {
      showToast("淇濆瓨澶辫触: " + (e.message || ""), "error");
    }
    setSaving(false);
  };

  const openFolderByKey = async (key) => {
    try {
      const r = await pluginApi("POST", "/storage/open-folder", { key });
      if (!r.body?.ok) showToast("鎵撳紑鏂囦欢澶瑰け璐? " + (r.body?.detail || ""), "error");
    } catch (e) {
      showToast("鎵撳紑鏂囦欢澶瑰け璐? " + (e.message || ""), "error");
    }
  };

  const openFolderPicker = (configKey, title) => {
    setFolderPicker({ key: configKey, title, initialPath: (config[configKey] || "").trim() });
  };
  const handleFolderPickerSelect = (path) => {
    if (!folderPicker) return;
    const k = folderPicker.key;
    setFolderPicker(null);
    if (path) {
      setConfig({...config, [k]: path});
      save({[k]: path});
      showToast("宸茶缃矾寰? " + path);

// 鈹€鈹€ CreateTab 鈹€鈹€
function CreateTab({ features, activeModule, setActiveModule, selectedFeature, setSelectedFeature, featureDetail, params, setParams, generating, onGenerate, selectedTask, setSelectedTask, pluginApi }) {
  const currentFeatures = features[activeModule] || [];

  const blockedByRequired = useMemo(() => {
    if (!featureDetail || !(featureDetail.params || []).length) return [];
    return featureDetail.params.filter((p) => isRequiredParamEmpty(p, params));
  }, [featureDetail, params]);

  const handleExampleSelect = (ex) => {
    setParams((prev) => ({ ...prev, ...ex.preset_params }));
    showToast("宸插姞杞界ず渚嬪弬鏁?);
  };

  return (
    <div className="split-layout">
      <div className="split-left">
        <div className="card">
          <div className="form-row">
            <div className="label">鐢熸垚妯″潡</div>
            <div className="flex gap-2 flex-wrap">
              {MODULES.map(m => (
                <button key={m.id} className={"mode-btn" + (activeModule === m.id ? " active" : "")}
                  onClick={() => setActiveModule(m.id)}>
                  <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
                    <Ic name={m.icon} /> {m.label}
                  </span>
                </button>
              ))}
            </div>
          </div>

          {currentFeatures.length > 1 && (
            <div className="form-row">
              <div className="label">鍔熻兘</div>
              <div className="flex gap-2 flex-wrap">
                {currentFeatures.map(f => (
                  <button key={f.id} className={"mode-btn" + (selectedFeature === f.id ? " active" : "")}
                    onClick={() => { setSelectedFeature(f.id); setSelectedTask(null); }}>
                    <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
                      <Ic name={f.icon || "file"} /> {f.name}
                    </span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {featureDetail && (
            <>
              <p className="text-sm text-muted" style={{marginBottom:14}}>{featureDetail.description}</p>
              <DynamicForm feature={featureDetail} params={params} setParams={setParams} pluginApi={pluginApi} />
              <ExampleGallery examples={featureDetail.examples} onSelect={handleExampleSelect} />
              <div style={{marginTop:16}}>
                <button className="btn btn-primary btn-block"
                  onClick={onGenerate} disabled={generating || blockedByRequired.length > 0}
                  title={blockedByRequired.length ? "璇峰厛濉啓蹇呭～椤? : ""}>
                  {generating ? <><span className="spinner-sm"></span> 鐢熸垚涓?..</>
                    : <><Ic name={featureDetail.output_type === "video" ? "video" : "sparkles"} /> 寮€濮嬬敓鎴?/>}
                </button>
                {blockedByRequired.length > 0 && (
                  <p className="text-xs text-warning" style={{marginTop:8}}>
                    璇峰厛瀹屾垚蹇呭～椤癸細{blockedByRequired.map(p => p.label).join("銆?)}
                  </p>
                )}
              </div>
            </>
          )}
          {!featureDetail && (
            <div className="empty-state" style={{padding:"30px 0"}}>
              <div className="spinner"></div>
              <div className="text-sm text-dim" style={{marginTop:8}}>鍔犺浇涓?..</div>
            </div>
          )}
        </div>
      </div>

      <div className={"split-right oa-preview-area" + (!selectedTask ? " oa-preview-area--centered" : "")}>
        {selectedTask ? (
          <div style={{width:"100%"}}>
            <TaskDetail task={selectedTask} />
          </div>
        ) : (
          <div className="oa-preview-empty">
            <span className="oa-preview-empty__icon"
              dangerouslySetInnerHTML={{__html: window.SynapseIcons ? window.SynapseIcons.sparkles() : ""}} />
            <div className="oa-preview-empty__title">閫夋嫨涓€涓姛鑳藉紑濮嬪垱浣?/div>
            <div className="oa-preview-empty__hint">鎴栨煡鐪嬪巻鍙茶褰?/div>

  );
}

// 鈹€鈹€ TasksTab 鈹€鈹€
function TasksTab({ pluginApi }) {
  const [tasks, setTasks] = useState([]);
  const [total, setTotal] = useState(0);
  const [statusFilter, setStatusFilter] = useState("");
  const [moduleFilter, setModuleFilter] = useState("");
  const [selected, setSelected] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      let q = "/tasks?limit=50";
      if (statusFilter) q += "&status=" + statusFilter;
      if (moduleFilter) q += "&module=" + moduleFilter;
      const r = await pluginApi("GET", q);
      if (r.body && r.body.ok) {
        setTasks(Array.isArray(r.body.tasks) ? r.body.tasks : []);
        setTotal(typeof r.body.total === "number" ? r.body.total : 0);
      }
    } catch (e) { console.warn("tasks load error", e); }
    setLoading(false);
  }, [statusFilter, moduleFilter]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    const iv = setInterval(load, 15000);
    return () => clearInterval(iv);
  }, [load]);

  return (
    <div className="split-layout">
      <div className="split-left" style={{width:"38%",minWidth:320}}>
        <div className="filter-group">
          <div className="filter-group__label">鐘舵€?/div>
          <div className="filter-group__buttons">
            {[{v:"",l:"鍏ㄩ儴"},{v:"running",l:"鐢熸垚涓?},{v:"succeeded",l:"瀹屾垚"},{v:"failed",l:"澶辫触"}].map(f => (
              <button key={f.v} className={"mode-btn" + (statusFilter===f.v?" active":"")}
                onClick={() => setStatusFilter(f.v)}>{f.l}</button>
            ))}
          </div>
        </div>
        <div className="filter-group">
          <div className="filter-group__label">妯″潡</div>
          <div className="filter-group__buttons">
            <button className={"mode-btn" + (moduleFilter===""?" active":"")}
              onClick={() => setModuleFilter("")}>鍏ㄩ儴</button>
            {MODULES.map(m => (
              <button key={m.id} className={"mode-btn" + (moduleFilter===m.id?" active":"")}
                onClick={() => setModuleFilter(m.id)}>
                <Ic name={m.icon} /> {m.label}
              </button>
            ))}
          </div>
        </div>
        <hr style={{border:"none",borderTop:"1px solid var(--border)",margin:"8px 0 12px"}} />

        <div style={{flex:1,overflowY:"auto"}}>
          {loading && tasks.length === 0 ? (
            <div className="empty-state"><div className="spinner" /></div>
          ) : tasks.length === 0 ? (
            <div className="empty-state" style={{padding:"30px 0"}}>
              <div className="text-sm text-dim">鏆傛棤浠诲姟</div>
            </div>
          ) : tasks.map(tk => (
            <div key={tk.id} className={"task-card" + (selected && selected.id === tk.id ? " selected" : "")}
              onClick={() => setSelected(tk)}>
              <div className="task-thumb">
                {(() => {
                  const tkImgs = tk.image_urls ? (typeof tk.image_urls === "string" ? JSON.parse(tk.image_urls || "[]") : tk.image_urls) : [];
                  if (tkImgs.length > 0) return <img src={tkImgs[0]} alt="" />;
                  if (tk.status === "running") return <div className="spinner-sm" />;
                  return <Ic name={tk.task_type === "video" ? "video" : "image"} />;
                })()}
              </div>
              <div className="task-info">
                <h4>{tk.prompt || tk.feature_id || "浠诲姟"}</h4>
                <div className="task-meta">
                  <span className={"tag " + ((STATUS_MAP[tk.status] || {}).cls || "tag-gray")}>{(STATUS_MAP[tk.status] || {}).label || tk.status}</span>
                  <span>{tk.module}</span>
                  <span>{tk.model || ""}</span>
                  <span>{tk.created_at ? new Date(tk.created_at * 1000).toLocaleString() : ""}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div className="text-xs text-dim" style={{padding:"8px 0",textAlign:"center"}}>鍏?{total} 鏉?/div>
      </div>

      <div className={"split-right oa-preview-area" + (!selected ? " oa-preview-area--centered" : "")}>
        {selected ? (
          <div style={{width:"100%"}}>
            <TaskDetail task={selected} />
          </div>
        ) : (
          <div className="oa-preview-empty">
            <span className="oa-preview-empty__icon"
              dangerouslySetInnerHTML={{__html: window.SynapseIcons ? window.SynapseIcons.listTask ? window.SynapseIcons.listTask() : (window.SynapseIcons.layers ? window.SynapseIcons.layers() : "") : ""}} />
            <div className="oa-preview-empty__title">鏈€夋嫨浠诲姟</div>
            <div className="oa-preview-empty__hint">浠庡乏渚у垪琛ㄩ€夋嫨涓€涓换鍔℃煡鐪嬭鎯?/div>
          </div>
        )}
      </div>
    </div>
  );
}

// 鈹€鈹€ App 鈹€鈹€
function App() {
  const [tab, setTab] = useState("create");
  const [activeModule, setActiveModule] = useState("video");
  const [features, setFeatures] = useState({});
  const [selectedFeature, setSelectedFeature] = useState(null);
  const [featureDetail, setFeatureDetail] = useState(null);
  const [params, setParams] = useState({});
  const [tasks, setTasks] = useState([]);
  const [selectedTask, setSelectedTask] = useState(null);
  const [generating, setGenerating] = useState(false);
  const [cfgMeta, setCfgMeta] = useState(null);
  const pollRef = useRef(null);

  useEffect(() => {
    if (tab === "settings") return;
    pluginApi("GET", "/config").then((r) => {
      if (r.body && r.body.ok) setCfgMeta(r.body.meta || null);
    });
  }, [tab]);

  useEffect(() => {
    pluginApi("GET", "/features").then((resp) => {
      if (resp.body && resp.body.ok) {
        setFeatures(resp.body.features || {});
        const first = (resp.body.features || {}).video;
        if (first && first.length > 0) {
          setSelectedFeature(first[0].id);
        }
      }
    }).catch(() => {});
  }, []);

  useEffect(() => {
    if (!selectedFeature) { setFeatureDetail(null); return; }
    setFeatureDetail(null);
    pluginApi("GET", "/features/" + selectedFeature).then((resp) => {
      if (resp.body && resp.body.ok) {
        setFeatureDetail(resp.body.feature);
        const defaults = {};
        (resp.body.feature.params || []).forEach((p) => {
          if (p.default !== undefined && p.default !== null) defaults[p.id] = p.default;
        });
        setParams(defaults);
      }
    }).catch(() => { setFeatureDetail(null); });
  }, [selectedFeature]);

  useEffect(() => {
    if (pollRef.current) clearInterval(pollRef.current);
    pollRef.current = setInterval(() => {
      const running = tasks.filter((t) => t.status === "running" || t.status === "cancelling");
      if (running.length === 0) return;
      running.forEach((t) => {
        pluginApi("GET", "/tasks/" + t.id).then((resp) => {
          if (resp.body && resp.body.ok && resp.body.task) {
            const updated = resp.body.task;
            setTasks((prev) => prev.map((pt) => pt.id === updated.id ? updated : pt));
            if (selectedTask && selectedTask.id === updated.id) setSelectedTask(updated);
            if (updated.status === "succeeded") showToast("浠诲姟瀹屾垚!");
            if (updated.status === "partial_success") showToast("浠诲姟閮ㄥ垎瀹屾垚");
            if (updated.status === "failed") showToast("浠诲姟澶辫触: " + (updated.error_message || ""), "error");
          }
        });
      });
    }, 3000);
    return () => clearInterval(pollRef.current);
  }, [tasks, selectedTask]);

  useEffect(() => {
    onEvent("task_update", (data) => {
      if (data.task_id) {
        pluginApi("GET", "/tasks/" + data.task_id).then((resp) => {
          if (resp.body && resp.body.ok && resp.body.task) {
            const t = resp.body.task;
            if (t.batch_parent_id) {
              pluginApi("GET", "/tasks/" + t.batch_parent_id).then((pr) => {
                if (pr.body && pr.body.ok && pr.body.task) {
                  const pt = pr.body.task;
                  setTasks((prev) => prev.map((p) => p.id === pt.id ? pt : p));
                  if (selectedTask && selectedTask.id === pt.id) setSelectedTask(pt);
                }
              });
              return;
            }
            setTasks((prev) => {
              const exists = prev.find((p) => p.id === t.id);
              if (exists) return prev.map((p) => p.id === t.id ? t : p);
              if (t.execution_mode === "pipeline") return prev;
              return [t, ...prev];
            });
            if (selectedTask && selectedTask.id === t.id) setSelectedTask(t);
          }
        });
      }
    });
  }, []);

  const blockedByRequired = useMemo(() => {
    if (!featureDetail || !(featureDetail.params || []).length) return [];
    return featureDetail.params.filter((p) => isRequiredParamEmpty(p, params));
  }, [featureDetail, params]);

  const generateLock = useRef(false);
  const handleGenerate = async () => {
    if (!selectedFeature || generating || generateLock.current) return;
    if (blockedByRequired.length) {
      showToast("璇峰厛濉啓锛? + blockedByRequired.map((p) => p.label).join("銆?), "error");
      return;
    }
    generateLock.current = true;
    setGenerating(true);
    try {
      const resp = await pluginApi("POST", "/features/" + selectedFeature + "/execute", { params });
      if (resp.body && resp.body.ok) {
        const task = resp.body.task;
        setTasks((prev) => [task, ...prev]);
        setSelectedTask(task);
        showToast("浠诲姟宸叉彁浜?");
      } else {
        showToast(resp.body?.detail || "鎻愪氦澶辫触", "error");
      }
    } catch (e) {
      showToast("鎻愪氦澶辫触: " + e.message, "error");
    }
    setGenerating(false);
    generateLock.current = false;
  };

  useEffect(() => {
    const list = features[activeModule] || [];
    if (list.length > 0) {
      setSelectedFeature(list[0].id);
    } else {
      setSelectedFeature(null);
    }
    setSelectedTask(null);
  }, [activeModule, features]);

  return (
    <div className="app">
      <div className="header">
        <h1 className="oa-hero-title" style={{margin:0}}>
          <span className="oa-hero-title__icon oa-hero-title__icon--app">
            <img src="icon.svg" alt="" aria-hidden="true" />
          </span>
          <span className="oa-hero-title__text">
            鐢靛晢绱犳潗灏忓姪鐞?
            <span className="oa-hero-title__sub">DASHSCOPE + ARK 路 涓诲浘 / 璇︽儏椤?/ 娴锋姤 / 瑙嗛</span>
          </span>
        </h1>
        <div className="header-right" />
      </div>
      {tab !== "settings" && cfgMeta && cfgMeta.mock_mode !== "0"
        && !cfgMeta.has_dashscope_key && !cfgMeta.has_ark_key && (
        <div className="oa-config-banner" role="alert" style={{margin:"12px 16px 0",flexShrink:0}}>
          <span className="oa-icon oa-config-banner__icon"
                dangerouslySetInnerHTML={{__html: window.SynapseIcons ? window.SynapseIcons.warning() : ""}} />
          <div className="oa-config-banner__text">
            <strong>鏈厤缃?API Key</strong>
            <div style={{fontSize:12,color:"var(--text-muted)",marginTop:2}}>
              閰嶇疆 DashScope Key 鍙娇鐢ㄥ浘鍍忓姛鑳斤紝閰嶇疆 Ark Key 鍙娇鐢ㄨ棰戝姛鑳姐€傝嚦灏戦厤缃竴涓嵆鍙紑濮嬩娇鐢ㄣ€?
            </div>
          </div>
          <button className="oa-config-banner__action" type="button" onClick={() => setTab("settings")}>
            鍓嶅線璁剧疆
            <span className="oa-icon"
                  dangerouslySetInnerHTML={{__html: window.SynapseIcons ? window.SynapseIcons.arrowRight() : ""}} />
          </button>
        </div>
      )}
      <div className="tabs">
        {TABS.map(t => (
          <div key={t.id} className={"tab" + (tab === t.id ? " active" : "")}
            onClick={() => setTab(t.id)}>{t.label}</div>
        ))}
      </div>
      <div className="content">
        <div style={{display: tab === "create" ? "block" : "none", height: "100%"}}>
          <CreateTab features={features} activeModule={activeModule} setActiveModule={setActiveModule}
            selectedFeature={selectedFeature} setSelectedFeature={setSelectedFeature}
            featureDetail={featureDetail} params={params} setParams={setParams}
            generating={generating} onGenerate={handleGenerate}
            selectedTask={selectedTask} setSelectedTask={setSelectedTask}
            pluginApi={pluginApi} />
        </div>
        <div style={{display: tab === "tasks" ? "block" : "none", height: "100%"}}>
          <TasksTab pluginApi={pluginApi} />
        </div>
        <div style={{display: tab === "guide" ? "block" : "none", height: "100%"}}>
          <PromptGuide />
        </div>
        <div style={{display: tab === "settings" ? "block" : "none", height: "100%"}}>
          <SettingsPage onPurge={() => {}} />
        </div>
      </div>
    </div>
  );
}

// Wraps <App /> so a render-time exception surfaces as an oa-config-banner
// instead of a blank screen / silent host loading overlay.
class PluginErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error: error }; }
  componentDidCatch(error, info) {
    try { console.error("[ecommerce-image] uncaught render error", error, info); } catch (_) {}
  }
  render() {
    if (this.state.error) {
      const msg = (this.state.error && (this.state.error.message || String(this.state.error))) || "鏈煡娓叉煋閿欒";
      return (
        <div style={{padding:24,maxWidth:720,margin:"40px auto"}}>
          <div className="oa-config-banner" role="alert">
            <span className="oa-config-banner__icon"><Ic name="warning" /></span>
            <div className="oa-config-banner__text">
              <strong>鎻掍欢 UI 娓叉煋澶辫触銆?/strong>
              <div style={{marginTop:6,fontSize:12,color:"var(--text-muted)",wordBreak:"break-word"}}>{msg}</div>
              <div style={{marginTop:6,fontSize:12,color:"var(--text-muted)"}}>璇峰皾璇曞埛鏂伴〉闈紝鎴栧湪涓荤▼搴忋€屾彃浠剁鐞嗐€嶄腑閲嶆柊鍔犺浇鏈彃浠躲€?/div>
            </div>
            <button className="oa-config-banner__action" onClick={() => { try { window.location.reload(); } catch (_) {} }}>
              <Ic name="refresh" /> 鍒锋柊
            </button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <PluginErrorBoundary><App /></PluginErrorBoundary>
);
