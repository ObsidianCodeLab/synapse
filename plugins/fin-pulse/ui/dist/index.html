<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fin Pulse 路 璐㈢粡鑴夊姩</title>
  <!--
    Self-contained plugin UI: bootstrap + shared UI Kit inlined under _assets/.
    fin-pulse shares the same UI Kit as avatar-studio / subtitle-craft 鈥?the
    five files below are the canonical 5-asset bundle, vendored from
    plugins-archive/_shared/web-uikit/ at build time. React / ReactDOM / Babel
    are loaded from unpkg; everything else is local.
  -->
  <script src="_assets/bootstrap.js"></script>
  <link rel="stylesheet" href="_assets/styles.css">
  <script src="_assets/icons.js"></script>
  <script src="_assets/i18n.js"></script>
  <script src="_assets/markdown-mini.js"></script>
  <link rel="preload" as="script" crossorigin href="https://unpkg.com/react@18.3.1/umd/react.production.min.js" />
  <link rel="preload" as="script" crossorigin href="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" />
  <link rel="preload" as="script" href="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js" />
  <style>
    /* 鈹€鈹€ Theme tokens 鈹€鈹€
       Clean white/black base; stock-market red accent (#D32F2F)
       for borders, tab underlines, icons, and button outlines. */
    :root {
      --bg: #FFFFFF; --bg-card: #FFFFFF; --bg-hover: #F7F8FA;
      --text: #1a1a1a; --text-muted: #5E3540; --text-dim: #7A4E59;
      --primary: #D32F2F; --primary-hover: #B71C1C;
      --primary-soft: #FFCDD2;
      --success: #16a34a; --warning: #f59e0b; --danger: #ef4444;
      --border: #CBD5E1; --border-strong: #D32F2F; --radius: 8px;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
      --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
      --border: #475569; --border-strong: #EF5350;
      --primary: #EF5350; --primary-hover: #E53935; --primary-soft: #4a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
        --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
        --border: #475569; --border-strong: #EF5350;
      }
    }
    /* 鈹€鈹€ Reset + typography 鈹€鈹€ */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    /* 鈹€鈹€ Layout shell 鈹€鈹€ */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .tabs {
      display: flex; gap: 4px; padding: 0 18px; border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .tab {
      padding: 10px 14px; font-size: 13px; cursor: pointer;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      display: inline-flex; align-items: center; gap: 6px;
      transition: color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
    .content { flex: 1; overflow: auto; padding: 18px 20px; background: var(--bg); display: flex; flex-direction: column; }
    .empty { color: var(--text-muted); font-size: 13px; padding: 32px 12px; text-align: center; }
    /* 鈹€鈹€ Split layout (left filter + right list) 鈹€鈹€ */
    .split-layout { display: flex; gap: 16px; height: 100%; }
    /* 鈹€鈹€ Stack layout (top filter bar + bottom content) 鈹€鈹€ */
    .stack-layout { display: flex; flex-direction: column; gap: 12px; flex: 1; min-height: 0; }
    .stack-layout > .card.grow { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
    .stack-layout > .card.grow > .card-body { flex: 1; overflow: auto; }
    .stack-layout > .card--compact { flex: 0 0 auto; }
    /* 鈹€鈹€ Hero title (oa-hero-title) 鈥?big gradient brand mark 鈹€鈹€
       Matches the avatar-studio hard contract: always explicit --text
       colour, weight 700, size 20px so the Chinese headline stays
       legible on the blush background (previous 18/600 inherited to
       a weak pink rendering on the macaron theme). */
    .oa-hero-title {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 20px; font-weight: 700; color: var(--text);
      letter-spacing: -0.01em; margin: 0;
    }
    .oa-hero-title__icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      /* Container bg is a neutral dark so any 1px SVG seam blends in;
         the inline SVG itself renders its full navy background. */
      background: #0B1526;
      color: #fff; display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(201,21,42,.28), inset 0 0 0 1px rgba(255,255,255,.08);
      position: relative; overflow: hidden;
    }
    .oa-hero-title__icon svg { width: 100%; height: 100%; display: block; }
    .oa-hero-title__text { display: inline-flex; flex-direction: column; line-height: 1.15; color: var(--text); }
    .oa-hero-title__sub { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-top: 4px; letter-spacing: .3px; }
    /* 鈹€鈹€ Section title with leading accent bar 鈹€鈹€ */
    .oa-section-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 16px; font-weight: 600; color: var(--text);
      margin-bottom: 12px; line-height: 1.2;
    }
    .oa-section-title::before {
      content: ""; width: 4px; height: 18px; border-radius: 2px;
      background: var(--primary);
      display: inline-block;
    }
    .oa-section-title__count {
      font-size: 12px; font-weight: 500; color: var(--text-muted);
      padding: 2px 8px; border-radius: 999px; background: var(--bg-hover);
    }
    .oa-section-title__actions { margin-left: auto; display: inline-flex; gap: 6px; align-items: center; }
    /* 鈹€鈹€ Hint text (beginner-friendly description under a title) 鈹€鈹€ */
    .oa-hint {
      font-size: 12px; color: var(--text); line-height: 1.6;
      background: var(--bg-hover); padding: 8px 12px; border-radius: 6px;
      border-left: 3px solid var(--primary);
      margin-bottom: 10px;
    }
    .oa-hint code {
      background: var(--bg-card); padding: 1px 6px; border-radius: 4px;
      font-size: 11px; color: var(--primary); border: 1px solid var(--border);
    }
    /* 鈹€鈹€ Segmented button group (active-state aware) 鈹€鈹€ */
    .seg-group { display: inline-flex; gap: 4px; padding: 3px;
                 background: var(--bg-hover); border-radius: 8px; }
    .seg-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; font-size: 12px; font-weight: 500;
      color: var(--text-muted); background: transparent;
      border: 1px solid transparent; border-radius: 6px; cursor: pointer;
      transition: background .12s, color .12s, box-shadow .12s;
    }
    .seg-btn:hover { color: var(--text); }
    .seg-btn.active {
      color: var(--primary); background: var(--bg-card);
      border-color: var(--border);
      box-shadow: 0 1px 3px rgba(211,47,47,.18);
    }
    /* 鈹€鈹€ Filter bar (horizontal sticky strip for Today tab) 鈹€鈹€ */
    .filter-bar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px 16px;
      padding: 12px 14px; background: var(--bg-card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
    }
    .filter-bar--news { align-items: stretch; }
    .filter-bar__item { display: inline-flex; align-items: center; gap: 6px; }
    .filter-bar__label { font-size: 12px; color: var(--text); font-weight: 500; }
    .filter-bar__sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
    .time-filter-compact {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px; border: 1.5px solid var(--border); border-radius: 999px;
      background: rgba(255,255,255,.55);
    }
    .time-filter-compact .seg-btn { min-height: 24px; padding: 3px 9px; border-radius: 999px; }
    .time-filter-wrap { position: relative; display: inline-flex; align-items: center; }
    .custom-time-range {
      position: absolute; top: calc(100% + 8px); left: 0; z-index: 30;
      display: grid; grid-template-columns: 1fr; gap: 8px;
      width: 280px; padding: 10px;
      border: 1px solid rgba(211,47,47,.18); border-radius: 14px;
      background: rgba(255,255,255,.98);
      box-shadow: 0 16px 36px rgba(52,16,24,.16), 0 0 0 1px rgba(255,255,255,.65) inset;
    }
    .custom-time-row { display: grid; grid-template-columns: 34px 1fr; align-items: center; gap: 8px; }
    .custom-time-row span { font-size: 12px; color: var(--text-muted); }
    .custom-time-range::before {
      content: ""; position: absolute; top: -6px; left: 24px; width: 10px; height: 10px;
      background: rgba(255,255,255,.98); border-left: 1px solid rgba(211,47,47,.18);
      border-top: 1px solid rgba(211,47,47,.18); transform: rotate(45deg);
    }
    .custom-time-range .input { width: 100%; padding: 6px 8px; font-size: 12px; }
    .search-box {
      display: inline-flex; align-items: center; gap: 6px;
      min-width: 260px; padding: 3px 4px 3px 10px;
      border: 1.5px solid rgba(211,47,47,.24); border-radius: 999px;
      background: linear-gradient(180deg, #fff, rgba(255,247,247,.86));
      box-shadow: 0 2px 8px rgba(211,47,47,.06);
    }
    .search-box:focus-within {
      border-color: rgba(211,47,47,.45);
      box-shadow: 0 0 0 3px rgba(211,47,47,.08), 0 3px 12px rgba(211,47,47,.08);
    }
    .search-box input {
      flex: 1; min-width: 0; border: 0; outline: none; background: transparent;
      color: var(--text); font-size: 13px; padding: 4px 0;
    }
    .btn-icon-round {
      width: 30px; height: 30px; padding: 0; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .search-box .btn-icon-round .oa-icon { color: #fff; width: 16px; height: 16px; }
    .btn-ai-glow {
      border-color: rgba(37,99,235,.38);
      background: linear-gradient(135deg, rgba(37,99,235,.18), rgba(14,165,233,.16), rgba(124,58,237,.18));
      color: #1d4ed8; font-weight: 700; position: relative; overflow: hidden;
      isolation: isolate;
      box-shadow: 0 0 0 1px rgba(56,189,248,.14), 0 0 10px rgba(37,99,235,.12), 0 5px 14px rgba(30,64,175,.10);
      animation: fp-ai-pulse-ring 4.2s ease-out infinite;
    }
    .btn-ai-glow::before {
      content: ""; position: absolute; inset: 0; border-radius: inherit;
      inset: -6px;
      background:
        radial-gradient(circle, rgba(240,249,255,.96) 0 8%, rgba(56,189,248,.45) 9% 13%, transparent 14%),
        repeating-radial-gradient(circle, rgba(37,99,235,.32) 0 2px, rgba(56,189,248,.16) 3px, transparent 4px 14px);
      filter: blur(.2px);
      opacity: .30; animation: fp-ai-burst 4.2s ease-out infinite;
      pointer-events: none;
      z-index: -1;
    }
    .btn-ai-glow::after {
      content: none;
    }
    .btn-ai-glow > * { position: relative; z-index: 1; }
    .btn-ai-glow.btn-primary {
      color: #fff; border-color: rgba(125,211,252,.45);
      background: linear-gradient(135deg, #1d4ed8, #0284c7 45%, #7c3aed);
      box-shadow: 0 0 0 1px rgba(125,211,252,.20), 0 0 14px rgba(37,99,235,.22), 0 4px 12px rgba(30,64,175,.18);
    }
    @keyframes fp-ai-burst {
      0% { transform: scale(.40); opacity: .38; }
      60% { transform: scale(1.04); opacity: .16; }
      100% { transform: scale(1.14); opacity: 0; }
    }
    @keyframes fp-ai-pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(56,189,248,.16), 0 0 10px rgba(37,99,235,.12), 0 5px 14px rgba(30,64,175,.10); }
      72% { box-shadow: 0 0 0 6px rgba(56,189,248,0), 0 0 14px rgba(37,99,235,.16), 0 6px 16px rgba(30,64,175,.12); }
      100% { box-shadow: 0 0 0 0 rgba(56,189,248,0), 0 0 10px rgba(37,99,235,.12), 0 5px 14px rgba(30,64,175,.10); }
    }
    .sort-pill { display: inline-flex; align-items: center; gap: 5px; }
    /* 鈹€鈹€ Ingest split-button (main action + dropdown for single-source) 鈹€鈹€ */
    .ingest-split { display: inline-flex; align-items: stretch; position: relative; filter: drop-shadow(0 4px 10px rgba(211,47,47,.12)); }
    .ingest-split .btn { border-radius: 0; }
    .ingest-split .btn:first-child { border-top-left-radius: 999px; border-bottom-left-radius: 999px; padding-left: 14px; }
    .ingest-split .btn--caret {
      padding: 0 10px; min-width: 34px; border-left: 1px solid rgba(255,255,255,.32);
      border-top-right-radius: 999px; border-bottom-right-radius: 999px;
    }
    .ingest-split .btn--caret .oa-icon { transition: transform .16s; }
    .ingest-split.is-open .btn--caret .oa-icon { transform: rotate(180deg); }
    .ingest-split__menu {
      position: absolute; top: calc(100% + 4px); right: 0; z-index: 20;
      min-width: 240px; max-height: 280px; overflow: auto; padding: 6px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }
    .ingest-split__menu button {
      display: block; width: 100%; text-align: left;
      padding: 8px 10px; border: none; border-radius: 6px;
      background: transparent; color: var(--text); cursor: pointer; font-size: 13px;
    }
    .ingest-split__menu button:hover { background: rgba(211,47,47,.10); color: var(--primary); }
    .ingest-split__menu button[disabled] { opacity: .5; cursor: not-allowed; }
    /* 鈹€鈹€ Spinner icon 鈹€鈹€ */
    @keyframes fp-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fp-spin { animation: fp-spin 1s linear infinite; transform-origin: 50% 50%; display: inline-block; }
    /* 鈹€鈹€ Indeterminate progress bar 鈹€鈹€ */
    @keyframes fp-shimmer {
      0%   { transform: translateX(-55%); }
      100% { transform: translateX(155%); }
    }
    @keyframes fp-ingest-pulse {
      0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,.18), 0 6px 16px rgba(211,47,47,.20); }
      50% { box-shadow: 0 0 0 1px rgba(255,255,255,.24), 0 0 0 5px rgba(211,47,47,.10), 0 8px 22px rgba(211,47,47,.30); }
    }
    .fp-progress {
      position: relative;
      height: 6px; border-radius: 999px; overflow: hidden;
      margin: 2px 0 8px;
      background: rgba(211,47,47,.12);
      box-shadow: inset 0 0 0 1px rgba(211,47,47,.18), 0 4px 12px rgba(211,47,47,.12);
    }
    .fp-progress::before {
      content: ""; position: absolute; inset: 0; width: 58%;
      border-radius: inherit;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(248,113,113,.78) 16%,
        #D32F2F 48%,
        #FF3B30 68%,
        transparent 100%);
      filter: drop-shadow(0 0 7px rgba(211,47,47,.58));
      animation: fp-shimmer 1.05s cubic-bezier(.4,0,.2,1) infinite;
    }
    .ingest-split.is-busy {
      filter: drop-shadow(0 6px 14px rgba(211,47,47,.24));
    }
    .ingest-split.is-busy .btn-primary {
      animation: fp-ingest-pulse 1.2s ease-in-out infinite;
    }
    /* 鈹€鈹€ Ingest result drawer 鈹€鈹€ */
    .fp-drawer {
      display: flex; flex-direction: column; gap: 10px;
      padding: 12px 14px; border-radius: var(--radius);
      background: var(--bg-card); border: 1px solid var(--border);
    }
    .fp-drawer__head { display: flex; align-items: center; gap: 8px; }
    .fp-drawer__title { font-weight: 600; font-size: 13px; color: var(--text);
                        display: inline-flex; align-items: center; gap: 6px; }
    .fp-drawer__title::before {
      content: ""; width: 3px; height: 14px; background: var(--primary);
      border-radius: 1px; display: inline-block;
    }
    .fp-drawer__spacer { flex: 1; }
    .fp-drawer__summary { font-size: 12px; color: var(--text-muted); }
    .fp-drawer__summary strong { color: var(--text); }
    .fp-drawer__body { display: flex; flex-wrap: wrap; gap: 8px; }
    .fp-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 12px; line-height: 1.4;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text);
    }
    .fp-pill--ok    { background: rgba(34,197,94,.10);  color: #15803D;
                       border-color: rgba(34,197,94,.28); }
    .fp-pill--empty { background: rgba(245,158,11,.10); color: #B45309;
                       border-color: rgba(245,158,11,.30); }
    .fp-pill--cooldown { background: rgba(245,158,11,.12); color: #B45309;
                         border-color: rgba(245,158,11,.36); }
    .fp-pill--error { background: rgba(239,68,68,.10);  color: #B91C1C;
                       border-color: rgba(239,68,68,.32); }
    .fp-pill__via   { font-size: 10px; padding: 1px 6px; border-radius: 6px;
                       background: rgba(0,0,0,.06); color: inherit; font-weight: 500; }
    .fp-pill__sep   { opacity: .5; }
    .fp-pill__btn   { font-size: 11px; cursor: pointer; background: transparent;
                       border: none; color: inherit; text-decoration: underline;
                       padding: 0; margin-left: 2px; }
    .fp-pill__reason { display: inline-flex; align-items: center; gap: 4px;
                       font-size: 11px; opacity: .85; font-style: italic; }
    .fp-drawer__error {
      width: 100%; font-size: 11.5px; color: var(--danger);
      background: rgba(239,68,68,.06); border: 1px dashed rgba(239,68,68,.28);
      border-radius: 6px; padding: 6px 10px; word-break: break-word;
    }
    /* 鈹€鈹€ Config banner (oa-config-banner) 鈹€鈹€ */
    .oa-config-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: var(--radius);
      background: rgba(245,158,11,.12); color: var(--warning);
      border: 1px solid rgba(245,158,11,.24);
    }
    .oa-config-banner__icon { display: inline-flex; align-items: center; }
    .oa-config-banner__text { flex: 1; font-size: 13px; color: var(--text); }
    .oa-config-banner__action {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 10px; font-size: 12px;
      border: none; border-radius: 6px; cursor: pointer;
      background: var(--primary); color: #fff;
    }
    .oa-config-banner__action:hover { background: var(--primary-hover); }
    .oa-icon { display: inline-flex; align-items: center; }
    /* 鈹€鈹€ Code block (terminal-style, with copy button) 鈹€鈹€ */
    .fp-codeblock { position: relative; border-radius: 6px;
                    background: #1F0F14; color: #FDEEF1;
                    border: 1px solid var(--border);
                    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                    font-size: 12px; overflow: hidden; }
    .fp-codeblock pre { margin: 0; padding: 10px 56px 10px 12px;
                        white-space: pre-wrap; word-break: break-word;
                        line-height: 1.55; color: inherit; background: transparent; }
    .fp-codeblock__copy { position: absolute; top: 6px; right: 6px;
                          padding: 2px 8px; font-size: 11px; }
    .digest-workbench {
      display: grid; grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 12px; align-items: start;
    }
    .digest-left, .digest-preview-pane {
      display: flex; flex-direction: column; gap: 12px; min-width: 0;
    }
    .digest-preview-pane { position: sticky; top: 0; }
    .digest-preview-frame {
      width: 100%; min-height: calc(100vh - 210px);
      border: 1px solid var(--border); border-radius: 12px; background: #fff;
    }
    .digest-history-list {
      display: flex; flex-direction: column; gap: 8px; max-height: 360px;
      overflow-y: auto; padding-right: 2px;
    }
    @media (max-width: 980px) {
      .digest-workbench { grid-template-columns: 1fr; }
      .digest-preview-pane { position: static; }
    }
    .radar-workbench {
      display: grid; grid-template-columns: minmax(380px, 500px) minmax(0, 1fr);
      gap: 12px; align-items: stretch; height: calc(100vh - 132px); min-height: 740px;
      overflow: hidden;
    }
    .radar-left, .radar-right { display: flex; flex-direction: column; gap: 12px; min-width: 0; min-height: 0; }
    .radar-left { height: 100%; overflow-y: auto; overflow-x: visible; padding-right: 4px; }
    .radar-left .card { margin: 0; }
    .radar-left .card--compact { flex: 0 0 auto; min-height: 0; display: flex; flex-direction: column; }
    .radar-left .card--compact textarea { flex: 0 0 auto; height: 118px; min-height: 108px; }
    .radar-right { height: 100%; overflow: hidden; }
    .radar-right > .card.grow { height: 100%; min-height: 0; overflow: auto; }
    .radar-rule-help {
      display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
      background: linear-gradient(180deg, rgba(211,47,47,.06), rgba(255,247,247,.82));
      padding: 6px 10px; margin-bottom: 8px; line-height: 1.4;
    }
    .radar-rule-help code {
      background: #fff; color: #b91c1c; border-color: rgba(211,47,47,.34);
      font-weight: 800; box-shadow: 0 1px 0 rgba(211,47,47,.08);
    }
    .radar-intro { padding: 6px 10px; margin-bottom: 0; line-height: 1.45; }
    .radar-exec-card { flex: 0 0 auto; overflow: visible; }
    .radar-exec-card .source-chip-grid--rail {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px; max-height: 104px !important; padding-right: 6px;
    }
    .radar-exec-card .source-chip {
      width: 100%; min-width: 0; justify-content: flex-start; overflow: hidden;
    }
    .source-chip__name {
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .radar-card--locked {
      position: relative;
      border: 2px solid rgba(37,99,235,.46) !important;
      background: linear-gradient(180deg, rgba(239,246,255,.78), rgba(255,255,255,.98)) !important;
      box-shadow: 0 0 0 2px rgba(37,99,235,.08), 0 8px 20px rgba(30,64,175,.08) !important;
    }
    .radar-card--locked::before {
      content: ""; position: absolute; inset: 0 auto 0 0; width: 3px;
      border-radius: var(--radius) 0 0 var(--radius);
      background: linear-gradient(180deg, #2563eb, #38bdf8);
      opacity: .78;
    }
    .radar-title-text { white-space: nowrap; flex: 0 0 auto; }
    .radar-locked-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: 999px;
      border: 1.5px solid rgba(37,99,235,.28);
      background: rgba(37,99,235,.08); color: #1d4ed8;
      font-size: 11px; font-weight: 800; white-space: nowrap; flex: 0 0 auto;
    }
    .radar-report-hero {
      border: 1px solid rgba(211,47,47,.16); border-radius: 14px; padding: 14px;
      background: linear-gradient(135deg, rgba(211,47,47,.10), rgba(255,255,255,.94));
      margin-bottom: 12px;
    }
    .radar-report-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    .radar-report-metric { border: 1px solid var(--border); border-radius: 10px; background: var(--bg-card); padding: 8px 10px; }
    .radar-report-metric b { display: block; font-size: 16px; color: var(--primary); }
    .radar-report-metric span { font-size: 11px; color: var(--text-muted); }
    .radar-report-section { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
    .radar-hit-card { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .radar-hit-card__title { color: var(--text); font-size: 13px; font-weight: 650; text-decoration: none; line-height: 1.5; }
    .radar-hit-card__meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 6px; font-size: 11px; color: var(--text-muted); }
    .report-plan-card--locked {
      border: 2px solid rgba(37,99,235,.46) !important;
      background: linear-gradient(180deg, rgba(239,246,255,.72), rgba(255,255,255,.98)) !important;
      box-shadow: 0 0 0 2px rgba(37,99,235,.08), 0 8px 20px rgba(30,64,175,.08);
    }
    .report-plan-card--locked .kw-tag:first-of-type {
      border-color: rgba(37,99,235,.28); background: rgba(37,99,235,.08); color: #1d4ed8;
      font-weight: 800;
    }
    @media (max-width: 980px) {
      .radar-workbench { grid-template-columns: 1fr; height: auto; overflow: visible; }
      .radar-left, .radar-right, .radar-right > .card.grow { height: auto; overflow: visible; }
    }
    .agent-tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; align-items: stretch; }
    .agent-tool-card { margin: 0; display: flex; flex-direction: column; height: 190px; min-height: 190px; }
    .agent-tool-json {
      flex: 1 1 96px; min-height: 96px; max-height: 96px; background: var(--bg-hover);
      padding: 8px 10px; border-radius: 6px; font-size: 11px; overflow: auto; margin: 0;
    }
    .agent-tool-actions { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
    /* 鈹€鈹€ Label bar 鈹€鈹€ */
    .label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px;
             display: flex; align-items: center; gap: 6px; }
    .label::before {
      content: ""; width: 3px; height: 14px; background: var(--primary);
      border-radius: 1px; display: inline-block;
    }
    /* 鈹€鈹€ Form inputs (input + invalid tooltip) 鈹€鈹€ */
    .field-wrap { position: relative; display: block; }
    .input {
      width: 100%; padding: 8px 10px; font-size: 13px;
      color: var(--text); background: var(--bg-card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      transition: border-color .15s;
    }
    .input:focus { outline: none; border-color: var(--primary); }
    .input.is-invalid { border-color: var(--danger); padding-right: 28px; }
    .field-warn-icon {
      position: absolute; top: 50%; right: 8px; transform: translateY(-50%);
      color: var(--danger); pointer-events: auto; cursor: help;
    }
    .field-warn-tip {
      position: absolute; top: calc(100% + 4px); right: 0;
      padding: 6px 10px; border-radius: 6px;
      font-size: 12px; color: #fff; background: var(--danger);
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity .15s;
      z-index: 10;
    }
    .field-warn-icon:hover + .field-warn-tip,
    .field-warn-tip:hover { opacity: .95; }
    /* 鈹€鈹€ Cards 鈹€鈹€ */
    .card {
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
    }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    /* 鈹€鈹€ Buttons 鈹€鈹€ */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; font-size: 13px; font-weight: 500;
      border: 1.5px solid var(--border); background: var(--bg-card);
      color: var(--text); border-radius: var(--radius); cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .btn:hover { background: var(--bg-hover); }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    /* Create-CTA 鈥?used by the "鏂板/鍒涘缓 xxx 璁″垝" buttons in the
       Digest workbench. The default ghost/.btn-primary look read as
       a regular row-action and confused users; this style is a wide,
       dashed, centred affordance that telegraphs "tap to create a
       new item" without competing with primary save/run buttons. */
    .btn-create {
      width: 100%; justify-content: center;
      padding: 10px 16px; font-size: 13px; font-weight: 600;
      border: 1.5px dashed var(--primary);
      background: rgba(220, 38, 38, .04);
      color: var(--primary);
      border-radius: var(--radius);
      transition: background .15s, border-style .15s, border-color .15s, color .15s, transform .08s;
    }
    .btn-create .oa-icon { width: 16px; height: 16px; flex: none; }
    .btn-create:hover {
      background: var(--primary); color: #fff;
      border-style: solid; border-color: var(--primary);
    }
    .btn-create:active { transform: translateY(1px); }
    .btn-create:disabled,
    .btn-create[aria-disabled="true"] {
      cursor: not-allowed; opacity: .55;
      background: transparent; color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-create:disabled:hover,
    .btn-create[aria-disabled="true"]:hover {
      background: transparent; color: var(--text-secondary);
      border-color: var(--border);
    }
    /* 鈹€鈹€ API pill (source status) 鈹€鈹€ */
    .api-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 500;
      background: rgba(22,163,74,.12); color: var(--success);
      cursor: default;
    }
    .api-pill--missing {
      background: rgba(245,158,11,.15); color: var(--warning); cursor: pointer;
    }
    .api-pill--missing:hover { filter: brightness(0.95); }
    /* 鈹€鈹€ Error panel (used by PluginErrorBoundary) 鈹€鈹€ */
    .err-panel { border: 1px solid var(--danger); border-radius: var(--radius); padding: 14px; background: rgba(220,38,38,0.08); }
    .err-panel__title { font-weight: 600; color: var(--danger); display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .err-panel__msg { font-size: 12px; color: var(--text); margin-bottom: 8px; word-break: break-word; }
    /* 鈹€鈹€ Confirm dialog (ConfirmHost / oaConfirm) 鈹€鈹€ */
    .confirm-mask {
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .confirm-dialog {
      background: var(--bg-card); color: var(--text);
      border-radius: var(--radius); border: 1.5px solid var(--border);
      padding: 20px; width: min(480px, 92vw); max-width: 480px;
      box-shadow: 0 18px 48px rgba(15,23,42,.22);
    }
    .confirm-dialog .card-title { font-size: 16px; margin-bottom: 10px; }
    .confirm-message { font-size: 13px; color: var(--text); line-height: 1.7; word-break: break-word; }
    .confirm-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    /* 鈹€鈹€ News card 鈹€鈹€ */
    .news-card {
      padding: 12px 0; border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .news-card:last-child { border-bottom: none; }
    .news-card:hover { background: var(--bg-hover); margin: 0 -14px; padding: 12px 14px; border-radius: var(--radius); }
    .news-card__header {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px;
    }
    .news-card__title {
      font-size: 14px; font-weight: 500; color: var(--text);
      text-decoration: none; display: block; word-break: break-word;
      line-height: 1.5;
    }
    .news-card__title:hover { color: var(--primary); }
    .news-card__summary {
      font-size: 12px; color: var(--text-muted); margin-top: 4px;
      line-height: 1.5; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-card__footer {
      display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap;
    }
    .news-card__time { font-size: 11px; color: var(--text-dim); }
    .news-card__actions { margin-left: auto; display: flex; gap: 4px; align-items: center; }
    .news-card--compact {
      padding: 10px; border: 1.5px solid rgba(211,47,47,.24); border-radius: var(--radius);
      background: var(--bg-card); min-width: 0; box-shadow: 0 1px 4px rgba(15,23,42,.04);
    }
    .news-card.news-card--compact:hover {
      margin: 0; padding: 10px; background: var(--bg-card);
      border-color: rgba(211,47,47,.42); box-shadow: 0 6px 18px rgba(15,23,42,.08);
    }
    .news-card--compact .news-card__title {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; min-height: 42px;
    }
    .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
    .news-source-group {
      margin: 14px 0 18px; padding: 10px 12px 12px;
      border: 1.5px solid rgba(15,23,42,.12); border-left: 4px solid var(--primary);
      border-radius: 10px; background: linear-gradient(180deg, rgba(211,47,47,.025), var(--bg-card));
      box-shadow: 0 1px 5px rgba(15,23,42,.035);
    }
    .news-source-group + .news-source-group { margin-top: 18px; }
    .news-source-group__head {
      display: flex; align-items: center; gap: 8px; margin: 0 0 10px;
      padding: 0 0 8px; border-bottom: 1px solid rgba(15,23,42,.08);
      cursor: pointer; user-select: none;
    }
    .news-source-group__title { font-size: 13px; font-weight: 600; color: var(--text); }
    .news-source-group__meta { margin-left: auto; font-size: 11px; color: var(--text-muted); }
    /* Source pill 鈥?colored by source */
    .source-pill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 500;
      background: rgba(211,47,47,.08); color: #c62828; white-space: nowrap;
    }
    .source-pill--nn { background: rgba(245,158,11,.10); color: #b45309; }
    .source-pill--rss { background: rgba(16,185,129,.10); color: #047857; }
    .source-pill--direct { background: rgba(59,130,246,.10); color: #1d4ed8; }
    /* Source chip grids (settings + news source rail) */
    .source-chip-grid { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .source-chip-grid--rail {
      width: 100%; max-height: 92px; overflow-y: auto; overflow-x: hidden;
      padding: 2px 4px 2px 0; scrollbar-width: thin; align-content: flex-start;
    }
    .filter-source-panel {
      display: flex; flex-direction: column; gap: 8px;
      width: 100%; min-width: 0;
      padding-bottom: 8px; border-bottom: 1px solid rgba(15,23,42,.08);
    }
    .filter-source-panel__head {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .filter-source-cats { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .filter-source-cat {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 9px; border-radius: 999px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-muted);
      font-size: 12px; cursor: pointer;
    }
    .filter-source-cat:hover { border-color: var(--primary); color: var(--text); }
    .filter-source-cat--active {
      border-color: rgba(211,47,47,.28); background: rgba(211,47,47,.10);
      color: var(--primary);
    }
    .filter-source-cat__count { font-size: 10px; color: var(--text-muted); }
    .source-chip {
      display: inline-flex; align-items: center; gap: 6px;
      min-height: 28px; padding: 4px 10px;
      border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--bg-card); color: var(--text);
      font-size: 12px; font-weight: 500; cursor: pointer;
      white-space: nowrap; transition: border-color .12s, background .12s, color .12s;
    }
    .source-chip:hover { border-color: var(--primary); }
    .source-chip--on { border-color: rgba(211,47,47,.22); background: var(--bg-card); }
    .source-chip--off {
      opacity: .72; color: var(--text-muted); background: rgba(148,163,184,.06);
      border-style: dashed;
    }
    .source-chip.source-chip--active {
      border-color: var(--primary); background: rgba(211,47,47,.12); color: var(--primary);
      box-shadow: inset 0 0 0 1px rgba(211,47,47,.20);
    }
    .source-chip__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
    .source-chip--on .source-chip__dot,
    .source-chip--active .source-chip__dot { background: var(--primary); }
    .source-chip__type {
      padding: 0 5px; border-radius: 999px; background: var(--bg-hover);
      color: var(--text-muted); font-size: 10px; font-weight: 500;
    }
    .source-chip--off .source-chip__dot { background: #cbd5e1; }
    .source-chip--off .source-chip__type { opacity: .8; }
    .source-panel-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .source-subsection {
      border: 1px solid rgba(15,23,42,.08); border-radius: 10px;
      padding: 12px; margin-top: 12px; background: var(--bg-card);
    }
    .source-subsection__head {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .source-subsection__title {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: var(--text);
    }
    .source-subsection__title::before {
      content: ""; width: 3px; height: 16px; background: var(--primary);
      border-radius: 1px; display: inline-block;
    }
    .source-subsection__actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .switch-row { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); }
    .source-master-switch {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1.5px solid var(--border); border-radius: 999px;
      padding: 5px 10px; background: rgba(255,255,255,.92);
      color: var(--text); font-size: 12px;
    }
    .channel-picker { position: relative; width: 100%; }
    .channel-picker__button {
      width: 100%; min-height: 38px; display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius);
      background: var(--bg-card); color: var(--text); text-align: left; cursor: pointer;
      overflow: hidden;
    }
    .channel-picker__button:hover { border-color: rgba(211,47,47,.28); }
    .channel-picker__button.is-empty { color: var(--text-muted); }
    .channel-picker__main { flex: 1; min-width: 0; }
    .channel-picker__title { font-size: 13px; font-weight: 650; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .channel-picker__sub { display: block; max-width: 100%; font-size: 11px; color: var(--text-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .channel-picker__platform {
      flex: 0 0 auto; min-width: 42px; text-align: center; padding: 2px 7px;
      border-radius: 999px; background: rgba(211,47,47,.08); color: var(--primary);
      font-size: 11px; font-weight: 700;
    }
    .channel-picker__menu {
      position: absolute; left: 0; right: 0; top: calc(100% + 6px); z-index: 80;
      max-height: 260px; overflow-y: auto; padding: 6px;
      border: 1.5px solid rgba(15,23,42,.16); border-radius: 12px;
      background: var(--bg-card); box-shadow: 0 16px 36px rgba(15,23,42,.16);
    }
    .channel-picker__item {
      width: 100%; border: 0; background: transparent; border-radius: 9px;
      padding: 8px 9px; display: flex; align-items: center; gap: 10px;
      color: var(--text); text-align: left; cursor: pointer;
    }
    .channel-picker__item:hover, .channel-picker__item--active { background: var(--bg-hover); }
    .custom-source-dialog__mode { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .custom-source-dialog__preview {
      font-size: 11px; color: var(--text-muted); word-break: break-all;
      margin-top: 6px; padding: 6px 10px;
      border: 1px dashed var(--border); border-radius: 8px; background: var(--bg);
    }
    .timeline {
      position: relative; display: flex; flex-direction: column; gap: 16px;
      padding: 4px 0 4px 0;
    }
    .timeline::before {
      content: ""; position: absolute; left: 78px; top: 0; bottom: 0;
      width: 2px; background: linear-gradient(180deg, rgba(211,47,47,.30), rgba(211,47,47,.06));
    }
    .timeline-slot {
      position: relative; display: grid; grid-template-columns: 92px 1fr; gap: 14px;
    }
    .timeline-slot__time {
      position: sticky; top: 8px; align-self: start;
      color: var(--primary); font-size: 12px; font-weight: 700;
      text-align: right; padding-right: 20px; line-height: 1.3;
    }
    .timeline-slot__time::after {
      content: ""; position: absolute; right: -7px; top: 3px;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--bg-card); border: 2px solid var(--primary);
      box-shadow: 0 0 0 3px rgba(211,47,47,.10);
    }
    .timeline-slot__meta { display: block; color: var(--text-muted); font-size: 10px; font-weight: 500; margin-top: 3px; }
    .timeline-slot__items { min-width: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
    .filter-bar--news { display: flex; flex-direction: column; align-items: stretch; gap: 10px; }
    .filter-bar__row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px 16px; }
    /* Keyword tag */
    .kw-tag {
      display: inline-flex; padding: 1px 6px; border-radius: 4px;
      font-size: 11px; font-weight: 500;
      background: #eff6ff; color: #2563eb;
    }
    [data-theme="dark"] .kw-tag { background: rgba(59,130,246,.15); color: #60a5fa; }
    /* AI score badge 鈥?color scales with score */
    .ai-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
    }
    .ai-badge--high { background: rgba(211,47,47,.10); color: #c62828; }
    .ai-badge--mid { background: rgba(245,158,11,.10); color: #b45309; }
    .ai-badge--low { background: var(--bg-hover); color: var(--text-muted); }
    /* Keyword highlight */
    mark.kw-hl { background: #FFF9C4; color: inherit; border-radius: 2px; padding: 0 1px; }
    [data-theme="dark"] mark.kw-hl { background: rgba(255,235,59,.18); }
    /* AI filter dialog overlay */
    .ai-dialog-mask {
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .ai-dialog {
      background: var(--bg-card); color: var(--text);
      border-radius: var(--radius); border: 1px solid var(--border);
      padding: 20px; width: 380px; max-width: 90vw;
      max-height: 88vh; overflow: auto;
    }
    .ai-dialog--wide { width: 560px; }
    .ai-dialog__title {
      font-size: 15px; font-weight: 600; color: var(--text);
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }
    .ai-dialog__title::before {
      content: ""; width: 3px; height: 16px; background: var(--primary);
      border-radius: 1px; display: inline-block;
    }
    .ai-dialog__field { margin-bottom: 12px; }
    .ai-dialog__label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
    .ai-dialog__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
    .choice-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg);
      font-size: 12px; color: var(--text); cursor: pointer;

/* 鈹€鈹€ Shared helpers 鈹€鈹€ */
function tfmt(template, vars) {
  return String(template || "").replace(/\{(\w+)\}/g, function (_, k) { return (vars && k in vars) ? vars[k] : "{" + k + "}"; });
}
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const pad = function (n) { return n < 10 ? "0" + n : "" + n; };
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
}
function _fmtWallClock(raw, withHour) {
  if (!raw) return "";
  var s = String(raw).trim();
  var m = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})(?:[T\s](\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);
  if (!m) return "";
  var pad = function (n) { n = Number(n || 0); return n < 10 ? "0" + n : "" + n; };
  var date = m[1] + "-" + pad(m[2]) + "-" + pad(m[3]);
  if (!withHour || !m[4]) return date;
  return date + " " + pad(m[4]) + ":" + pad(m[5]);
}
function fmtArticleDate(it) {
  if (!it) return "";
  if (it.published_at) {
    return _fmtWallClock(it.published_at, true) || fmtDate(it.published_at);
  }
  return fmtDate(it.fetched_at || "");
}
function fmtTimelineBucket(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso).slice(0, 16);
  const pad = function (n) { return n < 10 ? "0" + n : "" + n; };
  return pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":00";
}
function fmtArticleTimelineBucket(it) {
  if (it && it.published_at) {
    var wall = _fmtWallClock(it.published_at, true);
    if (wall) return wall.slice(5, 13) + ":00";
  }
  return fmtTimelineBucket(articleTime(it));
}
function fmtTimelineMinute(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  const pad = function (n) { return n < 10 ? "0" + n : "" + n; };
  return pad(d.getHours()) + ":" + pad(d.getMinutes());
}
function articleTime(it) {
  return (it && (it.published_at || it.fetched_at)) || "";
}
function hoursAgoISO(hours) {
  const d = new Date(Date.now() - hours * 3600 * 1000);
  return d.toISOString().replace(/\.\d+Z$/, "Z");
}
function datetimeLocalToISO(value) {
  if (!value) return "";
  const d = new Date(value);
  if (isNaN(d.getTime())) return "";
  return d.toISOString().replace(/\.\d+Z$/, "Z");
}
function copyText(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text);
    } else {
      const el = document.createElement("textarea");
      el.value = text; document.body.appendChild(el); el.select();
      document.execCommand("copy"); document.body.removeChild(el);
    }
  } catch (_) {}
}

/* 鈹€鈹€ Ingest drawer helpers + component 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
   The drawer renders the per-source breakdown returned by
   POST /ingest (or POST /ingest/source/{id}). Each pill shows:
   路 source display name
   路 NewsNow / 鐩磋繛 / 鍐峰嵈 / 鏃犵粨鏋?badge (the "via" transport)
   路 result summary (+{inserted} new 路 {updated} updated, empty, failed)
   路 an expandable error row when the fetcher reported an error.
*/
function _sourceName(sources, id) {
  for (let i = 0; i < sources.length; i++) {
    if (sources[i].id === id) return sources[i].name;
  }
  return id || "";
}
function _countNonEmpty(bySource) {
  let n = 0;
  Object.keys(bySource || {}).forEach(function (k) {
    const row = bySource[k] || {};
    if (!row.error && Number(row.fetched || 0) > 0) n += 1;
  });
  return n;
}
function _pillClass(row) {
  if (row.error_kind === "rate_limited") return "fp-pill fp-pill--cooldown";
  if (row.error || row.error_kind) return "fp-pill fp-pill--error";
  if (Number(row.fetched || 0) > 0) return "fp-pill fp-pill--ok";
  return "fp-pill fp-pill--empty";
}
function _viaKey(row) {
  if (row.error_kind === "rate_limited") return "cooldown";
  const v = String(row.via || "").toLowerCase();
  if (v === "newsnow") return "newsnow";
  if (v === "direct") return "direct";
  if (v === "none") return "none";
  return "direct";
}
/* Map the fetcher-side ``via_reason`` string (e.g.
   ``newsnow:cloudflare_blocked``) to a user-facing label.
   Unknown kinds fall back to the raw string so a new backend
   kind never regresses into "(empty)". */
function _viaReasonLabel(t, raw) {
  const s = String(raw || "").trim();
  if (!s) return "";
  const parts = s.split(":");
  const head = (parts[0] || "").toLowerCase();
  const tail = (parts[1] || "").toLowerCase();
  if (head === "rss") {
    const rssKinds = {
      "not_configured": "today.drawer.via_reason.rss_not_configured",
      "no_items": "today.drawer.via_reason.rss_no_items",
    };
    return rssKinds[tail] ? t(rssKinds[tail]) : s;
  }
  if (head !== "newsnow") return s;
  const knownKinds = {
    "cloudflare_blocked": "today.drawer.via_reason.newsnow_cloudflare_blocked",
    "invalid_source_id": "today.drawer.via_reason.newsnow_invalid_source_id",
    "empty_payload": "today.drawer.via_reason.newsnow_empty_payload",
  };
  if (knownKinds[tail]) return t(knownKinds[tail]);
  if (tail.indexOf("http_") === 0) return t("today.drawer.via_reason.newsnow_http");
  if (tail.indexOf("error") === 0) return t("today.drawer.via_reason.newsnow_error");
  return s;
}

function IngestDrawer(props) {
  const t = useT();
  const [expandedId, setExpandedId] = useState("");
  const summary = props.summary;
  const sources = props.sources;
  const bySource = summary.bySource || {};
  const sourceIds = Object.keys(bySource);
  const totals = summary.totals || {};
  const inserted = Number(totals.inserted || 0);
  const updated = Number(totals.updated || 0);

  return (
    <div className="fp-drawer" role="region" aria-live="polite">
      <div className="fp-drawer__head">
        <span className="fp-drawer__title">{t("today.drawer.title")}</span>
        <span className="fp-drawer__spacer"/>
        <span className="fp-drawer__summary">
          <strong>{"+" + inserted}</strong>
          <span className="fp-pill__sep" style={{margin: "0 4px"}}>路</span>
          <strong>{updated}</strong>
          <span style={{opacity: .75, marginLeft: 4}}>
            ({totals.sources_ok || 0}/{totals.sources_total || sourceIds.length})
          </span>
        </span>
        <button className="btn btn-sm" type="button" onClick={props.onDismiss}>
          <Ico name="close"/> {t("today.drawer.dismiss")}
        </button>
      </div>
      {sourceIds.length === 0 && (
        <div className="fp-drawer__summary">
          {summary.reason === "no_sources_enabled"
            ? t("today.ingest.done.none_enabled")
            : t("today.drawer.empty")}
        </div>
      )}
      <div className="fp-drawer__body">
        {sourceIds.map(function (id) {
          const row = bySource[id] || {};
          const viaKey = _viaKey(row);
          const cls = _pillClass(row);
          const label = _sourceName(sources, id);
          const ins = Number(row.inserted || 0);
          const upd = Number(row.updated || 0);
          const fetched = Number(row.fetched || 0);
          const isCooldown = row.error_kind === "rate_limited";
          let statusText = "";
          if (isCooldown) {
            statusText = tfmt(t("today.drawer.status.cooldown"), {s: Number(row.retry_after_s || 0)});
          } else if (row.error || row.error_kind) {
            statusText = t("today.drawer.status.error");
          } else if (ins + upd > 0) {
            statusText = tfmt(t("today.drawer.status.ok"),
                              {fetched: fetched, inserted: ins, updated: upd});
          } else if (fetched > 0) {
            statusText = tfmt(t("today.drawer.status.fetchedOnly"), {fetched: fetched});
          } else {
            statusText = t("today.drawer.status.empty");
          }
          const expanded = expandedId === id;
          const hasError = !!(row.error || row.error_kind) && !isCooldown;
          const viaReason = _viaReasonLabel(t, row.via_reason);
          return (
            <span key={id} className={cls} title={label}>
              <span className="fp-pill__via">{t("today.drawer.via." + viaKey)}</span>
              <span>{label}</span>
              <span className="fp-pill__sep">路</span>
              <span>{statusText}</span>
              {viaReason && (
                <span className="fp-pill__reason" title={row.via_reason || ""}>
                  <span className="fp-pill__sep">路</span>
                  <span>{viaReason}</span>
                </span>
              )}
              {hasError && (
                <button className="fp-pill__btn" type="button"
                        onClick={function () { setExpandedId(expanded ? "" : id); }}>
                  {expanded ? "鈭? : "+"} {t("today.drawer.show_error")}
                </button>
              )}
              {expanded && hasError && (
                <div className="fp-drawer__error">
                  <strong>{row.error_kind || "error"}</strong>
                  {row.error ? " 路 " + String(row.error).slice(0, 240) : ""}
                </div>
              )}
            </span>
          );
        })}
      </div>
    </div>
  );
}

/* 鈹€鈹€ Keyword highlight helper 鈹€鈹€ */
function highlightText(text, keyword) {
  if (!keyword || !text) return text;
  var lower = String(text).toLowerCase();
  var kw = keyword.toLowerCase();
  var idx = lower.indexOf(kw);
  if (idx < 0) return text;
  var parts = [];
  var lastIdx = 0;
  while (idx >= 0) {
    if (idx > lastIdx) parts.push(text.substring(lastIdx, idx));
    parts.push(<mark key={idx} className="kw-hl">{text.substring(idx, idx + kw.length)}</mark>);
    lastIdx = idx + kw.length;
    idx = lower.indexOf(kw, lastIdx);
  }
  if (lastIdx < text.length) parts.push(text.substring(lastIdx));
  return parts;
}

function _tokenizeInterestText(text) {
  var stop = {"鍏虫敞": 1, "閲嶇偣": 1, "鏂伴椈": 1, "璧勮": 1, "鍙樺寲": 1, "鐩稿叧": 1, "浠ュ強": 1, "渚嬪": 1, "涓€涓?: 1, "杩欎釜": 1};
  var out = [];
  String(text || "").split(/[\n锛?銆侊紱;銆?!锛?锛燂細:\s]+/).forEach(function (word) {
    word = word.trim();
    if (word.length >= 2 && !stop[word]) out.push(word.toLowerCase());
  });
  return out;
}

function _inferSentimentFromText(text) {
  text = String(text || "").toLowerCase();
  var positive = ["涓婃定", "娑ㄥ仠", "璧板己", "鍙嶅脊", "鍥炴殩", "鍒╁ソ", "澧為暱", "澧炴寔", "绐佺牬", "鍒涙柊楂?, "涓婅皟", "鎵╁紶", "涔愯", "positive", "bullish", "surge", "gain", "beat", "upgrade"];
  var negative = ["涓嬭穼", "璺屽仠", "璧板急", "鍥炶惤", "鎵垮帇", "鍒╃┖", "涓嬮檷", "鍑忔寔", "浜忔崯", "鏆磋穼", "涓嬭皟", "鏀剁缉", "鎷呭咖", "椋庨櫓", "negative", "bearish", "slump", "loss", "miss", "downgrade"];
  var pos = 0, neg = 0;
  positive.forEach(function (w) { if (text.indexOf(w) >= 0) pos += 1; });
  negative.forEach(function (w) { if (text.indexOf(w) >= 0) neg += 1; });
  if (pos > neg) return "positive";
  if (neg > pos) return "negative";
  return "neutral";
}

function _aiScoreArticle(it, ctx) {
  var text = ((it.title || "") + " " + (it.summary || "") + " " + JSON.stringify(it.raw || {})).toLowerCase();
  if (ctx.excludeTokens.some(function (tok) { return text.indexOf(tok) >= 0; })) return {excluded: true, score: 0, sentiment: "neutral"};
  var score = 0;
  ctx.keywordTokens.forEach(function (tok) { if (text.indexOf(tok) >= 0) score += 12; });
  ctx.interestTokens.forEach(function (tok) { if (text.indexOf(tok) >= 0) score += 8; });
  var inferred = it.sentiment || _inferSentimentFromText(text);
  if (ctx.sentiment && ctx.sentiment !== "all") {
    score += inferred === ctx.sentiment ? 10 : 2;
  }
  return {excluded: false, score: score, sentiment: inferred};
}
