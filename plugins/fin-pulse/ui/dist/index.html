            <div className="source-panel-actions">
              <button className="btn btn-sm" disabled={!!probingIds.direct_rss}
                      onClick={function () { onProbeSourceGroup("direct_rss", directSources); }}>
                <Ico name="refresh"/> {probingIds.direct_rss ? t("settings.sources.probing") : t("settings.sources.probe.direct")}
              </button>
              {probeLabels.direct_rss && (
                <span style={{fontSize: 11, color: probeStates.direct_rss === "ok" ? "var(--success)" : "var(--danger)"}}>
                  {probeLabels.direct_rss}
                </span>
              )}
            </div>
          </Collapsible>

          {/* Category 2: Custom sources */}
          <Collapsible
            title={t("settings.sources.cat.custom")}
            badge={tfmt(t("settings.sources.count"), {n: customFeeds.length})}
            defaultOpen={false}>
            <div className="source-subsection">
              <div className="source-subsection__head">
                <div className="source-subsection__title">{t("settings.sources.custom.listTitle")}</div>
                <div className="source-subsection__actions">
                  <button className="source-master-switch" type="button"
                          onClick={function () { onToggleSource("rss_generic"); }}
                          title={t("settings.sources.rss.master")}>
                    <ToggleSwitch on={isEnabled("rss_generic")} onChange={function (e) { e.stopPropagation(); onToggleSource("rss_generic"); }}/>
                    <span>{t("settings.sources.custom.listTitle")}</span>
                  </button>
                  <button className="btn btn-sm" disabled={!customFeeds.length || !!customProbing.all}
                          onClick={onProbeAllCustom}>
                    <Ico name="refresh"/> {customProbing.all ? t("settings.sources.probing") : t("settings.sources.probe.custom")}
                  </button>
                  {probeLabels.custom_rss && (
                    <span style={{fontSize: 11, color: probeStates.custom_rss === "ok" ? "var(--success)" : "var(--danger)"}}>
                      {probeLabels.custom_rss}
                    </span>
                  )}
                  <button className="btn btn-sm" onClick={function () { setCustomDialogOpen(true); }}>
                    {t("settings.sources.custom.add")}
                  </button>
                </div>
              </div>
              {customFeeds.length === 0 ? (
                <div className="empty" style={{padding: "10px 0"}}>{t("settings.sources.custom.empty")}</div>
              ) : (
                <div className="source-chip-grid" style={{marginTop: 8}}>
                {customFeeds.map(function (f, idx) {
                  return (
                    <div key={f.id} className="source-chip" title={f.url}>
                      <span className="source-chip__dot"/>
                      <span>{_customFeedDisplayName(f, idx)}</span>
                      <span className="source-chip__type">RSS</span>
                      <span className="source-chip__type" title={f.url}>閾炬帴</span>
                      {customProbeLabels[idx] && (
                        <span style={{fontSize: 11, color: customProbeLabels[idx].indexOf("OK") >= 0 || customProbeLabels[idx].indexOf("鍙敤") >= 0 ? "var(--success)" : "var(--danger)"}}>
                          {customProbeLabels[idx]}
                        </span>
                      )}
                      <button className="btn btn-sm" title={t("settings.sources.custom.delete")}
                              onClick={function (e) { e.stopPropagation(); onDeleteCustom(idx); }}>
                        脳
                      </button>
                    </div>
                  );
                })}
                </div>
              )}
            </div>

            {customDialogOpen && (
              <CustomSourceDialog
                onSave={onSaveCustomFeed}
                onClose={function () { setCustomDialogOpen(false); }}
              />
            )}
          </Collapsible>

          {/* Category 3: NewsNow aggregated */}
          <Collapsible
            title={t("settings.sources.cat.newsnow")}
            badge={tfmt(t("settings.sources.count"), {n: newsnowSources.length})}
            defaultOpen={false}>
            <div style={{display: "flex", alignItems: "center", gap: 10, marginBottom: 10, flexWrap: "wrap"}}>
              <label className="switch-row">
                <ToggleSwitch
                  on={newsnowMode === "public"}
                  onChange={function () {
                    var next = newsnowMode === "public" ? "off" : "public";
                    setCfgField("newsnow.mode", next);
                    if (next === "public") {
                      setCfgField("newsnow.api_url", NEWSNOW_PUBLIC_URL);
                      setCfgField("newsnow.min_interval_s", String(Math.max(newsnowFloor, NEWSNOW_PUBLIC_MIN_INTERVAL_S)));
                    }
                    persist(next === "public"
                      ? {"newsnow.mode": next, "newsnow.api_url": NEWSNOW_PUBLIC_URL, "newsnow.min_interval_s": String(Math.max(newsnowFloor, NEWSNOW_PUBLIC_MIN_INTERVAL_S))}
                      : {"newsnow.mode": next});
                  }}
                />
                <span>{t("settings.sources.nn.mode")}</span>
              </label>
              <span className={"api-pill " + (newsnowMode === "public" ? "" : "api-pill--missing")}>
                {t("settings.newsnow.mode." + newsnowMode)}
              </span>
            </div>

            {newsnowMode === "public" && (
              <div style={{marginBottom: 10}}>
                <div style={{display: "flex", gap: 8, alignItems: "center", fontSize: 12}}>
                  <span style={{color: "var(--text-muted)"}}>{t("settings.sources.nn.floor")}:</span>
                  <input className="input" type="number" style={{width: 80}}
                         min={NEWSNOW_PUBLIC_MIN_INTERVAL_S} step={60}
                         value={newsnowFloor}
                         onChange={function (e) {
                           var v = Math.max(NEWSNOW_PUBLIC_MIN_INTERVAL_S, parseInt(e.target.value || "300", 10) || NEWSNOW_PUBLIC_MIN_INTERVAL_S);
                           setCfgField("newsnow.min_interval_s", String(v));
                         }}
                         onBlur={function () { persist({"newsnow.min_interval_s": String(newsnowFloor)}); }}/>
                  <span style={{color: "var(--text-muted)", fontSize: 11}}>{t("settings.sources.nn.floor.unit")}</span>
                </div>
                <div className="oa-hint" style={{fontSize: 11, marginTop: 4}}>
                  {tfmt(t("settings.sources.nn.publicHint"), {floor: NEWSNOW_PUBLIC_MIN_INTERVAL_S})}
                </div>
              </div>
            )}

            {/* NewsNow source chips */}
            <div className="source-chip-grid">
              {newsnowSources.map(function (s) {
                var disabled = newsnowMode === "off";
                return (
                  <SourceChip
                    key={s.id}
                    source={s}
                    enabled={!disabled && isEnabled(s.id)}
                    onClick={disabled ? function () {} : function () { onToggleSource(s.id); }}
                    title={(isEnabled(s.id) ? "" : t("settings.sources.disabled.hint") + "\n") + String(s.newsnow_id || s.id)}
                  />
                );
              })}
            </div>
            <div className="source-panel-actions">
              <button className="btn btn-sm" disabled={newsnowMode === "off" || !!probingIds.newsnow}
                      onClick={function () { onProbeSourceGroup("newsnow", newsnowSources); }}>
                <Ico name="refresh"/> {probingIds.newsnow ? t("settings.sources.probing") : t("settings.sources.probe.newsnow")}
              </button>
              {probeLabels.newsnow && (
                <span style={{fontSize: 11, color: probeStates.newsnow === "ok" ? "var(--success)" : "var(--danger)"}}>
                  {probeLabels.newsnow}
                </span>
              )}
            </div>
          </Collapsible>
        </div>
      </div>

      {/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲 AI Translation 鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */}
      <div className="card" style={{padding: "16px 14px"}}>
        <div className="oa-settings-section">
          <div className="oa-settings-section__title">{t("settings.translation.title")}</div>
          <div className="oa-hint" style={{marginBottom: 12}}>{t("settings.translation.desc")}</div>
          <div style={{display: "grid", gridTemplateColumns: "minmax(160px, 1fr) minmax(160px, 1fr) minmax(160px, 1fr)", gap: 12}}>
            <label style={{display: "flex", alignItems: "center", gap: 8}}>
              <ToggleSwitch
                on={config["translation.enabled"] === undefined ? true : config["translation.enabled"] !== false && config["translation.enabled"] !== "false"}
                onChange={function () {
                  var cur = config["translation.enabled"];
                  var next = cur === undefined ? false : !(cur !== false && cur !== "false");
                  setCfgField("translation.enabled", next);
                  persist({"translation.enabled": String(next)});
                }}
              />
              <span style={{fontSize: 13, color: "var(--text)"}}>{t("settings.translation.enabled")}</span>
            </label>
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.translation.target")}</span>
              <input className="input" value={String(config["translation.target_language"] || "涓枃")}
                     onChange={function (e) { setCfgField("translation.target_language", e.target.value); }}
                     onBlur={function () { persist({"translation.target_language": String(config["translation.target_language"] || "涓枃")}); }}/>
            </label>
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.translation.scope")}</span>
              <select className="input" value={String(config["translation.scope"] || "title_summary")}
                      onChange={function (e) { setCfgField("translation.scope", e.target.value); persist({"translation.scope": e.target.value}); }}>
                <option value="title_summary">{t("settings.translation.scope.title_summary")}</option>
              </select>
            </label>
          </div>
        </div>
      </div>

      {/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲 LLM 鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */}
      <div className="card">
        <div className="card-title">{t("settings.llm.title")}</div>
        <div className="oa-hint">{t("settings.llm.hint")}</div>
      </div>

      {/* Agent tools are hints for the host chat, not a standalone plugin tab. */}
      <div className="card">
        <AgentToolsHint />
      </div>
    </div>
  );
}

/* 鈹€鈹€ App shell 鈹€鈹€ */
function App() {
  const t = useT();
  const [activeTab, setActiveTab] = useState(0);
  const { settings, loaded } = useSettings();

  /* theme sync from host ctx */
  useEffect(function () {
    return onEvent("synapse:theme-change", function (d) {
      const theme = (d && d.theme) || "light";
      document.documentElement.setAttribute("data-theme", theme.indexOf("dark") >= 0 ? "dark" : "light");
    });
  }, []);

  /* shortcut keys (d 鈫?theme toggle, Esc 鈫?close modal) */
  useEffect(function () {
    function onKey(e) {
      const tag = (e.target && e.target.tagName) || "";
      if (tag === "INPUT" || tag === "TEXTAREA" || e.target.isContentEditable) return;
      if (e.key === "d") {
        const current = document.documentElement.getAttribute("data-theme") || "light";
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        try { localStorage.setItem("fp-theme", next); } catch (_) {}
      }
    }
    window.addEventListener("keydown", onKey);
    return function () { window.removeEventListener("keydown", onKey); };
  }, []);

  /* The "no IM channel" banner was previously mounted globally on
     every tab. We now scope it strictly to the Settings 鈫?IM channels
     card (rendered inside SettingsForm), so the Today / Digests /
     Radar / Ask tabs stay visually clean. */

  return (
    <div className="app">
      <div className="header">
        <h1 className="oa-hero-title">
          <BrandMark />
          <span className="oa-hero-title__text">
            {t("app.title")}
            <span className="oa-hero-title__sub">{t("app.subtitle")}</span>
          </span>
        </h1>
        <div className="header-right" />
      </div>
      <div className="tabs">
        {TAB_IDS.map(function (id, i) {
          return (
            <div key={id}
                 className={"tab " + (activeTab === i ? "active" : "")}
                 onClick={function () { setActiveTab(i); }}>
              <Ico name={TAB_ICONS[id]} /> {t("tabs." + id)}
            </div>
          );
        })}
      </div>
      <div className="content">
        {activeTab === 0 && <TodayTab />}
        {activeTab === 1 && <DigestsTab />}
        {activeTab === 2 && <RadarTab />}
        {activeTab === 3 && <SettingsTab goToTab={setActiveTab} />}
      </div>
      <ConfirmHost />
    </div>
  );
}

class PluginErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error: error }; }
  componentDidCatch(error, info) { this.setState({ info: info }); console.error("[fin-pulse] render error:", error, info); }
  render() {
    if (!this.state.error) return this.props.children;
    const err = this.state.error;
    const msg = (err && err.message) ? err.message : String(err);
    return (
      <div style={{padding: 24, maxWidth: 820, margin: "0 auto"}}>
        <div className="err-panel">
          <div className="err-panel__title"><Ico name="warn" /> {_i18n.t("err.title")}</div>
          <div className="err-panel__msg">{msg}</div>
          <button className="btn btn-sm" onClick={() => this.setState({ error: null, info: null })}>
            {_i18n.t("err.retry")}
          </button>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <PluginErrorBoundary><App /></PluginErrorBoundary>
);
if (window.Synapse && typeof window.Synapse.ready === "function") {
  window.Synapse.ready();
}
