/* 鈹€鈹€ Today Tab 鈥?live article feed 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
function TodayTab() {
  const t = useT();
  const [items, setItems] = useState([]);
  const [total, setTotal] = useState(0);
  const [loading, setLoading] = useState(false);
  const [filters, setFilters] = useState({ window: 24, sort: "time_desc", since: "", until: "" });
  const [focusedSources, setFocusedSources] = useState([]);
  const [sourceCategory, setSourceCategory] = useState("all");
  const [searchDraft, setSearchDraft] = useState("");
  const [keyword, setKeyword] = useState("");
  const [customTimeOpen, setCustomTimeOpen] = useState(false);
  const [ingesting, setIngesting] = useState(false);
  const [sources, setSources] = useState([]);
  const [sourceConfig, setSourceConfig] = useState({});
  const [sourcesLoadError, setSourcesLoadError] = useState("");
  const [lastIngest, setLastIngest] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [cooldown, setCooldown] = useState(0);
  const [aiFilterOpen, setAiFilterOpen] = useState(false);
  const [aiFilter, setAiFilter] = useState(null);
  const [exportOpen, setExportOpen] = useState(false);
  const [exportPreview, setExportPreview] = useState(null);
  const [viewMode, setViewMode] = useState("grouped");
  const [collapsedGroups, setCollapsedGroups] = useState({});
  const [translationConfig, setTranslationConfig] = useState({enabled: true, target_language: "涓枃", scope: "title_summary"});
  const [translatedMap, setTranslatedMap] = useState({});
  const [translatingIds, setTranslatingIds] = useState({});

  /* Load sources + config for enabled state */
  useEffect(function () {
    let cancelled = false;
    Promise.all([api("GET", "/sources"), api("GET", "/config")]).then(function (resps) {
      if (cancelled) return;
      var srcResp = resps[0], cfgResp = resps[1];
      var rawSources = (srcResp && srcResp.ok && Array.isArray(srcResp.items) && srcResp.items.length) ? srcResp.items : SOURCE_FALLBACK;
      if (rawSources.length) {
        var mapped = rawSources.map(function (s) {
          return {
            id: String(s.id || ""), name: String(s.display_zh || s.display_en || s.id || ""),
            kind: String(s.kind || ""), content_type: String(s.content_type || "news"),
            group: String(s.group || ""),
            display_zh: String(s.display_zh || s.name || s.id || ""),
            display_en: String(s.display_en || s.name || s.id || ""),
            fetcher_id: String(s.fetcher_id || s.id || ""),
            probe_target: String(s.probe_target || s.fetcher_id || s.id || ""),
            default_enabled: !!s.default_enabled
          };
        }).filter(function (s) { return s.id; });
        setSources(mapped);
        setSourcesLoadError((srcResp && srcResp.ok) ? "" : t("today.sources.loadFail"));
      } else {
        setSourcesLoadError(t("today.sources.loadFail"));
      }
      if (cfgResp && cfgResp.config) {
        setSourceConfig(cfgResp.config);
        setTranslationConfig({
          enabled: cfgResp.config["translation.enabled"] === undefined ? true : cfgResp.config["translation.enabled"] !== false && cfgResp.config["translation.enabled"] !== "false",
          target_language: String(cfgResp.config["translation.target_language"] || "涓枃"),
          scope: String(cfgResp.config["translation.scope"] || "title_summary"),
        });
      }
    }).catch(function (err) {
      if (!cancelled) setSourcesLoadError((err && err.message) || t("today.sources.loadFail"));
    });
    return function () { cancelled = true; };
  }, []);

  var enabledSources = sources.filter(function (s) {
    var v = sourceConfig["source." + s.id + ".enabled"];
    if (v === undefined || v === null || v === "") return s.default_enabled;
    return v !== false && v !== "false";
  });

  var sourcesMap = {};
  sources.forEach(function (s) { sourcesMap[s.id] = s; });
  items.forEach(function (it) {
    var sid = it.source_id || "";
    if (sid && !sourcesMap[sid]) {
      sourcesMap[sid] = _legacySourceDefinition(sid);
    }
  });

  const load = useCallback(async function () {
    setLoading(true);
    try {
      const qs = {
        since: filters.window === "custom" ? datetimeLocalToISO(filters.since) : (filters.window ? hoursAgoISO(filters.window) : undefined),
        until: filters.window === "custom" ? datetimeLocalToISO(filters.until) : undefined,
        sort: filters.sort || "time",
        limit: 1000,
      };
      const query = Object.keys(qs)
        .filter(function (k) { return qs[k] !== undefined && qs[k] !== ""; })
        .map(function (k) { return encodeURIComponent(k) + "=" + encodeURIComponent(String(qs[k])); })
        .join("&");
      const resp = await api("GET", "/articles" + (query ? "?" + query : ""));
      if (resp && resp.ok) {
        setItems(resp.items || []);
        setTotal(resp.total || 0);
      } else {
        setItems([]); setTotal(0);
      }
    } finally {
      setLoading(false);
    }
  }, [filters]);

  useEffect(function () { load(); }, [load]);

  /* Cooldown timer */
  useEffect(function () {
    if (cooldown <= 0) return;
    var timer = setTimeout(function () { setCooldown(cooldown - 1); }, 1000);
    return function () { clearTimeout(timer); };
  }, [cooldown]);

  const runIngest = useCallback(async function (opts) {
    const single = !!(opts && opts.sourceId);
    if (ingesting || cooldown > 0) return;
    setIngesting(true);
    setDrawerOpen(true);
    try {
      var src = single ? sourcesMap[opts.sourceId] : null;
      var target = src && src.kind === "newsnow" ? src.id : (src ? (src.probe_target || src.fetcher_id || src.id) : opts.sourceId);
      const path = single ? ("/ingest/source/" + encodeURIComponent(target)) : "/ingest";
      const body = single ? null : { since_hours: 24 };
      const resp = await ingestAndWait(path, body, { kind: single ? "single" : "all" });
      const summary = (resp && resp.summary) || {};
      const totals = summary.totals || {};
      const bySource = summary.by_source || {};
      setLastIngest({
        mode: single ? "single" : "all",
        sourceId: single ? opts.sourceId : null,
        taskId: resp && resp.task_id,
        totals: totals,
        bySource: bySource,
        reason: summary.reason || null,
        ok: !!(resp && resp.ok),
      });
      const inserted = Number(totals.inserted || 0);
      const updated = Number(totals.updated || 0);
      const sourcesOk = Number(totals.sources_ok || 0);
      const sourcesTotal = Number(totals.sources_total || Object.keys(bySource).length || 0);
      const failed = Number(totals.failed_sources || 0);
      let level = "success", msg = "";
      if (summary.reason === "no_sources_enabled") {
        level = "warning";
        msg = t("today.ingest.done.none_enabled");
      } else if (!resp || !resp.ok) {
        level = "error";
        var why = "";
        if (resp) {
          why = _stringifyApiDetail(resp.detail);
          if (!why && typeof resp.error === "string") { why = resp.error; }
          if (!why && typeof resp.message === "string") { why = resp.message; }
        }
        msg = "ingest failed: " + (why || "unknown");
      } else if (inserted + updated > 0) {
        level = "success";
        msg = tfmt(t("today.ingest.done.green"), {
          inserted: inserted, updated: updated,
          sourcesOk: sourcesOk, sourcesTotal: sourcesTotal });
      } else {
        level = "warning";
        msg = tfmt(t("today.ingest.done.amber"), {
          sourcesOk: sourcesOk, failed: failed,
          empty: Math.max(0, sourcesTotal - sourcesOk - failed) });
      }
      window.oaToast({ level: level, message: msg });
      setCooldown(single ? 3 : 30);
      load();
    } finally { setIngesting(false); }
  }, [ingesting, cooldown, load, t, sourcesMap]);

  const onIngestAll = useCallback(function () {
    setMenuOpen(false);
    runIngest({});
  }, [runIngest]);

  const onIngestCurrent = useCallback(function () {
    setMenuOpen(false);
    if (!focusedSources.length) return;
    runIngest({ sourceId: focusedSources[0] });
  }, [runIngest, focusedSources]);

  const onDismissDrawer = useCallback(function () { setDrawerOpen(false); }, []);

  /* AI filter keyword matching + local scoring. */
  var aiKeywordTokens = [];
  var aiInterestTokens = aiFilter && aiFilter.interests ? _tokenizeInterestText(aiFilter.interests) : [];
  if (aiFilter && aiFilter.keywords) {
    String(aiFilter.keywords).split("\n").forEach(function (line) {
      line = line.trim();
      if (!line) return;
      if (line.startsWith("!")) return;
      line.replace(/^[+]/, "").split(/[锛?銆侊紱;\s]+/).forEach(function (word) {
        word = word.trim();
        if (word) aiKeywordTokens.push(word.toLowerCase());
      });
    });
  }
  var aiExcludeTokens = [];
  if (aiFilter && aiFilter.keywords) {
    String(aiFilter.keywords).split("\n").forEach(function (line) {
      line = line.trim();
      if (line.startsWith("!")) {
        line.substring(1).split(/[锛?銆侊紱;\s]+/).forEach(function (w) {
          w = w.trim();
          if (w) aiExcludeTokens.push(w.toLowerCase());
        });
      }
    });
  }

  var fetchedSourceIds = [];
  var fetchedSeen = {};
  items.forEach(function (it) {
    var sid = it.source_id || "unknown";
    if (!fetchedSeen[sid]) {
      fetchedSeen[sid] = true;
      fetchedSourceIds.push(sid);
    }
  });
  fetchedSourceIds.sort(function (a, b) {
    var ca = items.filter(function (it) { return (it.source_id || "unknown") === a; }).length;
    var cb = items.filter(function (it) { return (it.source_id || "unknown") === b; }).length;
    return cb - ca;
  });
  var sourceRank = {};
  sources.forEach(function (s, idx) { sourceRank[s.id] = idx; });

  var availableSourceIds = [];
  var availableSeen = {};
  enabledSources.forEach(function (s) {
    if (s && s.id && !availableSeen[s.id]) {
      availableSeen[s.id] = true;
      availableSourceIds.push(s.id);
    }
  });
  fetchedSourceIds.forEach(function (sid) {
    if (sid && !availableSeen[sid]) {
      availableSeen[sid] = true;
      availableSourceIds.push(sid);
    }
  });
  availableSourceIds.sort(function (a, b) {
    var ca = items.filter(function (it) { return (it.source_id || "unknown") === a; }).length;
    var cb = items.filter(function (it) { return (it.source_id || "unknown") === b; }).length;
    if (cb !== ca) return cb - ca;
    var ra = Object.prototype.hasOwnProperty.call(sourceRank, a) ? sourceRank[a] : 999;
    var rb = Object.prototype.hasOwnProperty.call(sourceRank, b) ? sourceRank[b] : 999;
    return ra - rb;
  });

  var categorySourceSet = {};
  if (sourceCategory !== "all") {
    availableSourceIds.forEach(function (sid) {
      var src = sourcesMap[sid] || _legacySourceDefinition(sid);
      if (_sourceCategoryKey(src) === sourceCategory) categorySourceSet[sid] = true;
    });
  }
  var activeSourceSet = {};
  focusedSources.forEach(function (sid) { activeSourceSet[sid] = true; });
  var sourceScopedItems = items.filter(function (it) {
    var sid = it.source_id || "unknown";
    if (sourceCategory !== "all" && !categorySourceSet[sid]) return false;
    if (focusedSources.length && !activeSourceSet[sid]) return false;
    return true;
  });

  /* Match items by keyword + AI filter. Sentiment is scored, not field-gated. */
  var hasMatchRule = !!keyword || aiKeywordTokens.length > 0 || aiInterestTokens.length > 0 ||
    aiExcludeTokens.length > 0 || !!(aiFilter && aiFilter.sentiment && aiFilter.sentiment !== "all");
  var aiOnlySentiment = !keyword && aiKeywordTokens.length === 0 && aiInterestTokens.length === 0 &&
    !!(aiFilter && aiFilter.sentiment && aiFilter.sentiment !== "all");
  var aiCtx = {
    keywordTokens: aiKeywordTokens,
    interestTokens: aiInterestTokens,
    excludeTokens: aiExcludeTokens,
    sentiment: aiFilter && aiFilter.sentiment ? aiFilter.sentiment : "all"
  };
  var matchedItems = [];
  var remainingItems = [];
  sourceScopedItems.forEach(function (it) {
    var text = ((it.title || "") + " " + (it.summary || "")).toLowerCase();
    var matched = true;
    var aiScore = _aiScoreArticle(it, aiCtx);
    it._aiScore = aiScore.score;
    it._aiSentiment = aiScore.sentiment;
    if (keyword) {
      matched = text.indexOf(keyword.toLowerCase()) >= 0;
    }
    if (matched && aiKeywordTokens.length) {
      matched = aiKeywordTokens.some(function (tok) { return text.indexOf(tok) >= 0; });
    }
    if (matched && aiInterestTokens.length) {
      matched = aiInterestTokens.some(function (tok) { return text.indexOf(tok) >= 0; });
    }
    if (matched && aiExcludeTokens.length) {
      matched = !aiScore.excluded;
    }
    if (matched && aiFilter && (aiKeywordTokens.length || aiInterestTokens.length || aiOnlySentiment)) {
      matched = aiOnlySentiment ? aiScore.score > 0 : aiScore.score >= 8;
    }
    if (hasMatchRule && matched) matchedItems.push(it);
    else remainingItems.push(it);
  });
  matchedItems.sort(function (a, b) {
    var sd = (b._aiScore || 0) - (a._aiScore || 0);
    if (sd !== 0) return sd;
    return String(articleTime(b)).localeCompare(String(articleTime(a)));
  });
  var displayItems = hasMatchRule ? matchedItems : sourceScopedItems.slice();
  var focusedSourceSet = {};
  focusedSources.forEach(function (sid, idx) { focusedSourceSet[sid] = idx + 1; });
  var sourceCategoryCounts = {};
  SOURCE_CATEGORY_KEYS.forEach(function (key) { sourceCategoryCounts[key] = 0; });
  availableSourceIds.forEach(function (sid) {
    var cat = _sourceCategoryKey(sourcesMap[sid] || _legacySourceDefinition(sid));
    sourceCategoryCounts[cat] = (sourceCategoryCounts[cat] || 0) + 1;
    sourceCategoryCounts.all += 1;
  });
  var visibleSourceIds = availableSourceIds.filter(function (sid) {
    if (sourceCategory === "all") return true;
    return _sourceCategoryKey(sourcesMap[sid] || _legacySourceDefinition(sid)) === sourceCategory;
  });

  var groupItemsBySource = function (list) {
    var grouped = {};
    list.forEach(function (it) {
      var sid = it.source_id || "unknown";
      if (!grouped[sid]) grouped[sid] = [];
      grouped[sid].push(it);
    });
    return grouped;
  };
  var sortedGroupIds = function (grouped) {
    return Object.keys(grouped).sort(function (a, b) {
      var fa = focusedSourceSet[a] || 0;
      var fb = focusedSourceSet[b] || 0;
      if (fa && fb) return fa - fb;
      if (fa) return -1;
      if (fb) return 1;
      var ra = Object.prototype.hasOwnProperty.call(sourceRank, a) ? sourceRank[a] : 999;
      var rb = Object.prototype.hasOwnProperty.call(sourceRank, b) ? sourceRank[b] : 999;
      var diff = ra - rb;
      if (diff !== 0) return diff;
      return grouped[b].length - grouped[a].length;
    });
  };

  var onApplyAiFilter = useCallback(function (f) {
    setAiFilter(f);
    setAiFilterOpen(false);
  }, []);

  var submitSearch = useCallback(function () {
    setKeyword(searchDraft.trim());
  }, [searchDraft]);

  var toggleFocusedSource = useCallback(function (sid) {
    setFocusedSources(function (prev) {
      if (prev.indexOf(sid) >= 0) return prev.filter(function (x) { return x !== sid; });
      return prev.concat([sid]);
    });
  }, []);

  var onExportConfirm = useCallback(async function (options) {
    try {
      var exportItems = options && options.scope === "loaded" ? items : displayItems;
      var exportFilters = Object.assign({}, filters, {
        source: options && options.scope === "loaded" ? "" : focusedSources.join(","),
        keyword: options && options.scope === "loaded" ? "" : keyword
      });
      var report = await exportHtmlReport(exportItems, sourcesMap, exportFilters, t, options);
      setExportOpen(false);
      setExportPreview(report);
      window.oaToast({level: "success", message: t("today.export.done")});
    } catch (err) {
      window.oaToast({level: "error", message: tfmt(t("today.export.fail"), {err: (err && err.message) || String(err)})});
    }
  }, [items, displayItems, sourcesMap, filters, focusedSources, keyword, t]);

  var onTranslateArticle = useCallback(async function (it) {
    if (!it || !it.id) return;
    var existing = translatedMap[it.id];
    if (existing) {
      setTranslatedMap(function (prev) {
        var copy = Object.assign({}, prev);
        copy[it.id] = Object.assign({}, existing, {showing: !existing.showing});
        return copy;
      });
      return;
    }
    setTranslatingIds(function (prev) { return Object.assign({}, prev, {[it.id]: true}); });
    try {
      var resp = await api("POST", "/translate", {
        target_language: translationConfig.target_language || "涓枃",
        items: [{id: it.id, title: it.title || "", summary: it.summary || ""}],
      });
      if (resp && resp.ok && Array.isArray(resp.items) && resp.items[0]) {
        var tr = resp.items[0];
        setTranslatedMap(function (prev) {
          return Object.assign({}, prev, {[it.id]: Object.assign({}, tr, {showing: true})});
        });
      } else {
        throw new Error((resp && (resp.error || resp.detail)) || "empty translation");
      }
    } catch (err) {
      window.oaToast({level: "error", message: tfmt(t("today.translate.fail"), {err: (err && err.message) || String(err)})});
    } finally {
      setTranslatingIds(function (prev) { return Object.assign({}, prev, {[it.id]: false}); });
    }
  }, [translatedMap, translationConfig, t]);

  var renderSourceGroups = function (list, keyPrefix) {
    var grouped = groupItemsBySource(list);
    var ids = sortedGroupIds(grouped);
    return ids.map(function (sid) {
      var groupItems = grouped[sid] || [];
      var srcDef = sourcesMap[sid] || {id: sid, name: sid, content_type: ""};
      var subLabels = [];
      groupItems.forEach(function (it) {
        var label = _itemSubSourceLabel(it, srcDef);
        if (label && subLabels.indexOf(label) < 0) subLabels.push(label);
      });
      var collapseKey = keyPrefix + ":" + sid;
      var collapsed = !!collapsedGroups[collapseKey];
      return (
        <div key={collapseKey} className="news-source-group">
          <div className="news-source-group__head"
               title={t("today.group.collapse")}
               onClick={function () {
                 setCollapsedGroups(function (prev) {
                   var copy = Object.assign({}, prev);
                   copy[collapseKey] = !copy[collapseKey];
                   return copy;
                 });
               }}>
            <span style={{fontSize: 10, color: "var(--text-muted)"}}>{collapsed ? "鈻? : "鈻?}</span>
            <span className={_sourcePillClass(srcDef)}>{_sourceDisplayName(srcDef) || sid}</span>
            {srcDef.content_type && <ContentTypePill type={srcDef.content_type}/>}
            {focusedSourceSet[sid] && <span className="api-pill" style={{background: "rgba(211,47,47,.10)", color: "var(--primary)"}}>{t("today.group.focused")}</span>}
            {subLabels.slice(0, 3).map(function (label) { return <span key={label} className="kw-tag">{label}</span>; })}
            <span className="oa-section-title__count">{groupItems.length}</span>
            <span className="news-source-group__meta">{groupItems[0] ? fmtArticleDate(groupItems[0]) : ""}</span>
          </div>
          {!collapsed && (
            <div className="news-grid">
              {groupItems.map(function (it) {
                return <NewsCardCompact key={it.id} item={it} source={srcDef} keyword={keyword}
                                        aiFilterActive={!!aiFilter}
                                        translation={translatedMap[it.id]}
                                        translating={!!translatingIds[it.id]}
                                        onTranslate={translationConfig.enabled === false ? null : onTranslateArticle}/>;
              })}
            </div>
          )}
        </div>
      );
    });
  };

  var renderTimeline = function (list) {
    var grouped = {};
    list.forEach(function (it) {
      var key = fmtArticleTimelineBucket(it);
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(it);
    });
    var keys = Object.keys(grouped).sort(function (a, b) { return b.localeCompare(a); });
    return (
      <div className="timeline">
        {keys.map(function (key) {
          var groupItems = grouped[key] || [];
          groupItems.sort(function (a, b) {
            return String(articleTime(b)).localeCompare(String(articleTime(a)));
          });
          return (
            <div key={key} className="timeline-slot">
              <div className="timeline-slot__time">
                {key}
                <span className="timeline-slot__meta">{groupItems.length} 鏉?/span>
              </div>
              <div className="timeline-slot__items">
                {groupItems.map(function (it) {
                  var srcDef = sourcesMap[it.source_id] || {id: it.source_id, name: it.source_id, content_type: ""};
                  return (
                    <div key={it.id} style={{position: "relative"}}>
                      <NewsCardCompact item={it} source={srcDef} keyword={keyword}
                                       aiFilterActive={!!aiFilter}
                                       translation={translatedMap[it.id]}
                                       translating={!!translatingIds[it.id]}
                                       onTranslate={translationConfig.enabled === false ? null : onTranslateArticle}/>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  return (
    <div className="stack-layout">
      {/* Filter bar */}
      <div className="filter-bar filter-bar--news">
        <div className="filter-source-panel">
          <div className="filter-source-panel__head">
            <span className="filter-bar__label">{t("today.filters.source")}</span>
            <div className="filter-source-cats">
              {SOURCE_CATEGORY_KEYS.map(function (cat) {
                return (
                  <button key={cat} type="button"
                          className={"filter-source-cat " + (sourceCategory === cat ? "filter-source-cat--active" : "")}
                          onClick={function () { setSourceCategory(cat); setFocusedSources([]); }}>
                    {t("today.sources.cat." + cat)}
                    <span className="filter-source-cat__count">{sourceCategoryCounts[cat] || 0}</span>
                  </button>
                );
              })}
            </div>
          </div>
          <div className="source-chip-grid source-chip-grid--rail">
            <SourceChip
              source={{display_zh: t("today.filters.source.all"), content_type: "all"}}
              enabled={true}
              active={focusedSources.length === 0}
              showType={false}
              onClick={function () { setFocusedSources([]); }}
            />
            {visibleSourceIds.map(function (sid) {
              var s = sourcesMap[sid] || _legacySourceDefinition(sid);
              var known = sources.some(function (x) { return x.id === sid; });
              var enabled = known ? enabledSources.some(function (x) { return x.id === sid; }) : true;
              return (
                <SourceChip
                  key={sid}
                  source={s}
                  enabled={enabled}
                  active={focusedSources.indexOf(sid) >= 0}
                  title={enabled ? "" : t("today.sources.disabledHint")}
                  onClick={function () {
                    if (!enabled) window.oaToast({level: "warning", message: t("today.sources.disabledHint")});
                    toggleFocusedSource(sid);
                  }}
                />
              );
            })}
          </div>
        </div>
        <div className="filter-bar__row">
          <div className="filter-bar__item">
            <span className="filter-bar__label">{t("today.filters.window")}</span>
            <div className="time-filter-wrap">
              <div className="time-filter-compact">
                {[{h:6,k:"6h"},{h:24,k:"24h"},{h:72,k:"72h"}].map(function (w) {
                  const active = filters.window === w.h;
                  return <button key={w.h} type="button"
                                 className={"seg-btn " + (active ? "active" : "")}
                                 onClick={function () { setCustomTimeOpen(false); setFilters(Object.assign({}, filters, {window: w.h})); }}>
                    {t("today.filters.window." + w.k)}
                  </button>;
                })}
                <button type="button"
                        className={"seg-btn " + (filters.window === "custom" ? "active" : "")}
                        onClick={function () { setFilters(Object.assign({}, filters, {window: "custom"})); setCustomTimeOpen(!customTimeOpen); }}>
                  {t("today.filters.window.custom")}
                </button>
              </div>
              {filters.window === "custom" && customTimeOpen && (
                <div className="custom-time-range" onMouseLeave={function () { setCustomTimeOpen(false); }}>
                  <label className="custom-time-row">
                    <span>{t("today.filters.window.from")}</span>
                    <input className="input" type="datetime-local"
                           value={filters.since || ""}
                           onChange={function (e) { setFilters(Object.assign({}, filters, {since: e.target.value})); }}/>
                  </label>
                  <label className="custom-time-row">
                    <span>{t("today.filters.window.to")}</span>
                    <input className="input" type="datetime-local"
                           value={filters.until || ""}
                           onChange={function (e) { setFilters(Object.assign({}, filters, {until: e.target.value})); }}/>
                  </label>
                </div>
              )}
            </div>
          </div>
          <span className="filter-bar__sep"/>
          <div className="search-box">
            <input type="text"
                   placeholder={t("today.filters.keyword.placeholder")}
                   value={searchDraft}
                   onChange={function (e) { setSearchDraft(e.target.value); }}
                   onKeyDown={function (e) { if (e.key === "Enter") submitSearch(); }}/>
            <button className="btn btn-sm btn-primary btn-icon-round" type="button"
                    title={t("today.filters.search.submit")}
                    onClick={submitSearch}>
              <Ico name="search"/>
            </button>
          </div>
          <button className={"btn btn-sm btn-ai-glow" + (aiFilter ? " btn-primary" : "")} type="button"
                  onClick={function () { aiFilter ? setAiFilter(null) : setAiFilterOpen(true); }}
                  title={aiFilter ? t("today.filters.ai.clear") : ""}>
            <Ico name={aiFilter ? "close" : "magic"}/> {aiFilter ? t("today.filters.ai.clear") : t("today.filters.ai")}
          </button>
          <div className="filter-bar__item">
            <span className="filter-bar__label">{t("today.filters.sortLabel")}</span>
            <div className="seg-group">
              {[{k:"time_desc", icon:"鈫?},{k:"time_asc", icon:"鈫?}].map(function (s) {
                const active = filters.sort === s.k;
                return <button key={s.k} type="button"
                               className={"seg-btn " + (active ? "active" : "")}
                               onClick={function () { setFilters(Object.assign({}, filters, {sort: s.k})); }}>
                  <span className="sort-pill"><span>{s.icon}</span>{t("today.filters.sort." + s.k)}</span>
                </button>;
              })}
            </div>
          </div>
          <div className="filter-bar__item">
            <span className="filter-bar__label">{t("today.filters.view")}</span>
            <div className="seg-group">
              {["grouped", "timeline"].map(function (mode) {
                return <button key={mode} type="button"
                               className={"seg-btn " + (viewMode === mode ? "active" : "")}
                               onClick={function () { setViewMode(mode); }}>
                  {t("today.filters.view." + mode)}
                </button>;
              })}
            </div>
          </div>
          <span style={{flex: 1}}/>
          <button className="btn btn-sm" type="button"
                  onClick={function () { setFilters({window: 24, sort: "time_desc", since: "", until: ""}); setFocusedSources([]); setSourceCategory("all"); setSearchDraft(""); setKeyword(""); setAiFilter(null); }}>
            <Ico name="refresh"/> {t("today.filters.reset")}
          </button>
          <button className="btn btn-sm" type="button" onClick={function () { setExportOpen(true); }} title={t("today.export.title")}>
            <Ico name="download"/> {t("today.export")}
          </button>
          <span className={"ingest-split " + (menuOpen ? "is-open " : "") + (ingesting ? "is-busy" : "")}>
            <button className="btn btn-primary" type="button"
                    disabled={ingesting || cooldown > 0}
                    aria-busy={ingesting ? "true" : "false"}
                    onClick={onIngestAll}>
              {ingesting
                ? <span className="fp-spin"><Ico name="refresh"/></span>
                : <Ico name="refresh"/>}
              {" "}
              {ingesting ? t("today.ingest.busy") : cooldown > 0 ? tfmt(t("today.ingest.cooldown"), {s: cooldown}) : t("today.list.ingest.all")}
            </button>
            <button className="btn btn-primary btn--caret" type="button"
                    disabled={ingesting || cooldown > 0}
                    title={t("today.list.ingest.more")}
                    onClick={function () { setMenuOpen(!menuOpen); }}>
              <Ico name="chevronDown"/>
            </button>
            {menuOpen && (
              <div className="ingest-split__menu"
                   onMouseLeave={function () { setMenuOpen(false); }}>
                {enabledSources.map(function (s) {
                  return (
                    <button key={s.id} type="button"
                            disabled={ingesting || cooldown > 0}
                            onClick={function () { setMenuOpen(false); runIngest({sourceId: s.id}); }}>
                      {s.name}
                    </button>
                  );
                })}
              </div>
            )}
          </span>
        </div>
      </div>

      {/* AI filter active indicator */}
      {aiFilter && (
        <div style={{display: "flex", alignItems: "center", gap: 8, padding: "4px 0"}}>
          <span className="api-pill" style={{background: "rgba(211,47,47,.10)", color: "var(--primary)"}}>
            <Ico name="magic"/> {t("today.filters.ai.active")}
          </span>
          <button className="btn btn-sm" onClick={function () { setAiFilter(null); }}>
            {t("today.filters.ai.clear")}
          </button>
        </div>
      )}

      {ingesting && <div className="fp-progress" aria-hidden="true"/>}
      {sourcesLoadError && (
        <div className="oa-config-banner" role="alert" style={{marginTop: 0}}>
          <span className="oa-icon oa-config-banner__icon"><Ico name="warn"/></span>
          <span>{sourcesLoadError}</span>
        </div>
      )}

      {drawerOpen && lastIngest && (
        <IngestDrawer summary={lastIngest} sources={sources.map(function (s) { return {id: s.id, name: s.name}; })}
                      onDismiss={onDismissDrawer} />
      )}

      {/* News list */}
      <div className="card grow">
        <div className="oa-section-title">
          {t("today.list.title")}
          <span className="oa-section-title__count">{displayItems.length}{total > displayItems.length ? " / " + total : ""}</span>
          <span className="oa-section-title__actions">
            <button className="btn btn-sm" type="button" onClick={load}>
              <Ico name="refresh"/> {loading ? t("today.list.loading") : t("today.list.refresh")}
            </button>
          </span>
        </div>
        <div className="card-body">
          {loading && items.length === 0 && <div className="empty">{t("today.list.loading")}</div>}
          {!loading && displayItems.length === 0 && <div className="empty">{t("today.list.empty")}</div>}
          {viewMode === "grouped" ? (
            hasMatchRule ? (
              <div>
                <div className="oa-section-title" style={{marginTop: 0}}>
                  <Ico name="filter"/> {t("today.group.matches")}
                  <span className="oa-section-title__count">{matchedItems.length}</span>
                </div>
                {renderSourceGroups(displayItems, "matched")}
              </div>
            ) : renderSourceGroups(displayItems, "all")
          ) : (
            renderTimeline(displayItems)
          )}
        </div>
      </div>

      {/* AI Filter Dialog */}
      {aiFilterOpen && (
        <AIFilterDialog
          initialInterests={aiFilter ? aiFilter.interests : ""}
          initialKeywords={aiFilter ? aiFilter.keywords : ""}
          initialSentiment={aiFilter ? aiFilter.sentiment : "all"}
          onApply={onApplyAiFilter}
          onClose={function () { setAiFilterOpen(false); }}
        />
      )}
      {exportOpen && (
        <ExportDialog
          currentCount={displayItems.length}
          loadedCount={items.length}
          onExport={onExportConfirm}
          onClose={function () { setExportOpen(false); }}
        />
      )}
      {exportPreview && (
        <ExportPreviewDialog
          report={exportPreview}
          onClose={function () { setExportPreview(null); }}
        />
      )}
    </div>
  );
}

/* 鈹€鈹€ Digests Tab 鈥?daily briefs + preview + resend 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
function DigestsTab() {
  const t = useT();
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null);
  const [previewHtml, setPreviewHtml] = useState("");
  const [running, setRunning] = useState("");
  const [channels, setChannels] = useState([]);
  const [activeSession, setActiveSession] = useState("morning");
  const [sources, setSources] = useState([]);
  const [customOpen, setCustomOpen] = useState(true);
  const [reportConfigs, setReportConfigs] = useState({
    morning: {id: "morning", kind: "builtin", label: "鏃╂姤", session: "morning", time: "08:00", repeat: "daily", since_hours: 12, top_k: 20, source_ids: [], channel: "", chat_id: "", locked: false, preIngest: true},
    noon: {id: "noon", kind: "builtin", label: "鍗堟姤", session: "noon", time: "12:30", repeat: "daily", since_hours: 6, top_k: 15, source_ids: [], channel: "", chat_id: "", locked: false, preIngest: true},
    evening: {id: "evening", kind: "builtin", label: "鏅氭姤", session: "evening", time: "19:00", repeat: "daily", since_hours: 12, top_k: 20, source_ids: [], channel: "", chat_id: "", locked: false, preIngest: true},
  });
  const [customReports, setCustomReports] = useState([]);
  const [customDraft, setCustomDraft] = useState({title: "鑷畾涔夎储缁忔姤琛?, time: "09:30", repeat: "daily", since_hours: 24, top_k: 20, source_ids: [], channel: "", chat_id: "", preIngest: true});

  const load = useCallback(async function () {
    setLoading(true);
    try {
      const resp = await api("GET", "/digests?limit=50");
      if (resp && resp.ok) setItems(resp.items || []);
    } finally { setLoading(false); }
  }, []);
  const loadChannels = useCallback(async function () {
    const resp = await api("GET", "/scheduler/channels");
    let list = (resp && Array.isArray(resp.channels)) ? resp.channels : [];
    if (!list.length) {
      const fb = await api("GET", "/available-channels");
      const names = (fb && fb.channels) || [];
      list = names.map(function (n) { return { channel_id: String(n), chat_id: "" }; });
    }
    setChannels(normalizeChannels(list));
  }, []);
  const loadSources = useCallback(async function () {
    const resp = await api("GET", "/sources");
    const rawSources = (resp && resp.ok && Array.isArray(resp.items) && resp.items.length) ? resp.items : SOURCE_FALLBACK;
    const mapped = rawSources.map(function (s) {
      return {
        id: String(s.id || ""),
        name: String(s.display_zh || s.display_en || s.name || s.id || ""),
        kind: String(s.kind || ""),
        content_type: String(s.content_type || "news"),
      };
    }).filter(function (s) { return s.id; });
    setSources(mapped);
  }, []);
  const loadPlans = useCallback(async function () {
    const resp = await api("GET", "/report-plans");
    const plans = (resp && resp.plans) || {};
    const nextBuiltins = {};
    ["morning", "noon", "evening"].forEach(function (id) {
      if (plans[id]) nextBuiltins[id] = plans[id];
    });
    if (Object.keys(nextBuiltins).length) {
      setReportConfigs(function (prev) {
        return Object.assign({}, prev, nextBuiltins);
      });
    }
    setCustomReports(Object.keys(plans).filter(function (id) {

                     onChange={function (e) { setCustomDraft(Object.assign({}, customDraft, {top_k: e.target.value})); }}/>
            </label>
            {renderSourcePicker(customDraft, function (patch) { setCustomDraft(Object.assign({}, customDraft, patch)); })}
            {renderChannelSelect(customDraft, function (patch) { setCustomDraft(Object.assign({}, customDraft, patch)); })}
            <button
              className="btn btn-create"
              type="button"
              style={{gridColumn: "1 / -1", marginTop: 4}}
              disabled={!String(customDraft.title || "").trim()}
              title={!String(customDraft.title || "").trim() ? "璇峰厛濉啓鎶ヨ〃鍚嶇О" : "娣诲姞涓€涓嚜瀹氫箟鎶ヨ〃璁″垝"}
              onClick={addCustomReport}>
              <Ico name="plusIcon"/> 鍒涘缓鑷畾涔夋姤琛ㄨ鍒?
            </button>
          </div>
          <div className={"coll" + (customOpen ? " coll--open" : "")} style={{marginTop: 10}}>
            <div className="coll-head" onClick={function () { setCustomOpen(!customOpen); }}>
              <span className="coll-head__arrow">鈻?/span>
              <span className="coll-head__title">鑷畾涔夋姤琛ㄨ鍒?/span>
              <span className="coll-head__badge">{customReports.length}</span>
            </div>
            {customOpen && (
              <div className="coll-body">
                {!customReports.length ? <div className="empty" style={{padding: 12}}>鏆傛棤鑷畾涔夋姤琛ㄨ鍒?/div> : (
                  <div style={{display: "grid", gridTemplateColumns: "1fr", gap: 10}}>
                    {customReports.map(function (r) { return renderReportCard(r.session, r, true); })}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        <div className="card">
          <div className="oa-section-title">鍘嗗彶绠€鎶?<span className="oa-section-title__count">{items.length}</span></div>
          {loading && items.length === 0 && <div className="empty">{t("today.list.loading")}</div>}
          {!loading && items.length === 0 && <div className="empty">{t("digests.empty")}</div>}
          <div className="digest-history-list">
            {items.map(function (d) {
              var meta = sessionMeta[d.session] || sessionMeta.morning;
              return (
                <div key={d.id} className="card" style={{margin: 0, padding: 10, cursor: "pointer"}}
                     onClick={function () { selectDigest(d); }}>
                  <div style={{display: "flex", alignItems: "center", gap: 6, fontSize: 12}}>
                    <span className="api-pill"><Ico name={meta.icon}/> {meta.label}</span>
                    <span style={{marginLeft: "auto", color: "var(--text-muted)"}}>{fmtDate(d.generated_at)}</span>
                  </div>
                  <div style={{display: "flex", alignItems: "center", gap: 8, marginTop: 8}}>
                    <div style={{flex: 1, minWidth: 0}}>
                      <div style={{fontSize: 13, fontWeight: 700, color: "var(--text)"}}>{d.title || meta.label}</div>
                      <div style={{fontSize: 12, color: "var(--text-muted)"}}>{(d.stats && (d.stats.total_selected || 0)) || 0} {t("digests.items")}</div>
                    </div>
                    <button className="btn btn-sm" onClick={function (e) { e.stopPropagation(); selectDigest(d); }}><Ico name="eye"/></button>
                    <button className="btn btn-sm btn-danger" onClick={function (e) { e.stopPropagation(); onDeleteDigest(d); }}><Ico name="trash"/></button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="digest-preview-pane">
        <div className="card grow">
          <div className="oa-section-title">
            HTML 鎶ヨ〃鍗虫椂棰勮
            {selected && <span className="oa-section-title__count">{sessionMeta[selected.session] ? sessionMeta[selected.session].label : selected.session}</span>}
            <span className="oa-section-title__actions">
              <button className="btn btn-sm" disabled={!selected} onClick={downloadPreview}><Ico name="download"/> 涓嬭浇 HTML</button>
              <button className="btn btn-sm" disabled={!selected} onClick={function () { selected && copyText(selected.markdown_blob || selected.title || ""); window.oaToast({level: "success", message: t("today.list.copied")}); }}><Ico name="copy"/> 澶嶅埗鎽樿</button>
              <button className="btn btn-sm btn-primary" disabled={!selected} onClick={function () { selected && onResend(selected); }}><Ico name="send"/> 鍐嶆帹閫?/button>
            </span>
          </div>
          {selected ? (
            <iframe className="digest-preview-frame" srcDoc={previewHtml || selected.html_blob || ""} title="digest-preview"/>
          ) : (
            <div className="empty" style={{minHeight: 360, display: "flex", alignItems: "center", justifyContent: "center"}}>
              璇烽€夋嫨鍘嗗彶绠€鎶ワ紝鎴栫偣鍑诲乏渚р€滅敓鎴愬苟棰勮鈥濄€?
            </div>
          )}
        </div>
      </div>

    </div>
  );
}

/* 鈹€鈹€ Radar Tab 鈥?rule editor + AI suggest + history 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
const RADAR_TEMPLATE = (
  "+缇庤仈鍌╘n" +
  "+闄嶆伅\n" +
  "!浼犻椈\n" +
  "\n" +
  "+鐗规湕鏅甛n" +
  "+鍏崇◣\n" +
  "\n" +
  "[GLOBAL_FILTER]\n" +
  "!灏忛亾娑堟伅\n" +
  "!璁哄潧\n"
);

function RadarTab() {
  const t = useT();
  const [rulesText, setRulesText] = useState("");
  const [hits, setHits] = useState([]);
  const [meta, setMeta] = useState({total: 0, since_hours: 24});
  const [loading, setLoading] = useState(false);
  const [sinceHours, setSinceHours] = useState(24);
  /* AI-suggest modal state */
  const [aiOpen, setAiOpen] = useState(false);
  const [aiDesc, setAiDesc] = useState("");
  const [aiBusy, setAiBusy] = useState(false);
  /* Save-rule naming modal state */
  const [saveOpen, setSaveOpen] = useState(false);
  const [saveName, setSaveName] = useState("");
  /* Rules library (saved presets) */
  const [library, setLibrary] = useState([]);
  const [libOpen, setLibOpen] = useState(false);
  const [channels, setChannels] = useState([]);
  const [sources, setSources] = useState([]);
  const [selectedSourceIds, setSelectedSourceIds] = useState([]);
  const [forceRefresh, setForceRefresh] = useState(true);
  const [radarRepeat, setRadarRepeat] = useState("every15");
  const [radarTime, setRadarTime] = useState("09:00");
  const [radarLocked, setRadarLocked] = useState(false);
  const [radarTargetKey, setRadarTargetKey] = useState("");
  const [pushing, setPushing] = useState(false);
  const [savingRadarPlan, setSavingRadarPlan] = useState(false);
  const [radarResult, setRadarResult] = useState(null);

  /* Preload stored rules + library */
  const loadLibrary = useCallback(async function () {
    const resp = await api("GET", "/radar/library");
    setLibrary((resp && resp.items) || []);
  }, []);
  useEffect(function () {
    (async function () {
      const resp = await api("GET", "/config");
      if (resp && resp.ok) {
        setRulesText(String((resp.config || {})["radar_rules"] || ""));
      }
    })();
    loadLibrary();
  }, [loadLibrary]);
  const loadRadarPlan = useCallback(async function () {
    const resp = await api("GET", "/radar-plan");
    const plan = resp && resp.plan;
    if (!plan) return;
    if (plan.rules_text) setRulesText(String(plan.rules_text || ""));
    setSelectedSourceIds(Array.isArray(plan.source_ids) ? plan.source_ids : []);
    setForceRefresh(!!plan.force_refresh);
    setRadarRepeat(String(plan.repeat || "every15"));
    setRadarTime(String(plan.time || "09:00").slice(0, 5));
    setRadarLocked(!!plan.locked);
    setRadarTargetKey(plan.channel ? (String(plan.channel) + "::" + String(plan.chat_id || "")) : "");
  }, []);
  useEffect(function () { loadRadarPlan().catch(function () {}); }, [loadRadarPlan]);
  useEffect(function () {
    (async function () {
      const resp = await api("GET", "/scheduler/channels");
      let list = (resp && Array.isArray(resp.channels)) ? resp.channels : [];
      if (!list.length) {
        const fb = await api("GET", "/available-channels");
        const names = (fb && fb.channels) || [];
        list = names.map(function (n) { return { channel_id: String(n), chat_id: "" }; });
      }
      list = normalizeChannels(list);
      setChannels(list);
      setRadarTargetKey(function (prev) {
        if (prev) return prev;
        var first = list[0];
        return first ? channelKey(first) : "";
      });
    })();
  }, []);
  useEffect(function () {
    (async function () {
      const resp = await api("GET", "/sources");
      const rawSources = (resp && resp.ok && Array.isArray(resp.items) && resp.items.length) ? resp.items : SOURCE_FALLBACK;
      setSources(rawSources.map(function (s) {
        return {
          id: String(s.id || ""),
          name: String(s.display_zh || s.display_en || s.name || s.id || ""),
          content_type: String(s.content_type || "news"),
        };
      }).filter(function (s) { return s.id; }));
    })();
  }, []);

  const selectedTarget = (function () {
    return channels.find(function (c) {
      return channelKey(c) === radarTargetKey;
    }) || null;
  })();
  const radarSourceMap = {};
  sources.forEach(function (s) { radarSourceMap[s.id] = s; });
  const hitMatchScore = function (h) {
    const terms = Array.isArray(h.matched_terms) ? h.matched_terms.length : 0;
    const ai = Number(h.ai_score || 0);
    return terms * 10 + ai;
  };
  const contentTypeLabel = function (ct) {
    const key = "settings.sources.ct." + (ct || "news");
    const val = t(key);
    return val === key ? (ct || "news") : val;
  };
  const radarGroups = (function () {
    const buckets = {};
    hits.slice().sort(function (a, b) { return hitMatchScore(b) - hitMatchScore(a); }).forEach(function (h) {
      const src = radarSourceMap[h.source_id] || {};
      const ct = h.content_type || src.content_type || "news";
      if (!buckets[ct]) buckets[ct] = [];
      buckets[ct].push(h);
    });
    return Object.keys(buckets).sort(function (a, b) { return buckets[b].length - buckets[a].length; }).map(function (ct) {
      return {type: ct, label: contentTypeLabel(ct), items: buckets[ct]};
    });
  })();
  const topRadarHits = hits.slice().sort(function (a, b) { return hitMatchScore(b) - hitMatchScore(a); }).slice(0, 3);

  const onEvaluate = useCallback(async function () {
    setLoading(true);
    try {
      const resp = await api("POST", "/radar/evaluate", {
        rules_text: rulesText,
        since_hours: sinceHours,
        limit: 100,
        source_ids: selectedSourceIds,
        force_refresh: forceRefresh,
      });
      if (resp && resp.ok) {
        setHits(resp.items || resp.hits || []);
        setMeta({total: (resp.items || resp.hits || []).length, since_hours: sinceHours});
      } else {
        setHits([]);
        window.oaToast({level: "error", message: "evaluate failed: " + (resp && resp.detail || "")});
      }
    } finally { setLoading(false); }
  }, [rulesText, sinceHours, selectedSourceIds, forceRefresh]);

  const onFillTemplate = useCallback(function () {
    setRulesText(function (prev) {
      if (prev && prev.trim()) {
        return prev.replace(/\s*$/, "\n") + "\n" + RADAR_TEMPLATE;
      }
      return RADAR_TEMPLATE;
    });
    window.oaToast({level: "success", message: t("radar.template.filled")});
  }, [t]);

  const onOpenAi = useCallback(function () {
    setAiDesc("");
    setAiOpen(true);
  }, []);

  const onAiRun = useCallback(async function () {
    if (!aiDesc.trim()) return;
    setAiBusy(true);
    try {
      const resp = await api("POST", "/radar/ai-suggest", {
        description: aiDesc, existing: rulesText, lang: "zh",
      });
      if (resp && resp.ok && resp.rules_text) {
        setRulesText(resp.rules_text);
        setAiOpen(false);
        const src = (resp.source === "brain") ? t("radar.ai.source.brain") : t("radar.ai.source.fallback");
        window.oaToast({level: "success", message: tfmt(t("radar.ai.ok"), {source: src})});
      } else {
        window.oaToast({level: "error",
          message: tfmt(t("radar.ai.fail"), {err: (resp && (resp.message || resp.detail || resp.error)) || "unknown"})});
      }
    } finally { setAiBusy(false); }
  }, [aiDesc, rulesText, t]);

  const onOpenSave = useCallback(function () {
    if (!rulesText.trim()) {
      window.oaToast({level: "warning", message: t("radar.save.empty")});
      return;
    }
    setSaveName("");
    setSaveOpen(true);
  }, [rulesText, t]);

  const onSaveConfirm = useCallback(async function () {
    const name = saveName.trim();
    if (!name) return;
    /* 1) persist as the "current" rule so radar runs pick it up */
    await api("PUT", "/config", {updates: {radar_rules: rulesText}});
    /* 2) also push into the library for future recall */
    const resp = await api("POST", "/radar/library", {name: name, rules_text: rulesText});
    if (resp && resp.ok) {
      window.oaToast({level: "success", message: tfmt(t("radar.save.ok"), {name: name})});
      setSaveOpen(false);
      loadLibrary();
    } else {
      window.oaToast({level: "error",
        message: tfmt(t("radar.save.fail"), {err: (resp && (resp.detail || resp.error)) || "unknown"})});
    }
  }, [saveName, rulesText, t, loadLibrary]);

  const onLoadPreset = useCallback(function (entry) {
    setRulesText(entry.rules_text || "");
    setLibOpen(false);
    window.oaToast({level: "success", message: tfmt(t("radar.history.loaded"), {name: entry.name})});
  }, [t]);

  const onDeletePreset = useCallback(async function (entry, e) {
    if (e) e.stopPropagation();
    const ok = await window.oaConfirm({
      title: t("radar.history.delete"),
      message: entry.name,
      danger: true,
      okText: t("radar.history.delete"),
    });
    if (!ok) return;
    await api("DELETE", "/radar/library/" + encodeURIComponent(entry.name));
    loadLibrary();
  }, [t, loadLibrary]);

  const onRunHotRadar = useCallback(async function () {
    if (!rulesText.trim()) {
      window.oaToast({level: "warning", message: t("radar.save.empty")});
      return;
    }
    if (!selectedTarget) {
      window.oaToast({level: "warning", message: "璇烽€夋嫨閫氱煡閫氶亾"});
      return;
    }
    const channel = selectedTarget.channel_id || "";
    const chat_id = selectedTarget.chat_id || "";
    setPushing(true);
    setRadarResult(null);
    try {
      if (!hits.length) await onEvaluate();
      const resp = await api("POST", "/hot_radar/run", {
        rules_text: rulesText,
        targets: [{channel: channel, chat_id: chat_id}],
        since_hours: sinceHours,
        limit: 100,
        source_ids: selectedSourceIds,
        force_refresh: forceRefresh,
        cooldown_s: 600,
        title: "璐㈢粡鑴夊姩闆疯揪棰勮"
      });
      setRadarResult(resp || {});
      window.oaToast({level: resp && resp.ok ? "success" : "error", message: resp && resp.ok ? "闆疯揪棰勮宸叉帹閫? : "棰勮澶辫触"});
    } finally { setPushing(false); }
  }, [rulesText, selectedTarget, sinceHours, selectedSourceIds, forceRefresh, t, hits.length, onEvaluate]);

  const onSaveRadarPlan = useCallback(async function () {
    if (!rulesText.trim()) {
      window.oaToast({level: "warning", message: t("radar.save.empty")});
      return;
    }
    if (!selectedTarget) {
      window.oaToast({level: "warning", message: "璇烽€夋嫨閫氱煡閫氶亾"});
      return;
    }
    setSavingRadarPlan(true);
    try {
      const resp = await api("PUT", "/radar-plan", {
        rules_text: rulesText,
        since_hours: sinceHours,
        limit: 100,
        source_ids: selectedSourceIds,
        force_refresh: forceRefresh,
        repeat: radarRepeat,
        time: radarTime,
        channel: selectedTarget.channel_id || "",
        chat_id: selectedTarget.chat_id || "",
        chat_name: selectedTarget.chat_name || selectedTarget.display_name || selectedTarget.alias || "",
      });
      if (resp && resp.ok) {
        setRadarLocked(true);
        window.oaToast({level: "success", message: "闆疯揪瀹氭椂鎵弿宸蹭繚瀛樺苟鐢熸晥"});
      } else {
        window.oaToast({level: "error", message: "淇濆瓨澶辫触锛? + ((resp && (resp.detail || resp.error)) || "unknown")});
      }
    } finally { setSavingRadarPlan(false); }
  }, [rulesText, selectedTarget, sinceHours, selectedSourceIds, forceRefresh, radarRepeat, radarTime, t]);

  const onUnlockRadarPlan = useCallback(async function () {
    const resp = await api("POST", "/radar-plan/unlock", {});
    if (resp && resp.ok) setRadarLocked(false);
  }, []);

  return (
    <div className="radar-workbench">
      <div className="radar-left">
      <div className="card">
        <div className="oa-section-title">闆疯揪棰勮宸ヤ綔鍙?/div>
        <div className="oa-hint radar-intro">濉啓瑙勫垯銆侀€夋嫨绐楀彛鍜岄€氶亾鍚庡嵆鍙瘯杩愯鎴栨帹閫侊紱鍙充晶棰勮鐙珛婊氬姩銆?/div>
      </div>
      <div className={"card card--compact" + (radarLocked ? " radar-card--locked" : "")}>
        <div className="oa-section-title">
          <span className="radar-title-text">{t("radar.editor.title")}</span>
          {radarLocked ? <span className="radar-locked-badge">宸查攣瀹氱敓鏁?/span> : null}
          <span className="oa-section-title__actions">
            <button className="btn btn-sm" type="button" onClick={onFillTemplate} title={t("radar.template.tooltip")}>
              <Ico name="book"/> {t("radar.template")}
            </button>
            <button className="btn btn-sm" type="button" onClick={onOpenAi} title={t("radar.ai.tooltip")}>
              <Ico name="sparkles"/> {t("radar.ai")}
            </button>
            <div style={{position: "relative"}}>
              <button className="btn btn-sm" type="button"
                      onClick={function () { setLibOpen(function (v) { return !v; }); }}
                      title={t("radar.history.tooltip")}>
                <Ico name="folder"/> {t("radar.history")} 路 {library.length}
              </button>
              {libOpen && (
                <div style={{position: "absolute", top: "calc(100% + 4px)", right: 0, minWidth: 260, maxHeight: 320, overflow: "auto",
                             background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 6,
                             boxShadow: "0 6px 16px rgba(0,0,0,.15)", zIndex: 40, padding: 6}}>
                  {library.length === 0 ? (
                    <div className="empty" style={{padding: "12px 8px"}}>{t("radar.history.empty")}</div>
                  ) : (
                    library.map(function (p) {
                      return (
                        <div key={p.name}
                             style={{display: "flex", alignItems: "center", gap: 6, padding: "6px 8px",
                                     borderRadius: 4, cursor: "pointer"}}
                             onMouseEnter={function (e) { e.currentTarget.style.background = "var(--bg-hover)"; }}
                             onMouseLeave={function (e) { e.currentTarget.style.background = "transparent"; }}
                             onClick={function () { onLoadPreset(p); }}>
                          <span style={{flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                                        fontSize: 13, color: "var(--text)"}}>{p.name}</span>
                          <span style={{fontSize: 11, color: "var(--text-muted)"}}>
                            {fmtDate(p.saved_at).slice(5, 16)}
                          </span>
                          <button className="btn btn-sm btn-danger"
                                  style={{padding: "2px 6px", fontSize: 11}}
                                  onClick={function (e) { onDeletePreset(p, e); }}>
                            <Ico name="trash"/>
                          </button>
                        </div>
                      );
                    })
                  )}
                </div>
              )}
            </div>
          </span>
        </div>
        <div className="oa-hint radar-rule-help" dangerouslySetInnerHTML={{__html: t("radar.editor.hintHtml")}}/>
        <textarea
          className="input"
          style={{resize: "vertical", fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace", fontSize: 12, lineHeight: 1.6}}
          value={rulesText}
          disabled={radarLocked}
          onChange={function (e) { setRulesText(e.target.value); }}
          placeholder={RADAR_TEMPLATE}/>
        <div style={{display: "flex", gap: 8, marginTop: 10, alignItems: "center"}}>
          <span style={{fontSize: 11, color: "var(--text-muted)"}}>{t("radar.window")}</span>
          <select className="input" style={{width: 110, padding: "6px 8px"}}
                  value={sinceHours}
                  disabled={radarLocked}
                  onChange={function (e) { setSinceHours(parseInt(e.target.value, 10) || 24); }}>
            <option value={6}>6h</option>
            <option value={24}>24h</option>
            <option value={72}>72h</option>
            <option value={168}>7d</option>
          </select>
          <button className="btn btn-primary" disabled={loading} onClick={onEvaluate}>
            <Ico name="target"/> {loading ? t("radar.evaluate.loading") : t("radar.evaluate")}
          </button>
          <button className="btn" type="button" onClick={onOpenSave}>
            <Ico name="download"/> {t("radar.save.short")}
          </button>
        </div>
      </div>

      <div className={"card radar-exec-card" + (radarLocked ? " radar-card--locked" : "")}>
        <div className="oa-section-title">
          <span className="radar-title-text">棰勮鎵ц</span>
          {radarLocked ? <span className="radar-locked-badge">瀹氭椂鎵弿鐢熸晥涓?/span> : null}
          <span className="oa-section-title__actions">
            {radarLocked ? (
              <button className="btn btn-sm" onClick={onUnlockRadarPlan}><Ico name="edit"/> 瑙ｉ攣缂栬緫</button>
            ) : null}
            <button className="btn btn-sm btn-primary" disabled={pushing} onClick={onRunHotRadar}>
              <Ico name="send"/> {pushing ? "鎺ㄩ€佷腑鈥? : "绔嬪嵆棰勮"}
            </button>
            <button className="btn btn-sm" disabled={savingRadarPlan || radarLocked} onClick={onSaveRadarPlan}>
              <Ico name="bell"/> {savingRadarPlan ? "淇濆瓨涓€? : "淇濆瓨瀹氭椂鎵弿"}
            </button>
          </span>
        </div>
        <div style={{display: "grid", gridTemplateColumns: "1fr", gap: 10}}>
          <label>
            <span className="filter-bar__label">閫氱煡閫氶亾</span>
            <ChannelPicker
              channels={channels}

/* 鈹€鈹€ CodeBlock 鈥?render preformatted command snippets with a copy
   button. Strips markdown code fences (``` ... ```) and unescapes
   ``\n`` so the NewsNow docker snippet renders as real lines.  */
function CodeBlock(props) {
  const raw = String(props.text || "");
  let cleaned = raw.replace(/\\n/g, "\n");
  cleaned = cleaned.replace(/^\s*>\s?/gm, "");
  cleaned = cleaned.replace(/```[a-zA-Z0-9_-]*\n?/g, "").replace(/```\s*$/g, "");
  cleaned = cleaned.trim();
  const onCopy = function () {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(cleaned);
      } else {
        const ta = document.createElement("textarea");
        ta.value = cleaned;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      window.oaToast({level: "success", message: _i18n.t("ask.copied")});
    } catch (_) {}
  };
  return (
    <div className="fp-codeblock">
      <pre>{cleaned}</pre>
      <button className="btn btn-sm fp-codeblock__copy" type="button" onClick={onCopy}>
        <Ico name="copy"/> Copy
      </button>
    </div>
  );
}

/* 鈹€鈹€ ScheduleDialog 鈥?modal form mirroring the host "鏂板缓浠诲姟" layout
   (see Image-3 spec) so users can create a fin-pulse scheduled task
   entirely in-plugin. Every submission goes through the fin-pulse
   /schedules route which delegates to the host Agent Scheduler, so the
   underlying rows still live alongside other host-managed schedules 鈥?
   we just skip the redirect hand-off. */
const SCHEDULE_TEMPLATES = {
  morning:  {mode: "daily_brief", session: "morning", time: "08:00", repeat: "daily",    since_hours: 12, top_k: 20, name: "fin-pulse morning brief"},
  noon:     {mode: "daily_brief", session: "noon",    time: "12:30", repeat: "daily",    since_hours: 6,  top_k: 15, name: "fin-pulse noon brief"},
  evening:  {mode: "daily_brief", session: "evening", time: "19:00", repeat: "daily",    since_hours: 12, top_k: 20, name: "fin-pulse evening brief"},
  radar:    {mode: "hot_radar",                       time: "09:00", repeat: "every15", since_hours: 24, limit: 100, cooldown_s: 600, name: "fin-pulse radar alert"},
};

function scheduleCronFromForm(timeValue, repeatValue) {
  var time = String(timeValue || "09:00");
  var parts = time.split(":");
  var hour = Math.max(0, Math.min(23, parseInt(parts[0] || "9", 10) || 9));
  var minute = Math.max(0, Math.min(59, parseInt(parts[1] || "0", 10) || 0));
  if (repeatValue === "every15") return "*/15 * * * *";
  if (repeatValue === "hourly") return minute + " * * * *";
  if (repeatValue === "weekdays") return minute + " " + hour + " * * 1-5";
  if (repeatValue === "weekly") return minute + " " + hour + " * * 1";
  return minute + " " + hour + " * * *";
}

function scheduleRepeatLabel(value) {
  return ({
    daily: "姣忓ぉ",
    weekdays: "宸ヤ綔鏃?,
    weekly: "姣忓懆涓€",
    hourly: "姣忓皬鏃?,
    every15: "姣?15 鍒嗛挓",
  })[value] || value;
}

const SOURCE_CATEGORY_KEYS = ["all", "realtime", "news", "rank", "policy_data", "other"];

const LEGACY_SOURCE_DEFS = {
  xueqiu: {id: "xueqiu", display_zh: "闆悆", display_en: "Xueqiu", kind: "newsnow", content_type: "hot_stock", group: "newsnow", fetcher_id: "newsnow", probe_target: "newsnow", default_enabled: true},

};

function _sourceDisplayName(s) {
  if (!s) return "";
  var legacy = LEGACY_SOURCE_DEFS[s.id || ""];
  return s.display_zh || s.display_en || s.name || (legacy && legacy.display_zh) || s.id || "";
}

function _sourceTypeLabel(s, t) {
  if (!s) return "";
  var ct = s.content_type || "";
  if (ct && ct !== "all") return t("settings.sources.ct." + ct) || ct;
  var cat = _sourceCategoryKey(s);
  return cat && cat !== "all" ? (t("today.sources.cat." + cat) || cat) : "";
}

function _legacySourceDefinition(sourceId) {
  var legacy = LEGACY_SOURCE_DEFS[sourceId || ""];
  if (legacy) return Object.assign({}, legacy);
  return {id: sourceId, display_zh: sourceId, name: sourceId, content_type: "other", group: "other"};
}

function _sourceCategoryKey(s) {
  var id = String((s && s.id) || "");
  var newsnowId = String((s && s.newsnow_id) || "");
  var ct = String((s && s.content_type) || "");
  if (ct === "flash") return "realtime";
  if (ct === "hot_stock" || /(^|-)hot($|-)/.test(id) || ["baidu", "weibo", "zhihu", "toutiao", "bilibili"].indexOf(newsnowId) >= 0) return "rank";
  if (ct === "policy" || ct === "data" || ct === "filing") return "policy_data";
  if (ct === "news") return "news";
  return "other";
}

function _probeSummaryLabel(summary, t) {
  var totals = (summary && summary.totals) || {};
  var fetched = Number(totals.fetched || totals.received || 0);
  var inserted = Number(totals.inserted || 0);
  var updated = Number(totals.updated || 0);
  if (fetched + inserted + updated <= 0) {
    var by = (summary && summary.by_source) || {};
    Object.keys(by).forEach(function (k) {
      var r = by[k] || {};
      fetched += Number(r.fetched || r.received || 0);
      inserted += Number(r.inserted || 0);
      updated += Number(r.updated || 0);
    });
  }
  return tfmt(t("settings.sources.probe.summary"), {
    fetched: fetched,
    inserted: inserted,
    updated: updated,
  });
}

function _parseCustomFeedsFromConfig(cfg) {
  var rawJson = String((cfg && cfg["rss_generic.feeds_json"]) || "").trim();
  if (rawJson) {
    try {
      var parsed = JSON.parse(rawJson);
      if (Array.isArray(parsed)) {
        return parsed.map(function (entry, i) {
          if (typeof entry === "string") return {id: "cf_" + i, url: entry, name: entry, enabled: true};
          return {
            id: String((entry && entry.id) || ("cf_" + i)),
            url: String((entry && entry.url) || ""),
            name: String((entry && entry.name) || (entry && entry.url) || ""),
            enabled: entry && entry.enabled === false ? false : true,
          };
        }).filter(function (f) { return f.url; });
      }
    } catch (_) {}
  }
  var feedsRaw = String((cfg && cfg["rss_generic.feeds"]) || "");
  return feedsRaw.split("\n").map(function (l) { return l.trim(); }).filter(Boolean).map(function (url, i) {
    return {id: "cf_" + i, url: url, name: url.length > 50 ? url.substring(0, 47) + "鈥? : url, enabled: true};
  });
}

function _customFeedDisplayName(f, idx) {
  var name = String((f && f.name) || "").trim();
  var url = String((f && f.url) || "").trim();
  if (name && name !== url) return name;
  try {
    var u = new URL(url);
    var q = u.searchParams.get("q");
    if (q) return "Bing: " + decodeURIComponent(q.replace(/\+/g, " "));
    return u.hostname || ("RSS " + (idx + 1));
  } catch (_) {
    return name || ("RSS " + (idx + 1));
  }
}

/* 鈹€鈹€ Settings Form 鈹€鈹€ */

function SettingsForm(props) {
  const t = useT();
  const [config, setConfig] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [savingKey, setSavingKey] = useState("");

  const [allSources, setAllSources] = useState([]);
  const [probeStates, setProbeStates] = useState({});
  const [probeLabels, setProbeLabels] = useState({});
  const [probingIds, setProbingIds] = useState({});

  const [customFeeds, setCustomFeeds] = useState([]);
  const [customDialogOpen, setCustomDialogOpen] = useState(false);
  // Compatibility for older hot-loaded settings render functions.
  // The inline add forms were replaced by CustomSourceDialog, but keeping
  // these state slots prevents stale closures from throwing during refresh.
  const [bingKeywords, setBingKeywords] = useState("");
  const [addingCustom, setAddingCustom] = useState(false);
  const [newCustomName, setNewCustomName] = useState("");
  const [newCustomUrl, setNewCustomUrl] = useState("");
  const [customProbing, setCustomProbing] = useState({});
  const [customProbeLabels, setCustomProbeLabels] = useState({});

  const reloadAll = useCallback(async function (opts) {
    const silent = !!(opts && opts.silent);
    const [cfg, srcResp] = await Promise.all([
      api("GET", "/config"),
      api("GET", "/sources"),
    ]);
    var cfgData = (cfg && cfg.config) || {};
    setConfig(cfgData);
    if (srcResp && srcResp.ok && Array.isArray(srcResp.items) && srcResp.items.length) {
      setAllSources(srcResp.items);
    } else {
      setAllSources(SOURCE_FALLBACK);
    }
    setCustomFeeds(_parseCustomFeedsFromConfig(cfgData));
    setLoaded(true);
    if (!silent) return;
  }, []);
  useEffect(function () { reloadAll(); }, [reloadAll]);

  const setCfgField = function (key, value) {
    setConfig(function (prev) { return Object.assign({}, prev, {[key]: value}); });
  };
  const persist = useCallback(async function (updates) {
    const resp = await api("PUT", "/config", {updates: updates});
    if (resp && resp.ok) {
      window.oaToast({level: "success", message: t("settings.saved")});
    } else {
      window.oaToast({level: "error", message: "save failed"});
    }
  }, [t]);


  /* 鈹€鈹€ Source toggle 鈹€鈹€ */
  const onToggleSource = useCallback(async function (sid) {
    var key = "source." + sid + ".enabled";
    var cur = config[key];
    var next = cur === false || cur === "false" ? true : (cur === undefined ? false : !cur);
    setCfgField(key, next);
    await persist({[key]: String(next)});
  }, [config, persist]);

  /* 鈹€鈹€ Source probe 鈹€鈹€ */
  const onProbeSource = useCallback(async function (sid) {
    var srcDef = allSources.find(function (s) { return s.id === sid; });
    var isNewsNow = srcDef && srcDef.kind === "newsnow";
    var endpoint = "/ingest/source/" + encodeURIComponent(sid);
    setProbingIds(function (p) { return Object.assign({}, p, {[sid]: true}); });
    try {
      var resp = await ingestAndWait(endpoint, null, { kind: "single" });
      if (resp && resp.ok) {
        setProbeStates(function (p) { return Object.assign({}, p, {[sid]: "ok"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[sid]: _probeSummaryLabel(resp.summary, t)}); });
      } else {
        setProbeStates(function (p) { return Object.assign({}, p, {[sid]: "err"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[sid]: t("settings.sources.probe.fail")}); });
      }
    } catch (_) {
      setProbeStates(function (p) { return Object.assign({}, p, {[sid]: "err"}); });
      setProbeLabels(function (p) { return Object.assign({}, p, {[sid]: t("settings.sources.probe.fail")}); });
    } finally {
      setProbingIds(function (p) { return Object.assign({}, p, {[sid]: false}); });
    }
  }, [t, allSources]);

  const onProbeSourceGroup = useCallback(async function (key, sources) {
    setProbingIds(function (p) { return Object.assign({}, p, {[key]: true}); });
    try {
      var payload = key === "newsnow" ? null : {sources: sources.map(function (s) { return s.fetcher_id || s.id; })};
      var resp = await ingestAndWait(
        key === "newsnow" ? "/ingest/source/newsnow" : "/ingest",
        payload,
        { kind: "all" }
      );
      if (resp && resp.ok) {
        setProbeStates(function (p) { return Object.assign({}, p, {[key]: "ok"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[key]: _probeSummaryLabel(resp.summary, t)}); });
      } else {
        setProbeStates(function (p) { return Object.assign({}, p, {[key]: "err"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[key]: t("settings.sources.probe.fail")}); });
      }
    } catch (_) {
      setProbeStates(function (p) { return Object.assign({}, p, {[key]: "err"}); });
      setProbeLabels(function (p) { return Object.assign({}, p, {[key]: t("settings.sources.probe.fail")}); });
    } finally {
      setProbingIds(function (p) { return Object.assign({}, p, {[key]: false}); });
    }
  }, [t]);

  /* 鈹€鈹€ Custom feed helpers 鈹€鈹€ */
  const persistCustomFeeds = useCallback(async function (feeds) {
    var urls = feeds.map(function (f) { return f.url; });
    await persist({
      "rss_generic.feeds": urls.join("\n"),
      "rss_generic.feeds_json": JSON.stringify(feeds.map(function (f) {
        return {name: f.name || f.url, url: f.url, enabled: f.enabled !== false};
      })),
    });
    setCustomFeeds(feeds);
  }, [persist]);

  const onSaveCustomFeed = useCallback(async function (feed) {
    if (!feed || !feed.url) return;
    var next = customFeeds.concat([feed]);
    await persistCustomFeeds(next);
    setCustomDialogOpen(false);
    window.oaToast({level: "success", message: t("settings.saved")});
  }, [customFeeds, persistCustomFeeds, t]);

  const onDeleteCustom = useCallback(async function (idx) {
    var next = customFeeds.filter(function (_, i) { return i !== idx; });
    await persistCustomFeeds(next);
  }, [customFeeds, persistCustomFeeds, t]);

  const onProbeCustom = useCallback(async function (url, idx) {
    setCustomProbing(function (p) { return Object.assign({}, p, {[idx]: true}); });
    try {
      var resp = await api("POST", "/sources/probe-rss", {url: url});
      if (resp && resp.ok) {
        setCustomProbeLabels(function (p) { return Object.assign({}, p, {[idx]: tfmt(t("settings.sources.probe.ok"), {n: resp.count || 0})}); });
      } else {
        setCustomProbeLabels(function (p) { return Object.assign({}, p, {[idx]: t("settings.sources.probe.fail")}); });
      }
    } catch (_) {
      setCustomProbeLabels(function (p) { return Object.assign({}, p, {[idx]: t("settings.sources.probe.fail")}); });
    } finally {
      setCustomProbing(function (p) { return Object.assign({}, p, {[idx]: false}); });
    }
  }, [t]);

  const onProbeAllCustom = useCallback(async function () {
    if (!customFeeds.length) return;
    setCustomProbing(function (p) { return Object.assign({}, p, {all: true}); });
    try {
      var okCount = 0;
      var total = customFeeds.length;
      var nextLabels = {};
      for (var i = 0; i < customFeeds.length; i += 1) {
        var feed = customFeeds[i];
        var resp = await api("POST", "/sources/probe-rss", {url: feed.url});
        if (resp && resp.ok) {
          okCount += 1;
          nextLabels[i] = tfmt(t("settings.sources.probe.ok"), {n: resp.count || 0});
        } else {
          nextLabels[i] = t("settings.sources.probe.fail");
        }
      }
      setCustomProbeLabels(nextLabels);
      setProbeLabels(function (p) { return Object.assign({}, p, {custom_rss: okCount + "/" + total + " OK"}); });
      setProbeStates(function (p) { return Object.assign({}, p, {custom_rss: okCount > 0 ? "ok" : "err"}); });
    } finally {
      setCustomProbing(function (p) { return Object.assign({}, p, {all: false}); });
    }
  }, [customFeeds, t]);

  if (!loaded) return <div className="card"><div className="empty">{t("today.list.loading")}</div></div>;

  /* Classify sources */
  var directSources = allSources.filter(function (s) {
    return s.group === "direct" || s.group === "builtin_rss" ||
      ((s.kind === "direct" || s.kind === "rss") && s.id !== "rss_generic");
  });
  var newsnowSources = allSources.filter(function (s) { return s.kind === "newsnow"; });
  var rssGenericSource = allSources.find(function (s) { return s.id === "rss_generic"; }) || {
    id: "rss_generic", display_zh: t("settings.sources.cat.custom"), content_type: "custom", group: "custom_rss", default_enabled: true
  };

  var isEnabled = function (sid) {
    var v = config["source." + sid + ".enabled"];
    if (v === undefined || v === null || v === "") {
      var def = allSources.find(function (s) { return s.id === sid; });
      return def ? !!def.default_enabled : true;
    }
    return v !== false && v !== "false";
  };

  var rawNewsnowMode = config["newsnow.mode"];
  var newsnowMode = (rawNewsnowMode && String(rawNewsnowMode)) || "public";
  if (newsnowMode !== "off" && newsnowMode !== "public") newsnowMode = "public";
  var rawMinInterval = parseInt(config["newsnow.min_interval_s"] || "300", 10);
  var newsnowFloor = (isNaN(rawMinInterval) ? 300 : Math.max(
    newsnowMode === "public" ? NEWSNOW_PUBLIC_MIN_INTERVAL_S : 0,
    rawMinInterval
  ));

  return (
    <div>
      {/* 鈺愨晲鈺愨晲鈺愨晲鈺愨晲 Data Source Management 鈺愨晲鈺愨晲鈺愨晲鈺愨晲 */}
      <div className="card" style={{padding: "16px 14px"}}>
        <div className="oa-settings-section">
          <div className="oa-settings-section__title">{t("settings.sources.title")}</div>

          {/* Category 1: Direct & RSS */}
          <Collapsible
            title={t("settings.sources.cat.direct")}
            badge={tfmt(t("settings.sources.count"), {n: directSources.length})}
            defaultOpen={true}>
            <div className="source-chip-grid">
              {directSources.map(function (s) {
                return (
                  <SourceChip
                    key={s.id}
                    source={s}
                    enabled={isEnabled(s.id)}
                    onClick={function () { onToggleSource(s.id); }}
                    title={(isEnabled(s.id) ? "" : t("settings.sources.disabled.hint") + "\n") + (s.homepage || "") + (config["source." + s.id + ".last_error"] ? "\n" + config["source." + s.id + ".last_error"] : "")}
                  />
                );
              })}
